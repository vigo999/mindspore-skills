name: Contract Tests

on:
  push:
    paths:
      - "tests/**"
      - "skills/**"
      - "examples/**"
      - "docs/concepts/**"
      - ".github/workflows/contract-tests.yml"
  pull_request:
    paths:
      - "tests/**"
      - "skills/**"
      - "examples/**"
      - "docs/concepts/**"
      - ".github/workflows/contract-tests.yml"

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema pyyaml
      - name: Run cross-skill contract tests
        run: python -m pytest -q tests/contract
      - name: Run skill-specific tests
        run: python -m pytest -q skills/cpu-plugin-builder/tests skills/op-agent/tests
