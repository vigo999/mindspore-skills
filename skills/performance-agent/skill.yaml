schema_version: "1.1.0"
name: "performance-agent"
display_name: "Performance Agent"
description: "Diagnose throughput, latency, memory, utilization, dataloader, and communication bottlenecks after a MindSpore or torch_npu workload already runs by locating profiler exports, building deterministic multi-dimensional summaries, validating the most likely bottlenecks, and emitting structured report artifacts."
version: "0.4.0"

entry:
  type: "manual"
  path: "SKILL.md"

role: "agent"

composes: []

factory:
  card_types:
    - "operator"
    - "trick"
    - "model"
    - "report"

inputs:
  - name: "working_dir"
    type: "path"
    required: false
    description: "Workspace root for the run under diagnosis. Defaults to the current shell path."
  - name: "user_problem"
    type: "string"
    required: true
    description: "Performance symptom description and runtime context."
  - name: "trace_path"
    type: "path"
    required: false
    description: "Profiler trace or exported profiler directory when available."
  - name: "metric_focus"
    type: "enum"
    required: false
    choices: ["throughput", "latency", "memory", "utilization"]
    description: "Primary optimization focus when already known."
  - name: "env_lock"
    type: "path"
    required: false
    description: "Path to an earlier readiness snapshot such as env.lock.json."
  - name: "factory_root"
    type: "path"
    required: false
    description: "Optional local ms-cli factory or Factory root for supporting tricks, models, or report evidence."
  - name: "before_metrics_path"
    type: "path"
    required: false
    description: "Optional before-change metric JSON for deterministic validation comparison."
  - name: "after_metrics_path"
    type: "path"
    required: false
    description: "Optional after-change metric JSON for deterministic validation comparison."
  - name: "hardware_spec"
    type: "string"
    required: false
    description: "Hardware model name, e.g. ascend_910b1, atlas_a2_280t. Auto-detected from profiler data when possible."
  - name: "parallel_config"
    type: "string"
    required: false
    description: "Parallel strategy description, e.g. TP=4,PP=1,DP=2. Auto-detected from cluster directory structure when possible."
  - name: "model_config"
    type: "path"
    required: false
    description: "Optional JSON file with model configuration (hidden_size, num_layers, seq_len, vocab_size) for precise MFU calculation."
  - name: "output_dir"
    type: "path"
    required: false
    description: "Optional output directory for structured performance artifacts. Defaults to runs/<run_id>/out under the active workspace."

outputs:
  report_schema: "skills/_shared/contract/report.schema.json"
  out_dir_layout: "runs/<run_id>/out/"

permissions:
  network: "none"
  filesystem: "workspace-write"

dependencies:
  tools:
    - "bash"
    - "find"
    - "rg"
  python: []

tags:
  - "mindspore"
  - "torch_npu"
  - "ascend"
  - "performance"
  - "optimization"
