entries:
- scope: acl
  code: 0
  name: ACL_SUCCESS
  meaning: 执行成功。
  solution: ''
- scope: acl
  code: 100000
  name: ACL_ERROR_INVALID_PARAM
  meaning: 参数校验失败。
  solution: 请检查接口的入参值是否正确。
- scope: acl
  code: 100001
  name: ACL_ERROR_UNINITIALIZE
  meaning: 未初始化。
  solution: 请检查是否已调用aclInit接口进行初始化，请确保已调用aclInit接口，且在其它acl接口之前调用。
- scope: acl
  code: 100002
  name: ACL_ERROR_REPEAT_INITIALIZE
  meaning: 重复初始化或重复加载。
  solution: 请检查是否调用对应的接口重复初始化或重复加载。
- scope: acl
  code: 100003
  name: ACL_ERROR_INVALID_FILE
  meaning: 无效的文件。
  solution: 请检查文件是否存在、文件是否能被访问等。
- scope: acl
  code: 100004
  name: ACL_ERROR_WRITE_FILE
  meaning: 写文件失败。
  solution: 请检查文件路径是否存在、文件是否有写权限等。
- scope: acl
  code: 100005
  name: ACL_ERROR_INVALID_FILE_SIZE
  meaning: 无效的文件大小。
  solution: 请检查文件大小是否符合接口要求。
- scope: acl
  code: 100006
  name: ACL_ERROR_PARSE_FILE
  meaning: 解析文件失败。
  solution: 请检查文件内容是否合法。
- scope: acl
  code: 100007
  name: ACL_ERROR_FILE_MISSING_ATTR
  meaning: 文件缺失参数。
  solution: 请检查文件内容是否完整。
- scope: acl
  code: 100008
  name: ACL_ERROR_FILE_ATTR_INVALID
  meaning: 文件参数无效。
  solution: 请检查文件中参数值是否正确。
- scope: acl
  code: 100009
  name: ACL_ERROR_INVALID_DUMP_CONFIG
  meaning: 无效的Dump配置。
  solution: 请检查Dump配置是否正确，详细配置请参见《精度调试工具用户指南》。
- scope: acl
  code: 100010
  name: ACL_ERROR_INVALID_PROFILING_CONFIG
  meaning: 无效的Profiling配置。
  solution: 请检查Profiling配置是否正确。
- scope: acl
  code: 100011
  name: ACL_ERROR_INVALID_MODEL_ID
  meaning: 无效的模型ID。
  solution: 请检查模型ID是否正确、模型是否正确加载。
- scope: acl
  code: 100012
  name: ACL_ERROR_DESERIALIZE_MODEL
  meaning: 反序列化模型失败。
  solution: 模型可能与当前版本不匹配，请重新构建模型。
- scope: acl
  code: 100013
  name: ACL_ERROR_PARSE_MODEL
  meaning: 解析模型失败。
  solution: 模型可能与当前版本不匹配，请重新构建模型。
- scope: acl
  code: 100014
  name: ACL_ERROR_READ_MODEL_FAILURE
  meaning: 读取模型失败。
  solution: 请检查模型文件是否存在、模型文件是否能被访问等。
- scope: acl
  code: 100015
  name: ACL_ERROR_MODEL_SIZE_INVALID
  meaning: 无效的模型大小。
  solution: 模型文件无效，请重新构建模型。
- scope: acl
  code: 100016
  name: ACL_ERROR_MODEL_MISSING_ATTR
  meaning: 模型缺少参数。
  solution: 模型可能与当前版本不匹配，请重新构建模型。
- scope: acl
  code: 100017
  name: ACL_ERROR_MODEL_INPUT_NOT_MATCH
  meaning: 模型的输入不匹配。
  solution: 请检查模型的输入是否正确。
- scope: acl
  code: 100018
  name: ACL_ERROR_MODEL_OUTPUT_NOT_MATCH
  meaning: 模型的输出不匹配。
  solution: 请检查模型的输出是否正确。
- scope: acl
  code: 100019
  name: ACL_ERROR_MODEL_NOT_DYNAMIC
  meaning: 非动态模型。
  solution: 请检查当前模型是否支持动态场景，如不支持，请重新构建模型。
- scope: acl
  code: 100020
  name: ACL_ERROR_OP_TYPE_NOT_MATCH
  meaning: 单算子类型不匹配。
  solution: 请检查算子类型是否正确。
- scope: acl
  code: 100021
  name: ACL_ERROR_OP_INPUT_NOT_MATCH
  meaning: 单算子的输入不匹配。
  solution: 请检查算子的输入是否正确。
- scope: acl
  code: 100022
  name: ACL_ERROR_OP_OUTPUT_NOT_MATCH
  meaning: 单算子的输出不匹配。
  solution: 请检查算子的输出是否正确。
- scope: acl
  code: 100023
  name: ACL_ERROR_OP_ATTR_NOT_MATCH
  meaning: 单算子的属性不匹配。
  solution: 请检查算子的属性是否正确。
- scope: acl
  code: 100024
  name: ACL_ERROR_OP_NOT_FOUND
  meaning: 单算子未找到。
  solution: 请检查算子类型是否支持。
- scope: acl
  code: 100025
  name: ACL_ERROR_OP_LOAD_FAILED
  meaning: 单算子加载失败。
  solution: 模型可能与当前版本不匹配，请重新构建单算子模型。
- scope: acl
  code: 100026
  name: ACL_ERROR_UNSUPPORTED_DATA_TYPE
  meaning: 不支持的数据类型。
  solution: 请检查数据类型是否存在或当前是否支持。
- scope: acl
  code: 100027
  name: ACL_ERROR_FORMAT_NOT_MATCH
  meaning: Format不匹配。
  solution: 请检查Format是否正确。
- scope: acl
  code: 100028
  name: ACL_ERROR_BIN_SELECTOR_NOT_REGISTERED
  meaning: 使用二进制选择方式编译算子接口时，算子未注册选择器。
  solution: 请检查是否调用aclopRegisterSelectKernelFunc接口注册算子选择器。
- scope: acl
  code: 100029
  name: ACL_ERROR_KERNEL_NOT_FOUND
  meaning: 编译算子时，算子Kernel未注册。
  solution: 请检查是否调用aclopCreateKernel接口注册算子Kernel。
- scope: acl
  code: 100030
  name: ACL_ERROR_BIN_SELECTOR_ALREADY_REGISTERED
  meaning: 使用二进制选择方式编译算子接口时，算子重复注册。
  solution: 请检查是否重复调用aclopRegisterSelectKernelFunc接口注册算子选择器。
- scope: acl
  code: 100031
  name: ACL_ERROR_KERNEL_ALREADY_REGISTERED
  meaning: 编译算子时，算子Kernel重复注册。
  solution: 请检查是否重复调用aclopCreateKernel接口注册算子Kernel。
- scope: acl
  code: 100032
  name: ACL_ERROR_INVALID_QUEUE_ID
  meaning: 无效的队列ID。
  solution: 请检查队列ID是否正确。
- scope: acl
  code: 100033
  name: ACL_ERROR_REPEAT_SUBSCRIBE
  meaning: 重复订阅。
  solution: 请检查针对同一个Stream，是否重复调用aclrtSubscribeReport接口。
- scope: acl
  code: 100034
  name: ACL_ERROR_STREAM_NOT_SUBSCRIBE
  meaning: Stream未订阅。
  solution: 请检查是否已调用aclrtSubscribeReport接口。
- scope: acl
  code: 100035
  name: ACL_ERROR_THREAD_NOT_SUBSCRIBE
  meaning: 线程未订阅。
  solution: 请检查是否已调用aclrtSubscribeReport接口。
- scope: acl
  code: 100036
  name: ACL_ERROR_WAIT_CALLBACK_TIMEOUT
  meaning: 等待callback超时。
  solution: 请检查是否已调用aclrtLaunchCallback接口下发callback任务；。
- scope: acl
  code: 100037
  name: ACL_ERROR_REPEAT_FINALIZE
  meaning: 重复去初始化。
  solution: 请检查是否重复调用aclFinalize接口或重复调用aclFinalizeReference接口进行去初始化。
- scope: acl
  code: 100038
  name: ACL_ERROR_NOT_STATIC_AIPP
  meaning: 静态AIPP配置信息不存在。
  solution: 调用aclmdlGetFirstAippInfo接口时，请传入正确的index值。
- scope: acl
  code: 100039
  name: ACL_ERROR_COMPILING_STUB_MODE
  meaning: 运行应用前配置的动态库路径是编译桩的路径，不是正确的动态库路径。
  solution: 请检查动态库路径的配置，确保使用运行模式的动态库。
- scope: acl
  code: 100040
  name: ACL_ERROR_GROUP_NOT_SET
  meaning: 未设置Group。
  solution: 请检查是否已调用aclrtSetGroup接口。
- scope: acl
  code: 100041
  name: ACL_ERROR_GROUP_NOT_CREATE
  meaning: 未创建对应的Group。
  solution: 请检查调用接口时设置的Group ID是否在支持的范围内，Group ID的取值范围：[0, (Group数量-1)]，用户可调用aclrtGetGroupCount接口获取Group数量。
- scope: acl
  code: 100042
  name: ACL_ERROR_PROF_ALREADY_RUN
  meaning: 已存在采集Profiling数据的任务。
  solution: 请检查代码逻辑，“通过调用AscendCL API方式采集Profiling数据”的配置不能与其它方式的Profiling配置并存，只能保留一种，各种方式的Profiling采集配置请参见《性能调优工具用户指南》。
- scope: acl
  code: 100043
  name: ACL_ERROR_PROF_NOT_RUN
  meaning: 未使用aclprofInit接口先进行Profiling初始化。
  solution: 请检查接口调用顺序。
- scope: acl
  code: 100044
  name: ACL_ERROR_DUMP_ALREADY_RUN
  meaning: 已存在获取Dump数据的任务。
  solution: 请检查在调用aclmdlInitDump接口、aclmdlSetDump接口、aclmdlFinalizeDump接口配置Dump信息前，是否已调用aclInit接口配置Dump信息，如是，请调整代码逻辑，保留一种方式配置Dump信息即可。
- scope: acl
  code: 100045
  name: ACL_ERROR_DUMP_NOT_RUN
  meaning: 未使用aclmdlInitDump接口先进行Dump初始化。
  solution: 请检查获取Dump数据的接口调用顺序，参考aclmdlInitDump接口处的说明。
- scope: acl
  code: 107000
  name: ACL_ERROR_RT_PARAM_INVALID
  meaning: 参数校验失败。
  solution: 请检查接口入参是否正确。
- scope: acl
  code: 107001
  name: ACL_ERROR_RT_INVALID_DEVICEID
  meaning: 无效的Device ID。
  solution: 请检查Device ID是否合法。
- scope: acl
  code: 107002
  name: ACL_ERROR_RT_CONTEXT_NULL
  meaning: context为空。
  solution: 请检查是否调用aclrtSetCurrentContext或aclrtSetDevice。
- scope: acl
  code: 107003
  name: ACL_ERROR_RT_STREAM_CONTEXT
  meaning: stream不在当前context内。
  solution: 请检查stream所在的context与当前context是否一致。
- scope: acl
  code: 107004
  name: ACL_ERROR_RT_MODEL_CONTEXT
  meaning: model不在当前context内。
  solution: 请检查加载的模型与当前context是否一致。
- scope: acl
  code: 107005
  name: ACL_ERROR_RT_STREAM_MODEL
  meaning: stream不在当前model内。
  solution: 请检查stream是否绑定过该模型。
- scope: acl
  code: 107006
  name: ACL_ERROR_RT_EVENT_TIMESTAMP_INVALID
  meaning: event时间戳无效。
  solution: 请检查event是否创建。
- scope: acl
  code: 107007
  name: ACL_ERROR_RT_EVENT_TIMESTAMP_REVERSAL
  meaning: event时间戳反转。
  solution: 请检查event是否创建。
- scope: acl
  code: 107008
  name: ACL_ERROR_RT_ADDR_UNALIGNED
  meaning: 内存地址未对齐。
  solution: 请检查所申请的内存地址是否对齐。
- scope: acl
  code: 107009
  name: ACL_ERROR_RT_FILE_OPEN
  meaning: 打开文件失败。
  solution: 请检查文件是否存在。
- scope: acl
  code: 107010
  name: ACL_ERROR_RT_FILE_WRITE
  meaning: 写文件失败。
  solution: 请检查文件是否存在或者是否具备写权限。
- scope: acl
  code: 107011
  name: ACL_ERROR_RT_STREAM_SUBSCRIBE
  meaning: stream未订阅或重复订阅。
  solution: 请检查当前stream是否订阅或重复订阅。
- scope: acl
  code: 107012
  name: ACL_ERROR_RT_THREAD_SUBSCRIBE
  meaning: 线程未订阅或重复订阅。
  solution: 请检查当前线程是否订阅或重复订阅。
- scope: acl
  code: 107013
  name: ACL_ERROR_RT_GROUP_NOT_SET
  meaning: 未设置Group。
  solution: 请检查是否已调用aclrtSetGroup接口。
- scope: acl
  code: 107014
  name: ACL_ERROR_RT_GROUP_NOT_CREATE
  meaning: 未创建对应的Group。
  solution: 请检查调用接口时设置的Group ID是否在支持的范围内，Group ID的取值范围：[0, (Group数量-1)]，用户可调用aclrtGetGroupCount接口获取Group数量。
- scope: acl
  code: 107015
  name: ACL_ERROR_RT_STREAM_NO_CB_REG
  meaning: 该callback对应的stream未注册到线程。
  solution: 请检查stream是否已经注册到线程，检查是否调用aclrtSubscribeReport接口。
- scope: acl
  code: 107016
  name: ACL_ERROR_RT_INVALID_MEMORY_TYPE
  meaning: 无效的内存类型。
  solution: 请检查内存类型是否合法。
- scope: acl
  code: 107017
  name: ACL_ERROR_RT_INVALID_HANDLE
  meaning: 无效的资源句柄。
  solution: 检查对应输入和使用的参数是否正确.。
- scope: acl
  code: 107018
  name: ACL_ERROR_RT_INVALID_MALLOC_TYPE
  meaning: 申请使用的内存类型不正确。
  solution: 检查对应输入和使用的内存类型是否正确。
- scope: acl
  code: 107019
  name: ACL_ERROR_RT_WAIT_TIMEOUT
  meaning: 等待超时。
  solution: 请尝试重新执行下发任务的接口。
- scope: acl
  code: 107020
  name: ACL_ERROR_RT_TASK_TIMEOUT
  meaning: 执行任务超时。
  solution: 请排查业务编排是否合理或者设置合理的超时时间。
- scope: acl
  code: 107021
  name: ACL_ERROR_RT_SYSPARAMOPT_NOT_SET
  meaning: 获取当前Context中的系统参数值失败。
  solution: 未设置当前Context中的系统参数值，请参见aclrtCtxSetSysParamOpt。
- scope: acl
  code: 107022
  name: ACL_ERROR_RT_DEVICE_TASK_ABORT
  meaning: Device上的任务丢弃操作与其它操作冲突。
  solution: 该错误码是由于调用aclrtDeviceTaskAbort接口停止Device上的任务与其它接口操作冲突，用户需排查代码逻辑，等待aclrtDeviceTaskAbort接口执行完成后，才执行其它操作。
- scope: acl
  code: 107023
  name: ACL_ERROR_RT_STREAM_ABORT
  meaning: 正在清除Stream上的任务。
  solution: 正在清除指定Stream上的任务，不支持同步等待该Stream上的任务执行。
- scope: acl
  code: 107024
  name: ACL_ERROR_RT_CAPTURE_DEPENDENCY
  meaning: 基于捕获方式构建模型运行实例时，event wait任务没有对应的event record任务。
  solution: 调用aclrtRecordEvent接口增加event record任务。
- scope: acl
  code: 107025
  name: ACL_ERROR_RT_STREAM_UNJOINED
  meaning: 跨流依赖场景下，由于捕获模型包含未合并到原始Stream的其它Stream，导致其它Stream报错。
  solution: 报错的Stream中最后一个任务不是event record任务。在报错Stream的最后插入一个可以合并到原始Stream的event record任务（调用aclrtRecordEvent接口）。
- scope: acl
  code: 107026
  name: ACL_ERROR_RT_MODEL_CAPTURED
  meaning: 模型已经处于捕获状态。
  solution: 先调用aclmdlRICaptureEnd接口结束捕获，再执行对应的操作。
- scope: acl
  code: 107027
  name: ACL_ERROR_RT_STREAM_CAPTURED
  meaning: Stream已经处于捕获状态。
  solution: 先调用aclmdlRICaptureEnd接口结束捕获，再执行对应的操作。
- scope: acl
  code: 107028
  name: ACL_ERROR_RT_EVENT_CAPTURED
  meaning: Event已经处于捕获状态。
  solution: 先调用aclmdlRICaptureEnd接口结束捕获，再执行对应的操作。
- scope: acl
  code: 107029
  name: ACL_ERROR_RT_STREAM_NOT_CAPTURED
  meaning: Stream不在捕获状态。
  solution: 请检查是否已调用aclmdlRICaptureBegin开始捕获Stream上下发的任务。
- scope: acl
  code: 107030
  name: ACL_ERROR_RT_CAPTURE_MODE_NOT_SUPPORT
  meaning: 当前的捕获模式不支持该操作。
  solution: 不同捕获模式支持的操作范围不同，请参见aclmdlRICaptureThreadExchangeMode接口中的说明，并切换到正确的捕获模式。
- scope: acl
  code: 107031
  name: ACL_ERROR_RT_STREAM_CAPTURE_IMPLICIT
  meaning: 捕获场景下不允许使用默认Stream。
  solution: 请尝试使用其他Stream替代默认Stream。
- scope: acl
  code: 107032
  name: ACL_ERROR_STREAM_CAPTURE_CONFLICT
  meaning: Event与Stream所在的模型运行实例不一致。
  solution: 请检查同时在调用aclmdlRICaptureBegin操作的多个Stream是否通过Event建立关联关系。
- scope: acl
  code: 107033
  name: ACL_ERROR_STREAM_TASK_GROUP_STATUS
  meaning: 任务组状态异常。
  solution: 造成该错误的原因可能如下，请排查。
- scope: acl
  code: 107034
  name: ACL_ERROR_STREAM_TASK_GROUP_INTR
  meaning: 任务组记录过程中断。
  solution: 该错误的原因是记录任务组时将任务提交到了未开启任务组记录的捕获流上。
- scope: acl
  code: 107036
  name: ACL_ERROR_RT_STREAM_CAPTURE_UNMATCHED
  meaning: 捕获过程中发现不匹配的操作，没有调用aclmdlRICaptureBegin接口开始捕获Stream上的任务。
  solution: 请检查代码逻辑，先调用aclmdlRICaptureBegin接口开始捕获Stream上的任务，再调用aclmdlRICaptureEnd接口结束捕获。
- scope: acl
  code: 107037
  name: ACL_ERROR_RT_MODEL_RUNNING
  meaning: 当前模型正在执行，不能销毁。
  solution: 请检查代码逻辑，在模型执行完成后，再销毁模型。
- scope: acl
  code: 107038
  name: ACL_ERROR_RT_STREAM_CAPTURE_WRONG_THREAD
  meaning: aclmdlRICaptureEnd与aclmdlRICaptureBegin不在同一个线程中。
  solution: 在aclmdlRICaptureBegin接口中，如果将mode设置为非ACL_MODEL_RI_CAPTURE_MODE_RELAXED的值，则aclmdlRICaptureEnd接口和aclmdlRICaptureBegin接口必须位于同一线程中。
- scope: acl
  code: 107039
  name: ACL_ERROR_RT_INSUFFICIENT_INPUT_ARRAY
  meaning: 数组空间不足，数组大小小于实际所需数组大小。
  solution: 调整输入的数组大小。
- scope: acl
  code: 107040
  name: ACL_ERROR_RT_MODEL_UPDATE_FAILED
  meaning: 模型未完全捕获、模型正在执行中，或参数更新失败导致模型更新失败。
  solution: 确保模型已成功捕获、执行完成或参数更新成功。
- scope: acl
  code: 145000
  name: ACL_ERROR_GE_PARAM_INVALID
  meaning: 参数校验失败。
  solution: 请检查接口的入参值是否正确。
- scope: acl
  code: 145001
  name: ACL_ERROR_GE_EXEC_NOT_INIT
  meaning: 未初始化。
  solution: 请检查是否已调用aclInit接口进行初始化，请确保已调用aclInit接口，且在其它acl接口之前调用。
- scope: acl
  code: 145002
