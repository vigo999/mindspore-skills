    optional_semantics:
    - 'weightOptional（aclTensor*）: 不支持空Tensor。'
    - 'weightOptional（aclTensor*）: weightOptional为空时，需要构造一个shape为[R1,...,Rj]，数据类型与输入input相同，数据全为1的Tensor。'
