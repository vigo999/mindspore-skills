  - name: key
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
    shape_constraints:
    - 'key: shape支持[B, S2, N2, D]/[T2, N2, D]。'
  - name: dy
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
    shape_constraints:
    - 'dy: shape支持[B, S1, N1, D]/[T1, N1, D]。'
  - name: sparseIndices
    role: input
    dtype: INT64
    noncontiguous: 'yes'
    tensor_rank: 2..3
    shape_constraints:
