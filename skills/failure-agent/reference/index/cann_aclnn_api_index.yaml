- api_name: aclnnRmsNorm
  doc_names:
  - aclnnRmsNorm.md
  source_repo: ops-nn
  workspace_api: aclnnRmsNormGetWorkspaceSize
  execute_api: aclnnRmsNorm
  summary: 接口功能：RmsNorm算子是大模型常用的归一化操作，相比LayerNorm算子，其去掉了减去均值的部分。
  constraints:
  - Atlas 推理系列产品：x、gamma输入的尾轴长度必须大于等于32Bytes。
  - Atlas 推理系列产品：输入不支持包含Inf和NaN。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Atlas A3 训练系列产品/Atlas A3 推理系列产品、Ascend 950PR/Ascend
    950DT：当输入是Inf时，输出为Inf。当输入是NaN时，输出为NaN。
  - shape与入参`x`的shape保持一致。
  - shape与入参`x`的shape前几维保持一致，前几维指`x`的维度减去`gamma`的维度，表示不需要norm的维度。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - 输入或输出的数据类型不在支持范围之内。
  - 参数不满足参数说明中的要求。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入或输出的数据类型不在支持范围之内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 参数不满足参数说明中的要求。
  evidence:
  - aclnnRmsNormGetWorkspaceSize
  - aclnnRmsNorm
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    optional_semantics:
    - 'x（aclTensor*）: 支持空Tensor。'
  - name: gamma
    role: input
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    shape_constraints:
    - 'gamma（aclTensor*）: shape需要满足gamma_shape = x_shape[n:], n < x_shape.dims()。'
    optional_semantics:
    - 'gamma（aclTensor*）: 支持空Tensor。'
  - name: epsilon
    role: input
  outputs:
  - name: yOut
    role: output
    description: 表示进行归一化后的最终输出，对应公式中的`RmsNorm(x)`。
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    optional_semantics:
    - 'yOut（aclTensor*）: 支持空Tensor。'
  - name: rstdOut
    role: output
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 1..8
    optional_semantics:
    - 'rstdOut（aclTensor*）: 支持空Tensor。'
- api_name: aclnnRmsNormDynamicMxQuant
  doc_names:
  - aclnnRmsNormDynamicMxQuant.md
  source_repo: ops-nn
  workspace_api: aclnnRmsNormDynamicMxQuantGetWorkspaceSize
  execute_api: aclnnRmsNormDynamicMxQuant
  summary: 接口功能：RmsNorm算子是大模型常用的归一化操作，相比LayerNorm算子，其去掉了减去均值的部分。DynamicMxQuant算子则是在尾轴上按blocksize分组进行动态MX量化的算子。RmsNormDynamicMxQuant算子将RmsNorm归一化输出给到的DynamicMxQuant算子融合起来，减少搬入搬出操作。在输入尾轴axis上，根据每blocksize=32个数，计算出这组数对应的量化尺度mxscale，然后对这组数每一个除以mxscale，根据round_mode转换到对应的dst_type，得到量化结果y。在dst_type为FLOAT8_E4M3FN、FLOAT8_E5M2时，根据scale_alg的取值来指定计算mxscale的不同算法。
  constraints:
  - '**边界值场景说明**。'
  - 当输入是Inf时：1、输出yOut为0；2、输出mxscaleOut为255，偶数pad填充值为0；3、输出rstdOut为0。
  - 当输入是NaN时：1、输出yOut为0；2、输出mxscaleOut为255，偶数pad填充值为0；3、输出rstdOut为NaN。
  - '**数据格式说明**。'
  - '**各产品型号支持数据类型说明**。'
  - rank(mxscaleOut) = rank(x) + 1。
  - mxscaleOut.shape[-2] = (ceil(x.shape[-1] / 32) + 2 - 1) / 2。
  - mxscaleOut.shape[-1] = 2。
  - 其他维度与输入x一致。
  - 当输出yOut的数据类型为FLOAT4_E2M1或FLOAT4_E1M2，x尾轴的值必须为偶数。
  - shape需要与输入`x`一致。
  - 其中，前几维（`x`的维度数减去`gamma`的维度数）与`x`对应维度保持一致，表示不需要norm的维度。
  - 当outputRstd为True时，shape与入参`x`的shape前几维保持一致，前几维指`x`的维度减去`gamma`的维度，表示不需要norm的维度，rstdOut的-1轴是1。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - 输入或输出的数据类型不在支持的范围之内。
  - scaleAlg不是0或1，roundModeOptional(非空时)不是 {rint, floor, round}。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入或输出的数据类型不在支持的范围之内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: scaleAlg不是0或1，roundModeOptional(非空时)不是 {rint, floor, round}。
  evidence:
  - aclnnRmsNormDynamicMxQuantGetWorkspaceSize
  - aclnnRmsNormDynamicMxQuant
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..7
    optional_semantics:
    - 'x（aclTensor*）: 不支持空Tensor。'
  - name: gamma
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'gamma（aclTensor*）: shape只能为一维，需要与`x`最后一维维度匹配。'
    optional_semantics:
    - 'gamma（aclTensor*）: 不支持空Tensor。'
  - name: beta
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'beta（aclTensor*）: 如果提供。'
    optional_semantics:
    - 'beta（aclTensor*）: 不支持空Tensor。'
    - 'beta（aclTensor*）: 可选参数，支持传入空指针。'
  - name: epsilon
    role: input
  - name: scaleAlg
    role: input
    value_constraints:
    - 'scaleAlg（int64_t）: 支持取值0和1，取值为0代表场景1，取值为1代表场景2。'
    - 'scaleAlg（int64_t）: 当dstType为FLOAT4_E2M1/FLOAT4_E1M2时仅支持取值为0。'
  - name: roundModeOptional
    role: input
  - name: dstType
    role: input
  - name: outputRstd
    role: input
    description: 表示指定是否输出有效的rstdOut。
  outputs:
  - name: yOut
    role: output
    dtype: FLOAT4_E2M1、FLOAT4_E1M2、FLOAT8_E4M3FN、FLOAT8_E5M2
    noncontiguous: 'yes'
    tensor_rank: 1..7
    optional_semantics:
    - 'yOut（aclTensor*）: 不支持空Tensor。'
  - name: mxscaleOut
    role: output
    dtype: FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 2..8
    shape_constraints:
    - 'mxscaleOut（aclTensor*）: shape的维度数为输入`x`的维度数加1。'
    optional_semantics:
    - 'mxscaleOut（aclTensor*）: 不支持空Tensor。'
  - name: rstdOut
    role: output
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 1..7
    optional_semantics:
    - 'rstdOut（aclTensor*）: 不支持空Tensor。'
