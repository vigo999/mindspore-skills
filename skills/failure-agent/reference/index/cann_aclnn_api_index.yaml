    role: optional_input
    dtype: INT64
  - name: tokensIndexFlag
    role: optional_input
    dtype: bool
  outputs:
  - name: y
    role: output
    description: 公式中的输出y。
    dtype: "Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16\n Atlas 推理系列加速卡产品：FLOAT16"
    noncontiguous: 'yes'
