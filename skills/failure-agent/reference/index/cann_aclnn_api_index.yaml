- api_name: aclnnGather
  doc_names:
  - aclnnGather.md
  source_repo: ops-nn
  workspace_api: aclnnGatherGetWorkspaceSize
  execute_api: aclnnGather
  summary: 接口功能：对输入tensor中指定的维度dim进行数据聚集。
  constraints:
  - 'dim: 取值范围[-self.dim(), self.dim() - 1]。'
  - 'index: 维度数需要与self一致，且shape需要与out一致，除dim指定的维度外，其他维度的size需要小于等于self对应维度的size。'
  - 'index: index中的具体数值代表self对应dim轴上的下标，取值范围[-self.shape[dim], self.shape[dim] - 1]，index中的索引不支持越界。'
  - 'out: 数据类型需要与self一致。'
  error_conditions:
  - 传入的self、index或out是空指针。
  - self、index或out的数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的self、index或out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: self、index或out的数据类型不在支持的范围之内。
  evidence:
  - aclnnGatherGetWorkspaceSize
  - aclnnGather
  extraction_status: complete
  inputs:
  - name: self
    role: input
    dtype: DOUBLE、FLOAT16、BFLOAT16、FLOAT32、INT32、UINT32、INT64、UINT64、INT16、UINT16、INT8、UINT8、BOOL
    noncontiguous: 'yes'
    tensor_rank: 0..8
  - name: dim
    role: input
    value_constraints:
    - 'dim（int64_t）: 取值范围[-self.dim(), self.dim() - 1]。'
  - name: index
    role: input
    dtype: INT32、IND64
    noncontiguous: 'yes'
    tensor_rank: 0..8
    shape_constraints:
    - 'index（aclTensor*）: 维度数需要与self一致，且shape需要与out一致，除dim指定的维度外，其他维度的size需要小于等于self对应维度的size。'
    - 'index（aclTensor*）: index中的具体数值代表self对应dim轴上的下标，取值范围[-self.shape[dim], self.shape[dim]
      - 1]，index中的索引不支持越界。'
  outputs:
  - name: out
    role: output
    description: 输出aclTensor*。
    dtype: 与self一致
    noncontiguous: 'yes'
    output_relation:
    - 'out（aclTensor*）: 数据类型需要与self一致。'
- api_name: aclnnGatherNd
  doc_names:
  - aclnnGatherNd.md
  source_repo: ops-nn
  workspace_api: aclnnGatherNdGetWorkspaceSize
  execute_api: aclnnGatherNd
  summary: 接口功能：对于维度为**r≥1**的输入张量`self`，和维度**q≥1**的输入张量`indices`，将数据切片收集到维度为 **(q-1)
    + (r - indices_shape[-1])** 的输出张量out中。indices是一个**q**维的整型张量，可视作一个**q-1**维的由**索引对**构成的特殊张量（每个**索引对**是一个长度为**indices_shape[-1]**的一维张量，每个**索引对**指向**self**中一个切片）。
  constraints:
  - indices 的数据类型需要为 INT32 或 INT64。
  - negativeIndexSupport 控制是否支持负索引。
  - out 的数据类型需要与 self 一致。
  error_conditions:
  - 参数self、out是空指针。
  - 参数self的数据类型不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 参数self、out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 参数self的数据类型不在支持的范围内。
  evidence:
  - aclnnGatherNdGetWorkspaceSize
  - aclnnGatherNd
  extraction_status: complete
  inputs:
  - name: self
    role: input
    dtype: INT64、INT32、INT8、UINT8、BOOL、FLOAT、FLOAT16、BFLOAT16、DOUBLE、INT16、UINT16、UINT32、UINT64
    noncontiguous: 'yes'
    tensor_rank: 1..8
  - name: indices
    role: input
    dtype: INT32、INT64
    noncontiguous: 'yes'
  - name: negativeIndexSupport
    role: input
    dtype: BOOL
  outputs:
  - name: out
    role: output
    description: 输出aclTensor。
    dtype: 与self一致
    noncontiguous: 'yes'
