    code: '161001'
    description: 如果必选参数传入的是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 传入x、weight、antiquantScale、antiquantOffsetOptional、quantScaleOptional、quantOffsetOptional、biasOptional、y的shape维度不符合要求。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: 产品型号不支持。
