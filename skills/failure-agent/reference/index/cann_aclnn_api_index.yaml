  - aclnnMhcSinkhorn.md
  source_repo: ops-transformer
  workspace_api: aclnnMhcSinkhornGetWorkspaceSize
  execute_api: aclnnMhcSinkhorn
  summary: 接口功能：对mHC架构中的$\mathbf{H}'_{\text{res}}$矩阵执行Sinkhorn迭代归一化变换，最终得到双随机矩阵$\mathbf{H}_{\text{res}}$；支持输出迭代过程中的中间归一化结果（norm_out）和求和结果（sum_out），用于反向梯度计算。
  constraints:
  - 输入Tensor `x` 为空，报错`ACLNN_ERR_PARAM_NULLPTR`；。
  - 所有输入/输出Tensor的数据格式仅支持`ACL_FORMAT_ND`；。
  - 仅支持`FLOAT32`数据类型，不支持其他精度（如FLOAT16/DOUBLE）。
  - 输入-inf/inf/nan/，输出nan/nan/nan。
