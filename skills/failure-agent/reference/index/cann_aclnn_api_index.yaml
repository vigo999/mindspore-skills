    role: input
  - name: isSeqLensCumsum
    role: input
    dtype: bool
  outputs:
  - name: keyRef
    role: output
    dtype: 与keyCache保持一致
    tensor_rank: 2..3
    shape_constraints:
    - 'keyRef(aclTensor*): 当cacheMode为"Norm"时，shape为[num_tokens, num_heads, head_size_k]。'
    - 'keyRef(aclTensor*): 当cacheMode为"PA_NZ"时，shape为[num_tokens, num_heads * head_size_k]。'
