- api_name: aclnnInstanceNorm
  doc_names:
  - aclnnInstanceNorm.md
  source_repo: ops-nn
  workspace_api: aclnnInstanceNormGetWorkspaceSize
  execute_api: aclnnInstanceNorm
  summary: 接口功能：用于执行Instance Normalization（实例归一化）操作。与aclnnBatchNorm相比，aclnnInstanceNorm在每个样本的实例上进行归一化，而不是在整个批次上进行归一化，这使得该函数更适合处理图像等数据。
  constraints:
  - x，gamma，beta，y，mean，variance支持：FLOAT32、FLOAT16。
  - 数据格式支持：ND。
  - x，y的shape要求4维，gamma/beta的维度要求1维，且和x，y的C轴一致。
  - x，y的H\*W大小需要大于等于32Bytes，且C轴大于等于32Bytes。
  - 参数dataFormat仅支持"NHWC"和"NCHW"。
  - 当输入是Inf时，输出为Inf。
  - 当输入是NaN时，输出为NaN。
  - shape和输入`x`的C轴一致。
  - shape和数据类型与输入`x`的shape和数据类型保持一致。
  - shape与输入`x`满足broadcast关系（前2维的shape和输入x前2维的shape相同，前2维表示不需要norm的维度，其余维度大小为1）。
  - 数据类型与输入`x`的数据类型保持一致。
  - 数据类型与`x`的数据类型保持一致。
  error_conditions:
  - 传入的x，gamma，beta，y，mean，variance是空指针。
  - 传入的x，gamma，beta，y，mean，variance的数据类型不在支持范围内。
  - aclnn接口中间计算结果出现nullptr。
  - API内部创建aclOpExecutor失败。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x，gamma，beta，y，mean，variance是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 传入的x，gamma，beta，y，mean，variance的数据类型不在支持范围内。
  - name: ACLNN_ERR_INNER_NULLPTR
    code: '561103'
    description: aclnn接口中间计算结果出现nullptr。
  - name: ACLNN_ERR_INNER_CREATE_EXECUTOR
    code: '561101'
    description: API内部创建aclOpExecutor失败。
  evidence:
  - aclnnInstanceNormGetWorkspaceSize
  - aclnnInstanceNorm
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT32、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '4'
    optional_semantics:
    - 'x（aclTensor*）: 支持空Tensor。'
  - name: gamma
    role: input
    dtype: FLOAT32、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '1'
    optional_semantics:
    - 'gamma（aclTensor*）: 支持空Tensor。'
  - name: beta
    role: input
    dtype: FLOAT32、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '1'
    optional_semantics:
    - 'beta（aclTensor*）: 支持空Tensor。'
  - name: dataFormat
    role: input
  - name: eps
    role: input
  outputs:
