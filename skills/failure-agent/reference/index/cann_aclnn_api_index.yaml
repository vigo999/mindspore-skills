  - commAlg配置为""或nullptr：依照HCCL_INTRA_PCIE_ENABLE和HCCL_INTRA_ROCE_ENABLE环境变量配置，选择"fullmesh"或"hierarchy"公式。
  - 'commAlg配置为"fullmesh": 要求 = 2 \* (Bs \* epWorldSize \* min(localExpertNum, K)
    \* H \* sizeof(uint16) + 2MB)。'
  - 'commAlg配置为"hierarchy": 要求 >= (`moeExpertNum` + `epWorldSize` / 4) * Align512(`maxBs`
    * (`H` * 2 + 16 * Align8(`K`))) * 1B + 8MB，其中Align8(x) = ((x + 8 - 1) / 8) * 8，Align512(x)
    = ((x + 512 - 1) / 512) * 512。'
  - commAlg配置为""或者未配置时：要求 >= 2且满足>= 2 \* (localExpertNum \* maxBs \* epWorldSize \*
    Align512(Align32(2 \* H) + 44) + (K + sharedExpertNum) \* maxBs \* Align512(2
    \* H))，localExpertNum需使用MoE专家卡的本卡专家数，其中Align512(x) = ((x + 512 - 1) / 512) \*
    512，Align32(x) = ((x + 32 - 1) / 32) \* 32。
  - commAlg配置为"hierarchy"时：要求取值满足 (moeExpertNum \* maxBs * (H \* 2 + (3 \* (K + 7)
    / 8 \* 8)) * 4 + 64) + 404 \* 1024 \* 1024。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：该环境变量不再推荐使用，建议commAlg配置"hierarchy"。
  - 一个模型中的`aclnnMoeDistributeCombineV4`系列算子和`aclnnMoeDistributeDispatchV4`仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 一个模型中的`aclnnMoeDistributeCombineV4`系列算子和`aclnnMoeDistributeDispatchV4`仅支持相同TP通信域或都不支持TP通信域，有TP通信域时该通信域中不允许有其他算子。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：仅在commAlg配置为"hierarchy"场景下通信域支持跨超节点，其余场景要求一个通信域内的节点需在一个超节点内，不支持跨超节点。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：多机场景仅支持交换机组网，不支持双机直连组网。
  - moeExpertNum + zeroExpertNum + copyExpertNum + constExpertNum < MAX_INT32。
  - "当每个rank的Bs数一致时，globalBs = Bs * epWorldSize 或 0 \n当每个rank的Bs数不一致时，globalBs = maxBs\
    \ * epWorldSize，其中maxBs表示单卡Bs最大值。"
  error_conditions:
