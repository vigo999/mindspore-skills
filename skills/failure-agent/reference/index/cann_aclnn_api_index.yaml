    dtype: INT8、FLOAT8_E4M3FN、FLOAT8_E5M2、HIFLOAT8
    noncontiguous: 'yes'
    tensor_rank: 2..3
    optional_semantics:
    - 'yOut（aclTensor*）: 不支持空Tensor。'
  - name: scaleOut
    role: output
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 2..3
    shape_constraints:
    - 'scaleOut（aclTensor*）: 如果输入`x`的shape为[M, N]，输出`scaleOut`的shape维度为[ceil(M/rowBlockSize),
      ceil(N/colBlockSize)]。'
    - 'scaleOut（aclTensor*）: 如果输入`x`的shape为[B, M, N]，输出`scaleOut`的shape维度为[B, ceil(M/rowBlockSize),
      ceil(N/colBlockSize)]。'
    optional_semantics:
    - 'scaleOut（aclTensor*）: 不支持空Tensor。'
