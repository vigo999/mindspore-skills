  summary: 接口功能**：进行AlltoAllV通信，将数据写入对端GM。
  constraints:
  - aclnnMoeDistributeDispatchSetup接口，aclnnMoeDistributeDispatchTeardown接口，aclnnMoeDistributeCombineSetup接口，aclnnMoeDistributeCombineTeardown接口必须配套使用。
