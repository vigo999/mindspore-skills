  - aclnnL1LossBackward.md
  source_repo: ops-nn
  workspace_api: aclnnL1LossBackwardGetWorkspaceSize
  execute_api: aclnnL1LossBackward
  summary: 计算aclnnL1Loss的反向传播。reduction指定损失函数的计算方式，支持 'none'、'mean'、'sum'。'none' 表示不应用减少，'mean'
    表示输出的总和将除以输出中的元素数，'sum' 表示输出将被求和。
  constraints:
  - shape需要与self满足broadcast关系。
  - shape需要与gradOutput、target满足broadcast关系。
  - shape需要与gradOutput、self满足broadcast关系。
  error_conditions:
  - 传入的gradOutput、self、target和out是空指针。
  - self、gradOutput、target的数据类型不满足数据类型推导规则。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的gradOutput、self、target和out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: self、gradOutput、target的数据类型不满足数据类型推导规则。
  evidence:
  - aclnnL1LossBackwardGetWorkspaceSize
  - aclnnL1LossBackward
  extraction_status: complete
  inputs:
  - name: gradOutput
    role: input
    dtype: FLOAT、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
  - name: self
    role: input
    dtype: FLOAT、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
  - name: target
    role: input
    dtype: FLOAT、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
  - name: reduction
    role: input
    description: 指定要应用到输出的缩减。
    dtype: INT64
    noncontiguous: 'yes'
  outputs:
  - name: gradInput
    role: output
    description: 输出的损失
    dtype: FLOAT、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
- api_name: aclnnLSTM
  doc_names:
  - aclnnLSTM.md
  source_repo: ops-nn
  workspace_api: aclnnLSTMGetWorkspaceSize
  execute_api: aclnnLSTM
  summary: 接口功能：LSTM（Long Short-Term Memory，长短时记忆）网络是一种特殊的循环神经网络（RNN）模型。进行LSTM网络计算，接收输入序列和初始状态，返回输出序列和最终状态。
  constraints:
  - 所有支持FLOAT16、FLOAT32类型的输入和输出，它们的数据类型需要保持一致。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针。
  - 如果传入参数类型为aclTensor且其数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 如果传入参数类型为aclTensor且其数据类型不在支持的范围之内。
  evidence:
  - aclnnLSTMGetWorkspaceSize
  - aclnnLSTM
  extraction_status: partial
  inputs:
  - name: input
    role: input
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - "input: 若batchSizes传入空指针：\n \nshape格式根据batch_first参数区分：\n \n batch_first=False：(time_step,\
      \ batch_size, input_size)\n batch_first=True：(batch_size, time_step, input_size)\n\
      \ \n 说明：batch_first表示batch维度是否在第一维。"
    - "input: 若传入有效batchSizes：\n \nshape格式：(time_step * batch_size, input_size)\n\
      \ \n说明：内存排列与(time_step, batch_size, input_size)相同。"
  - name: params
    role: input
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    shape_constraints:
    - "params: 特殊场景（bidirection=True 且 has_biases=True）：\n \n 参数排布：[weight_ih_0, weight_hh_0,\
      \ bias_ih_0, bias_hh_0, weight_ih_reverse_0, weight_hh_reverse_0, bias_ih_reverse_0,\
      \ bias_hh_reverse_0]\n \n \n 核心参数说明（以第0层为例）：\n \n weight_ih_0：第0层输入权重参数，shape=(4\
      \ * hidden_size, cur_input_size)\n \n注：cur_input_size为每层输入特征数（首层=input_size。"
    - "params: 双向时=2*hidden_size）\n \n weight_hh_0：第0层隐藏层权重参数，shape=(4 * hidden_size,\
      \ hidden_size)\n bias_ih_0：第0层输入权重偏置，shape=(4 * hidden_size)\n bias_hh_0：第0层隐藏层权重偏置，shape=(4\
      \ * hidden_size)。"
  - name: hx
    role: optional_input
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'hx: 列表长度为2，列表中每个shape支持三维（D * num_layers, batch_size, hidden_size），若输入为空，则表示输入的初始hidden和cell状态为0。'
    optional_semantics:
    - 'hx: 列表长度为2，列表中每个shape支持三维（D * num_layers, batch_size, hidden_size），若输入为空，则表示输入的初始hidden和cell状态为0。'
  - name: batchSizes
    role: optional_input
    dtype: INT64
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'batchSizes: shape为(time_step,)。'
  - name: hasBias
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
  - name: numLayers
    role: input
    dtype: INT64
    noncontiguous: 'yes'
  - name: droupout
    role: input
    dtype: DOUBLE
    noncontiguous: 'yes'
    tensor_rank: '1'
  - name: train
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
  - name: bidirection
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
  - name: batchFirst
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
  outputs:
  - name: output
    role: output
    description: 表示LSTM运算中最后一层每个时间步的输出结果。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'output: 若batchSizes传入空指针：

      当batch_first=False时shape支持三维（time_step, batch_size, D * hidden_size），否则支持三维（batch_size,
      time_step, D * hidden_size）。'
    - 'output: 若传入有效batchSizes：

      shape应为(time_step, batch_size, D * hidden_size)。'
  - name: hy
    role: output
    description: 表示进行LSTM运算中每层最后一个时间步的隐藏层（公式（7）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'hy: shape支持三维（D * num_layers, batch_size, hidden_size。'
  - name: cy
    role: output
    description: 表示进行LSTM运算中每层最后一个时间步的Cell状态（公式（5）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'cy: shape支持三维（D * num_layers, batch_size, hidden_size。'
  - name: hy
    role: output
    description: 表示进行LSTM运算中每层最后一个时间步的隐藏层（公式（7）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'hy: shape支持三维（D * num_layers, batch_size, hidden_size。'
  - name: cy
    role: output
    description: 表示进行LSTM运算中每层最后一个时间步的Cell状态（公式（5）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'cy: shape支持三维（D * num_layers, batch_size, hidden_size。'
  - name: iOut
    role: output
    description: 表示LSTM运算中每层输入门的激活值（sigmoid输出，公式（2）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'iOut: 列表长度为 D * num_layers，列表中每个shape支持三维（time_step, batch_size, hidden_size），当train=False时，无输出值。'
  - name: jOut
    role: output
    description: 表示LSTM运算中每层的候选cell状态（tanh输出，公式（4）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'jOut: 列表长度为 D * num_layers，列表中每个shape支持三维（time_step, batch_size, hidden_size），当train=False时，无输出值。'
  - name: fOut
    role: output
    description: 表示进行LSTM运算中每层遗忘门的激活值（sigmoid输出，公式（1）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'fOut: 列表长度为 D * num_layers，列表中每个shape支持三维（time_step, batch_size, hidden_size），当train=False时，无输出值。'
  - name: oOut
    role: output
    description: 表示进行LSTM运算中每层输出门的激活值（sigmoid输出，公式（3）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'oOut: 列表长度为 D * num_layers，列表中每个shape支持三维（time_step, batch_size, hidden_size），当train=False时，无输出值。'
  - name: hOut
    role: output
    description: 表示进行LSTM运算中每层的隐藏层（公式（7）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'hOut: 列表长度为 D * num_layers，列表中每个shape支持三维（time_step, batch_size, hidden_size），当train=False时，无输出值。'
  - name: cOut
    role: output
    description: 表示进行LSTM运算中每层的最终Cell状态（公式（5）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'cOut: 列表长度为 D * num_layers，列表中每个shape支持三维（time_step, batch_size, hidden_size），当train=False时，无输出值。'
  - name: tanhCOut
    role: output
    description: 表示进行LSTM运算中每层最终cell状态经过tanh激活函数后的输出（公式（6）的输出）。
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'tanhCOut: 列表长度为 D * num_layers，列表中每个shape支持三维（time_step, batch_size, hidden_size），当train=False时，无输出值。'
- api_name: aclnnLayerNorm
  doc_names:
  - aclnnLayerNorm&aclnnLayerNormWithImplMode.md
  source_repo: ops-nn
  workspace_api: aclnnLayerNormGetWorkspaceSize
  execute_api: aclnnLayerNorm
  summary: 接口功能：对指定层进行均值为0、标准差为1的归一化计算。aclnnLayerNormWithImplMode接口相比aclnnLayerNorm接口，可以通过配置impl_mode参数选择不同的归一化实现策略，以适应不同的应用场景和性能需求。
  constraints:
  - input、normalizedShape、weightOptional（非空时）、biasOptional（非空时）、out、meanOutOptional（非空时）或rstdOutOptional（非空时）的shape不超过8维。
  - shape与`normalizedShape`相等，为[R1,...,Rj]。
  - shape需要与`input`的shape相等，为[A1,...,Ai,R1,...,Rj]。
  - 数据类型与`input`的数据类型保持一致。
  error_conditions:
  - 传入的input、normalizedShape或out为空指针。
  - input、normalizedShape、weightOptional（非空时）、biasOptional（非空时）、out、meanOutOptional（非空时）、rstdOutOptional（非空时），shape的维度超过8维。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的input、normalizedShape或out为空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: input、normalizedShape、weightOptional（非空时）、biasOptional（非空时）、out、meanOutOptional（非空时）、rstdOutOptional（非空时），shape的维度超过8维。
  evidence:
  - aclnnLayerNormGetWorkspaceSize
  - aclnnLayerNorm
  extraction_status: complete
  inputs:
  - name: input
    role: input
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    shape_constraints:
    - 'input（aclTensor*）: shape为[A1,...,Ai,R1,...,Rj]，其中A1至Ai表示无需norm的维度，R1至Rj表示需norm的维度。'
    optional_semantics:
    - 'input（aclTensor*）: 支持空Tensor。'
  - name: normalizedShape
    role: input
    dtype: INT64
    shape_constraints:
    - 'normalizedShape（aclIntArray*）: 值为[R1,...,Rj]，长度小于等于输入input的shape长度，不支持为空。'
    optional_semantics:
    - 'normalizedShape（aclIntArray*）: 值为[R1,...,Rj]，长度小于等于输入input的shape长度，不支持为空。'
  - name: weightOptional
    role: input
    description: 可选输入参数，表示进行归一化计算的权重。对应公式中的`weightOptional`。
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    shape_constraints:
    - 'weightOptional（aclTensor*）: 当`weightOptional`为空时，接口内部会构造一个shape为[R1,...,Rj]，数据全为1的Tensor。'
    optional_semantics:
    - 'weightOptional（aclTensor*）: 支持空Tensor。'
    - 'weightOptional（aclTensor*）: 当`weightOptional`为空时，接口内部会构造一个shape为[R1,...,Rj]，数据全为1的Tensor。'
  - name: biasOptional
    role: input
    description: 可选输入参数，表示进行归一化计算的偏移量。对应公式中的`biasOptional`。
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    shape_constraints:
    - 'biasOptional（aclTensor*）: 当`biasOptional`为空时，接口内部会构造一个shape为[R1,...,Rj]，数据全为0的Tensor。'
    optional_semantics:
    - 'biasOptional（aclTensor*）: 支持空Tensor。'
    - 'biasOptional（aclTensor*）: 当`biasOptional`为空时，接口内部会构造一个shape为[R1,...,Rj]，数据全为0的Tensor。'
  - name: eps
    role: input
  outputs:
  - name: out
    role: output
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    optional_semantics:
    - 'out（aclTensor*）: 支持空Tensor。'
  - name: meanOutOptional
    role: output
    description: 可选输出，表示进行归一化后的均值。对应公式中的`meanOutOptional`。
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    shape_constraints:
    - 'meanOutOptional（aclTensor*）: 当`rstdOutOptional`存在时与`rstdOutOptional`的shape相同，shape为[A1,...,Ai,1,...,1]，Ai后共有j个1，与需要norm的轴长度保持相同。'
    optional_semantics:
    - 'meanOutOptional（aclTensor*）: 支持空Tensor。'
  - name: rstdOutOptional
    role: output
    description: 可选输出，表示进行归一化后的标准差倒数。对应公式中的`rstdOutOptional`。
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..8
    shape_constraints:
