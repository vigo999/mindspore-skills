  execute_api: aclnnMatmulAllReduce
  summary: 接口功能**：完成MatMul计算与AllReduce通信融合。
  constraints:
  - 增量场景不使能MC2，全量场景使能MC2。
  - 输入x1可为二维或者三维，其shape为(b, s, k)或者(m, k)。x2必须是二维，其shape为(k, n)，轴满足mm算子入参要求，k轴相等。bias若非空，其shape为(n)。
  - b*s、m、k、n的值均不得超过2147483647(INT32_MAX)。
  - 当输入x1的shape为(b, s, k)时，输出output的shape为(b, s, n)，当输入x1的shape为(m, k)时，输出output的shape为(m,
    n)。
  - x1、x2、bias计算输入的数据类型要和output计算输出的数据类型一致。
  - 仅支持HCCS链路all mesh组网。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持1、2、4、8卡。
  - Ascend 950PR/Ascend 950DT：支持1、2、4、8、16、32、64卡。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：一个模型中的通算融合MC2算子，仅支持相同通信域。
  - 支持k为0的场景，输出为bias。
  - 支持bs/m/n为0，此时传入的输出也应该是空tensor，此场景不进入kernel计算，直接返回。
  error_conditions:
  - 传入的x1、x2或output是空指针。
  - x1、x2、bias或output的数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2或output是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、bias或output的数据类型不在支持的范围之内。
  evidence:
  - aclnnMatmulAllReduceGetWorkspaceSize
  - aclnnMatmulAllReduce
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'no'
    tensor_rank: 2..3
  - name: x2
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'no'
    tensor_rank: '2'
  - name: bias
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 0..1
  - name: group
    role: input
    dtype: String
  - name: reduceOp
    role: input
    dtype: String
  - name: commTurn
    role: input
    dtype: INT64
  - name: streamMode
    role: input
    dtype: INT64
  outputs:
