- api_name: aclnnLightningIndexer
  doc_names:
  - aclnnLightningIndexer.md
  source_repo: ops-transformer
  workspace_api: aclnnLightningIndexerGetWorkspaceSize
  execute_api: aclnnLightningIndexer
  summary: 接口功能：`lightning_indexer`基于一系列操作得到每一个token对应的Top-$k$个位置。
  constraints:
  - 参数query中的N支持小于等于64，key的N支持1。
  - headdim支持128。
  - block_size取值为16的倍数，最大支持1024。
  - 参数query、key的数据类型应保持一致。
  - 参数weights不为`float32`时，参数query、key、weights的数据类型应保持一致。
  error_conditions: []
  return_codes: []
  evidence:
  - aclnnLightningIndexerGetWorkspaceSize
  - aclnnLightningIndexer
  extraction_status: partial
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - "query: layout_query为BSND时，shape为(B,S1,N1,D)。\n layout_query为TND时，shape为(T1,N1,D)。"
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - "key: layout_key为PA_BSND时，shape为(block_num, block_size, N2, D)。\n layout_kv为BSND时，shape为(B,\
      \ S2, N2, D)。\n layout_kv为TND时，shape为(T2, N2, D)。"
  - name: weights
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT
    shape_constraints:
    - "weights: layout_query为BSND时，shape为(B,S1,N1)。\n layout_query为TND时，shape为(T1,N1)。"
  - name: actualSeqLengthsQueryOptional
    role: input
    dtype: INT32
    shape_constraints:
    - 'actualSeqLengthsQueryOptional: (B,)。'
    value_constraints:
    - 'actualSeqLengthsQueryOptional: 该入参中每个Batch的有效token数不超过`query`中的维度S大小且不小于0，支持长度为B的一维tensor。'
    optional_semantics:
    - 'actualSeqLengthsQueryOptional: 如果不指定seqlen可传入None，表示和`query`的shape的S长度相同。'
    - 'actualSeqLengthsQueryOptional: 当`layout_query`为TND时，该入参必须传入，且以该入参元素的数量作为B值，该入参中每个元素的值表示当前batch与之前所有batch的token数总和，即前缀和，因此后一个元素的值必须大于等于前一个元素的值。'
  - name: actualSeqLengthsKeyOptional
    role: input
    dtype: INT32
    shape_constraints:
    - 'actualSeqLengthsKeyOptional: (B,)。'
    value_constraints:
    - 'actualSeqLengthsKeyOptional: 该参数中每个Batch的有效token数不超过`key/value`中的维度S大小且不小于0，支持长度为B的一维tensor。'
    optional_semantics:
    - 'actualSeqLengthsKeyOptional: 如果不指定seqlen可传入None，表示和key的shape的S长度相同。'
    - 'actualSeqLengthsKeyOptional: 当`layout_key`为TND或PA_BSND时，该入参必须传入，`layout_key`为TND，该参数中每个元素的值表示当前batch与之前所有batch的token数总和，即前缀和，因此后一个元素的值必须大于等于前一个元素的值。'
  - name: blockTableOptional
    role: input
    dtype: INT32
    shape_constraints:
    - 'blockTableOptional: shape支持(B,S2/block_size)。'
    value_constraints:
    - 'blockTableOptional: PageAttention场景下，block\_table必须为二维，第一维长度需要等于B，第二维长度不能小于maxBlockNumPerSeq（maxBlockNumPerSeq为每个batch中最大actual\_seq\_lengths\_key对应的block数量）。'
  - name: layoutQueryOptional
    role: input
    dtype: STRING
    tensor_rank: 3|4
    layout_templates:
    - BSND
    - TND
    optional_semantics:
    - 'layoutQueryOptional: 用户不特意指定时可传入默认值"BSND"。'
  - name: layoutKeyOptional
    role: input
    dtype: STRING
    tensor_rank: 3|4
    layout_templates:
    - BSND
    - TND
    optional_semantics:
    - 'layoutKeyOptional: 用户不特意指定时可传入默认值"BSND"。'
  - name: sparseCount
    role: input
    dtype: INT32
  - name: sparseMode
    role: input
    dtype: INT32
  - name: preTokens
    role: input
    dtype: INT64
    optional_semantics:
    - 'preTokens: 仅支持默认值2^63-1。'
  - name: nextTokens
    role: input
    dtype: INT64
    optional_semantics:
    - 'nextTokens: 仅支持默认值2^63-1。'
  - name: returnValues
    role: input
    description: 表示是否输出sparseValuesOut。
    dtype: BOOL
    optional_semantics:
    - "returnValues: 默认值为False\n 仅在训练且layout_key不为PA_BSND场景支持。"
  outputs:
  - name: sparseIndicesOut
    role: output
    description: 公式中的Indices输出。
    dtype: INT32
    shape_constraints:
    - "sparseIndicesOut: layout_query为\"BSND\"时输出shape为[B, S1, N2, sparseCount]。\n\
      \ layout_query为\"TND\"时输出shape为[T1, N2, sparseCount]。"
  - name: sparseValuesOut
    role: output
    description: 公式中的Indices输出对应的value值。
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'sparseValuesOut: shape与sparseIndicesOut保持一致。'
