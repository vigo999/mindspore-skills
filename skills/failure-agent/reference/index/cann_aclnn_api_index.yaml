    code: '161002'
    description: 传入的x1、x2、x1Scale、x2Scale、bias、quantScale、output、gatherOut或amaxOut的数据类型和维度不在支持的范围内。
  evidence:
  - aclnnAllGatherMatmulV2GetWorkspaceSize
  - aclnnAllGatherMatmulV2
  extraction_status: complete
  inputs:
