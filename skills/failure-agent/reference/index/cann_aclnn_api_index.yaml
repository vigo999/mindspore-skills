  - N（Head-Num）：取值为64。
  - G（Group）：取值为64。
  - S1（Seq-LengthQ）：取值范围为1\~128K。
  - S2（Seq-LengthK）：取值范围为topK\~128K。
  - D（Head-Dim）：取值为128。
  - TopK：取值为2048。
