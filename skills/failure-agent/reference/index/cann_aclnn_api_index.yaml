- api_name: aclnnFusedCausalConv1d
  doc_names:
  - aclnnFusedCausalConv1d.md
  source_repo: ops-transformer
  workspace_api: aclnnFusedCausalConv1dGetWorkspaceSize
  execute_api: aclnnFusedCausalConv1d
  summary: 接口功能：对序列执行因果一维卷积，沿序列维度使用缓存数据（长度为卷积核宽减1）对各序列头部进行padding，确保输出依赖当前及历史输入；卷积完成后，将当前序列尾部的数据（长度为卷积核宽减1）更新到缓存；在因果一维卷积输出的基础上，将原始输入加到输出上以实现残差连接。
  constraints:
  - x支持2维[cu_seq_len, dim]。
  - weight必须是2维[K, dim]，其中K固定为3。
  - convStates必须是3维[..., K-1, dim]，第0维大小不固定且大于等于batch。
  - cu_seq_len范围[batch, 65536]，dim范围[128, 16384]且是128的倍数，batch范围[1, 256]。
  - x支持3维[batch, seq_len, dim]。
  - convStates必须是3维[..., K-1+seq_len-1, dim]，第0维大小不固定且大于等于batch。
  - seq_len范围[1, 6]，dim范围[128, 16384]且是128的倍数，batch范围[1, 256]。
  - convStates必须是3维[..., state_len, dim]，第0维大小不固定且大于等于batch，state_len必须大于所有batch中最大的token个数加1。
  - cu_seq_len范围[batch, batch*6]，每个batch的token个数范围为[1, 6]。dim范围[128, 16384]且是128的倍数，batch范围[1,
    256]。
  - queryStartLoc是累计偏移量，取值范围[0, cu_seq_len]，长度为batch+1，queryStartLoc[i]表示第i个序列的起始偏移，queryStartLoc[batch+1]表示最后一个序列的结束位置。
  - cacheIndices长度为batch，指定每个序列对应的缓存槽索引。
  - numAcceptedTokens分为None和非None，非None情况下长度为batch，每个元素取值不超过当前batch的token个数且大于0。
  error_conditions:
  - 传入的x、weight、convStates、y是空指针。
  - '输入和输出的数据类型不在支持的范围内。

    x、weight、convStates、bias、y的数据类型不一致。

    queryStartLoc、cacheIndices、initialStateMode、numAcceptedTokens的数据类型不一致。'
  - "输入、输出Tensor的shape不在支持的范围内。\n\n 输入的属性不在支持的范围内。\n\n dim不在指定的取值范围内。"
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x、weight、convStates、y是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: '输入和输出的数据类型不在支持的范围内。

      x、weight、convStates、bias、y的数据类型不一致。

      queryStartLoc、cacheIndices、initialStateMode、numAcceptedTokens的数据类型不一致。'
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: "输入、输出Tensor的shape不在支持的范围内。\n\n 输入的属性不在支持的范围内。\n\n dim不在指定的取值范围内。"
  evidence:
  - aclnnFusedCausalConv1dGetWorkspaceSize
  - aclnnFusedCausalConv1d
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 2..3
    shape_constraints:
    - 'x: prefill场景：shape为[cu_seq_len, dim]。'
    - 'x: decode场景：shape为[cu_seq_len, dim]或[batch, seq_len, dim]。'
  - name: weight
    role: input
    dtype: 数据类型与x一致
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'weight: shape为[K, dim]。'
  - name: queryStartLoc
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'queryStartLoc: shape为[batch+1]queryStartLoc[i]表示第i个序列的起始偏移。'
  - name: cacheIndices
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'cacheIndices: shape为[batch]。'
  - name: initialStateMode
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'initialStateMode: shape为[batch]取值为0、1、2

      0：零填充

      1：使用缓存

      2：使用缓存但前K-1个输出置0。'
  - name: bias
    role: input
    dtype: 数据类型与x一致
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'bias: shape为[dim]。'
  - name: numAcceptedTokens
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'numAcceptedTokens: shape为[batch]。'
  - name: activationMode
    role: input
    dtype: INT64
    optional_semantics:
    - 'activationMode: 取值为0、1、2

      0：None

      1：silu

      2：swish。'
  - name: padSlotId
    role: input
    dtype: INT64
  - name: runMode
    role: input
    dtype: INT64
    value_constraints:
    - 'runMode: 取值为0、1

      0：prefill场景

      1：decode场景。'
  - name: residualConnection
    role: input
    dtype: INT64
    value_constraints:
    - 'residualConnection: 取值为0、1

      0：不做残差连接

      1：输出y和输入x相加后输出。'
  outputs:
  - name: convStates
    role: output
    dtype: 数据类型与x一致
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'convStates: shape为[..., K-1, dim]。'
  - name: y
    role: output
    description: 输出序列
    dtype: 数据类型与x一致
    tensor_rank: 2..3
    shape_constraints:
    - 'y: shape与x一致。'
