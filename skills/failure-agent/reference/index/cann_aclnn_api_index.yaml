  - aclnnQr
  extraction_status: complete
  inputs:
  - name: self
    role: input
    dtype: FLOAT、FLOAT16、DOUBLE、COMPLEX64、COMPLEX128
    noncontiguous: 'yes'
    shape_constraints:
    - 'self: 支持非连续的Tensor，数据格式支持ND，shape维度至少为2且不大于8, shape形如[..., M, N], 其中...表示0-6维。'
  - name: some
    role: input
    description: 该参数决定了Q是否为方阵。设为false时，Q为方阵，例如A[..., M, N]，输出完整的Q[..., M, M]、R[...,M,
      N]；设为true时，Q为瘦矩阵，例如A[..., M, N]，输出Q[..., M, K]、R[..., K, N]，其中K为M、N的最小值。
