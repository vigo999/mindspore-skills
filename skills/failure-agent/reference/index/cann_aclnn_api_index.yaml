- api_name: aclnnWeightQuantMatmulAllReduce
  doc_names:
  - aclnnWeightQuantMatmulAllReduce.md
  source_repo: ops-transformer
  workspace_api: aclnnWeightQuantMatmulAllReduceGetWorkspaceSize
  execute_api: aclnnWeightQuantMatmulAllReduce
  summary: 接口功能**：对入参x2进行伪量化计算后，完成Matmul和AllReduce计算。支持pertensor、perchannel、pergroup量化方式。
  constraints:
  - 增量场景不使能MC2，全量场景使能MC2。
  - 输入x1可为二维或者三维，其shape为(b, s, k)或者(m, k)。
  - x2必须是二维。其shape为(k, n)，k轴满足mm算子入参要求，k轴相等，m的范围为[1, 2147483647]，k、n的范围为[1, 65535]。
  - 传入的x1、x2、antiquantScale或者output不为空指针。
  - 当输入x1的shape为(b, s, k)时，x3（非空场景）与输出output的shape为(b, s, n)；当输入x1的shape为(m, k)时，x3（非空场景）与输出output的shape为(m,
    n)。
  - bias若非空，shape大小与output最后一维大小相等。antiquantScale在pertensor场景下shape为(1)，在perchannel场景下shape为(1,n)/(n)，在pergroup场景shape为(ceil(k,antiquantGroupSize),
    n)。antiquantOffset若非空，其shape与antiquantScale一致。
  - x1和x2，x3（非空场景）、antiquantScale、antiquantOffset（非空场景）、output、bias（非空场景）的数据类型和数据格式需要在支持的范围之内。
  - x1，antiquantScale，antiquantOffset（非空场景），x3（非空场景）、bias（非空场景）、output的数据类型相同。antiquantGroupSize取值满足取值范围且为32倍数。
  - pergroup场景下，x2转置时，antiquantScale和antiquantOffset需要一起转置，保持连续性。
  - 在长序列场景，随着b/s或者m的增大，可能出现OOM或者计算超时。
  - 仅支持hccs链路all mesh组网。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持1、2、4、8卡。
  - Ascend 950PR/Ascend 950DT：支持1、2、4、8、16、32、64卡。
  - 一个模型中的通算融合MC2算子，仅支持相同通信域。
  - 输入x2的数据格式支持ND（当前版本仅支持二维输入）和`FRACTAL_NZ`格式（当前版本仅支持四维输入）。当x2的数据格式为`FRACTAL_NZ`时，配合aclnnCalculateMatmulWeightSizeV2和aclnnTransMatmulWeight完成输入ND到NZ的转换，非连续的tensor仅支持transpose场景。
  - 输入x2的数据格式支持ND（仅支持2D输入）。当前版本，当数据类型为INT8时，要求N、K为32对齐；当数据类型为INT4时，要求N、K为64对齐。
  - 仅支持k为0的场景，输出为bias + x3，不支持bs/m/n为0的空tensor输入。
  - Ascend 950PR/Ascend 950DT。
  error_conditions:
  - 传入的x1、x2、antiquantScale或output是空指针。
  - x1、x2、bias、antiquantScale、antiquantOffset、x3或output的数据类型不符合要求。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2、antiquantScale或output是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、bias、antiquantScale、antiquantOffset、x3或output的数据类型不符合要求。
  evidence:
  - aclnnWeightQuantMatmulAllReduceGetWorkspaceSize
  - aclnnWeightQuantMatmulAllReduce
