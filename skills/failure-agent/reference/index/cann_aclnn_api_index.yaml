    description: 正向计算的第三个输出，表示input的标准差的倒数，对应计算公式中的rstd。
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    shape_constraints:
    - 'rstd（aclTensor*）: shape与mean的shape相等，为[A1,...,Ai,1,...,1]，Ai后共有j个1，与需要norm的轴长度保持相同。'
