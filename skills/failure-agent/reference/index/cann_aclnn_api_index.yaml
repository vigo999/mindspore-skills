- api_name: aclnnQkvRmsNormRopeCache
  doc_names:
  - aclnnQkvRmsNormRopeCache.md
  source_repo: ops-transformer
  workspace_api: aclnnQkvRmsNormRopeCacheGetWorkspaceSize
  execute_api: aclnnQkvRmsNormRopeCache
  summary: 接口功能：输入qkv融合张量，通过SplitVD拆分q、k、v张量，执行RmsNorm、ApplyRotaryPosEmb、Quant、Scatter融合操作，输出qOut、kCache、vCache、qBeforeQuant(可选)、kBeforeQuant(可选)、vBeforeQuant(可选)。
  constraints:
  - Bqkv为输入qkv的batch_size，Sqkv为输入qkv的sequence length，大小由qkvSize决定。
  - Nqkv为输入qkv的head number。Dqkv为输入qkv的head dim，目前仅支持128。Dq、Dk和Dk分别为q、k、v的head dim，要求Dqkv
    = Dq = Dk = Dv，Dqkv需要满足（Dqkv*qkv数据类型占字节数）可以被32整除。
  - 根据rope规则，Dk和Dq为偶数。若cacheMode为PA_NZ场景下，Dk、Dq需32B对齐；BlockSize需32B对齐。
  - 关于上述32B对齐的情形，对齐值由cache的数据类型决定。以BlockSize为例，若cache的数据类型为int8，则需要满足BlockSize % 32
    = 0；若cache的数据类型为float16，则需要满足BlockSize % 16 = 0；若kCache与vCache参数的dtype不一致，BlockSize需同时满足BlockSize
    % 32 = 0和BlockSize % 16 = 0。
  - BlockNum为写入cache的内存块数，大小由用户输入场景决定，要求BlockNum >= Ceil(Sqkv / BlockSize) * Bqkv。
  - 使用requireMemory表示存放数据所需的空间大小，需满足：requireMemory >= (Bqkv * Sqkv * Nqkv * Dqkv +
    2 * Dqkv + 2 * Bqkv * Sqkv * Dqkv + Bqkv * Sqkv * Nq * Dqkv + BlockNum * BlockSize
    * Nv * Dqkv + BlockNum * BlockSize * Nk * Dqkv) * sizeof(FLOAT16) + Bqkv * Sqkv
    * sizeof(INT64) + (2 * Nk * Dqkv + 2 * Nv) * sizeof(FLOAT)，当计算出requireMemory的大小超过当前AI处理器的GM空间总大小，不支持使用该接口。
  - 对于index，要求index的value值范围为-1, BlockNum * BlockSize)。value数值不可以重复，index为-1时，代表跳过更新。
  - kScaleOptional, vScaleOptional表示对称量化的缩放因子，因此若传参，则值不能为0。
  error_conditions:
  - 传入的qkv、qGamma、kGamma、cos、sin等为空指针。
  - 输入或输出的数据类型不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的qkv、qGamma、kGamma、cos、sin等为空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入或输出的数据类型不在支持的范围内。
