    optional_semantics:
    - 'rstdOutOptional（aclTensor*）: 支持空Tensor。'
- api_name: aclnnLayerNormBackward
  doc_names:
  - aclnnLayerNormBackward.md
  source_repo: ops-nn
  workspace_api: aclnnLayerNormBackwardGetWorkspaceSize
  execute_api: aclnnLayerNormBackward
  summary: 接口功能：aclnnLayerNorm的反向传播。用于计算输入张量的梯度，以便在反向传播过程中更新模型参数。
  constraints:
  - 'gradOut: shape与input的shape相等，为[A1,...,Ai,R1,...,Rj], shape长度大于等于normalizedShape的长度。'
  - 'input: shape与gradOut的shape相等，为[A1,...,Ai,R1,...,Rj], shape长度大于等于normalizedShape的长度。'
  - 'normalizedShape: 值为[R1,...,Rj], 长度小于等于输入input的shape长度，不支持为空。'
  - 'mean: shape与rstd的shape相等，为[A1,...,Ai,1,...,1]，Ai后共有j个1，与需要norm的轴长度保持相同。'
  error_conditions:
  - 传入的gradOut、input、normalizedShape、mean、rstd、outputMask为空指针。
  - gradOut、input、mean、rstd、weightOptional（非空时）或biasOptional（非空时）的数据类型不在支持范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的gradOut、input、normalizedShape、mean、rstd、outputMask为空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: gradOut、input、mean、rstd、weightOptional（非空时）或biasOptional（非空时）的数据类型不在支持范围内。
  evidence:
  - aclnnLayerNormBackwardGetWorkspaceSize
  - aclnnLayerNormBackward
  extraction_status: complete
  inputs:
  - name: gradOut
    role: input
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    shape_constraints:
    - 'gradOut（aclTensor*）: shape与input的shape相等，为[A1,...,Ai,R1,...,Rj], shape长度大于等于normalizedShape的长度。'
    optional_semantics:
    - 'gradOut（aclTensor*）: 不支持空Tensor。'
  - name: input
    role: input
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    shape_constraints:
    - 'input（aclTensor*）: shape与gradOut的shape相等，为[A1,...,Ai,R1,...,Rj], shape长度大于等于normalizedShape的长度。'
    optional_semantics:
    - 'input（aclTensor*）: 不支持空Tensor。'
  - name: normalizedShape
    role: input
    dtype: INT64
    shape_constraints:
    - 'normalizedShape（aclIntArray*）: 值为[R1,...,Rj], 长度小于等于输入input的shape长度，不支持为空。'
    optional_semantics:
    - 'normalizedShape（aclIntArray*）: 值为[R1,...,Rj], 长度小于等于输入input的shape长度，不支持为空。'
  - name: mean
    role: input
    description: 正向计算的第二个输出，表示input的均值，对应计算公式中的mean。
    dtype: FLOAT32、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    shape_constraints:
    - 'mean（aclTensor*）: shape与rstd的shape相等，为[A1,...,Ai,1,...,1]，Ai后共有j个1，与需要norm的轴长度保持相同。'
    optional_semantics:
    - 'mean（aclTensor*）: 不支持空Tensor。'
  - name: rstd
