    block_size, elenum_aligned，数据格式必须时FRACTAL_NZ。'
  - 'valueCache: 当cacheMode为"Norm"时，shape为[num_blocks, block_size, num_heads, head_size_k]，数据格式必须时ND。'
  - 'valueCache: 当cacheMode为"PA_NZ"时，shape为num_blocks, num_heads * head_size_k //
    elenum_aligned, block_size, elenum_aligned，数据格式必须时FRACTAL_NZ。'
  error_conditions:
  - 输入是空指针。
  - 输入数据类型不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入数据类型不在支持的范围内。
