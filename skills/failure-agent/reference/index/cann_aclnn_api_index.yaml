- api_name: aclnnMoeGatingTopK
  doc_names:
  - aclnnMoeGatingTopK.md
  source_repo: ops-transformer
  workspace_api: aclnnMoeGatingTopKGetWorkspaceSize
  execute_api: aclnnMoeGatingTopK
  summary: 算子功能：MoE计算中，对输入x做Sigmoid或者SoftMax计算，对计算结果分组进行排序，最后根据分组排序的结果选取前k个专家。
  constraints:
  - x最后一维（即专家数）要求不大于2048。
  - 要求1 <= k <= x_shape[-1] / groupCount * kGroup。
  - 要求1 <= kGroup <= groupCount，并且kGroup * x_shape[-1] / groupCount的值要大于等于k。
  - 要求groupCount > 0，x_shape[-1]能够被groupCount整除且整除后的结果大于groupSelectMode，并且整除的结果按照32个数对齐后乘groupCount的结果不大于2048。
  - renorm仅支持0，表示先进行norm操作，再计算topk。
  - groupSelectMode取值0和1，0表示使用最大值对group进行排序, 1表示使用topk2的sum值对group进行排序。
  - normType取值0和1，0表示使用Softmax函数，1表示使用Sigmoid函数。
  - outFlag取值true和false，true表示输出，false表示不输出。
  error_conditions:
  - 计算输入和计算输出是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  - "x的shape不满足要求。\n\n x和biasOptional的shape不匹配。\n\n k的大小不在1到x_shape[-1] / groupCount\
    \ * kGroup之间。\n\n kGroup的大小不在1到groupCount之间。\n\n 每个group的专家数按32对齐之后\n\n 计算输入参数的值不满足要求。"
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 计算输入和计算输出是空指针。
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: "x的shape不满足要求。\n\n x和biasOptional的shape不匹配。\n\n k的大小不在1到x_shape[-1]\
      \ / groupCount * kGroup之间。\n\n kGroup的大小不在1到groupCount之间。\n\n 每个group的专家数按32对齐之后\n\
      \n 计算输入参数的值不满足要求。"
  evidence:
  - aclnnMoeGatingTopKGetWorkspaceSize
  - aclnnMoeGatingTopK
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 0..8
  - name: biasOptional
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 0..8
    shape_constraints:
    - 'biasOptional: shape值与x最后一维相等。'
  - name: k
    role: input
    dtype: INT64
  - name: kGroup
    role: input
    dtype: INT64
  - name: groupCount
    role: input
    dtype: INT64
  - name: groupSelectMode
    role: input
    dtype: INT64
  - name: renorm
    role: input
    dtype: INT64
  - name: normType
    role: input
    dtype: INT64
  - name: outFlag
    role: input
    description: 表示是否输出norm操作结果。
    dtype: BOOL
  - name: routedScalingFactor
    role: input
    dtype: DOUBLE
  - name: eps
    role: input
    dtype: DOUBLE
  outputs:
  - name: yOut
    role: output
    dtype: FLOAT16、BFLOAT16、FLOAT32
    tensor_rank: 0..8
    output_relation:
    - 'yOut: 数据类型与x需要保持一致。'
  - name: expertIdxOut
    role: output
    dtype: INT32
    tensor_rank: 0..8
    shape_constraints:
    - 'expertIdxOut: shape要求与yOut一致。'
  - name: outOut
    role: output
    description: norm计算的输出结果，对应公式中的`normOut`。
    dtype: FLOAT32
    tensor_rank: 0..8
    shape_constraints:
    - 'outOut: shape要求与x保持一致。'
