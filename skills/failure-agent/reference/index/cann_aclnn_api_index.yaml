  source_repo: ops-transformer
  workspace_api: aclnnNsaCompressWithCacheGetWorkspaceSize
  execute_api: aclnnNsaCompressWithCache
  summary: 接口功能：用于Native-Sparse-Attention推理阶段的KV压缩，每次推理每个batch会产生一个新的token，每当某个batch的token数量凑满一个compress_block时，该算子会将该batch的后compress_block个token压缩成一个compress_token。
  constraints:
  - outputCache的N和D和input一致，而且要满足result_len>(blockNum*pageBlockSize-compressBlockSize)/compressStride。
  - page attention场景下input的shape支持[blockNum,pageBlockSize,N,D]，其余场景下input的shape支持[T,N,D]。
  error_conditions:
  - 计算输入和必选计算输出是空指针。
  - 计算输入和输出的数据类型和格式不在支持的范围内。
  - input和weight不满足broadcast关系，即input的第三维大小与weight的第二维大小不相等。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 计算输入和必选计算输出是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 计算输入和输出的数据类型和格式不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: input和weight不满足broadcast关系，即input的第三维大小与weight的第二维大小不相等。
  evidence:
  - aclnnNsaCompressWithCacheGetWorkspaceSize
  - aclnnNsaCompressWithCache
  extraction_status: complete
  inputs:
  - name: input
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
    layout_templates:
    - TND
    optional_semantics:
    - 'input: 不支持空Tensor。'
  - name: weight
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    optional_semantics:
    - 'weight: 不支持空Tensor。'
  - name: slotMapping
    role: input
    dtype: INT32
    optional_semantics:
    - 'slotMapping: 不支持空Tensor。'
  - name: actSeqLenOptional
    role: optional_input
    dtype: INT64
    value_constraints:
    - 'actSeqLenOptional: 在TND排布场景下需要该输入，其余场景输入nullptr。'
  - name: blockTableOptional
    role: optional_input
    dtype: INT32
  - name: layoutOptional
    role: optional_input
    dtype: CHAR
    tensor_rank: '3'
    layout_templates:
    - TND
  - name: compressBlockSize
    role: input
    dtype: INT64
    value_constraints:
    - 'compressBlockSize: 必须是16的整数倍，且compressBlockSize>=compressStride，compressBlockSize<=64。'
  - name: compressStride
    role: input
    dtype: INT64
    value_constraints:
    - 'compressStride: 仅支持compressBlockStride取值16、32、48、64。'
  - name: actSeqLenType
    role: input
    dtype: INT64
    value_constraints:
    - 'actSeqLenType: actSeqLenOptional有输入时生效，可取值0或1，0代表actSeqLenOptional中数值为前继batch的序列大小的cumsum结果（累积和），1代表actSeqLenOptional中数值为每个batch中序列大小，当前仅支持1。'
  - name: pageBlockSize
    role: input
    dtype: INT64
  outputs:
  - name: outputCache
    role: output
    dtype: INT64
    output_relation:
    - 'outputCache: 数据类型与input保持一致。'
- api_name: aclnnNsaSelectedAttention
  doc_names:
  - aclnnNsaSelectedAttention.md
  source_repo: ops-transformer
  workspace_api: aclnnNsaSelectedAttentionGetWorkspaceSize
  execute_api: aclnnNsaSelectedAttention
  summary: 接口功能：训练场景下，实现NativeSparseAttention算法中selected-attention（选择注意力）的计算。
  constraints:
  - 该接口与PyTorch配合使用时，需要保证CANN相关包与PyTorch相关包的版本匹配。
  - 输入query、key、value的batchsize必须相等，即要求传入的actualSeqQLenOptional和actualSeqKvLenOptional具有相同的长度。
  - 输入query、key、value的D：Head-Dim必须满足（D_q == D_k && D_k >= D_v）。
  - 输入query、key、value的数据类型必须一致。
  - 输入query、key、value的inputLayout必须一致。
  - sparseMode目前支持0和2。
  - selectedBlockSize支持<=128且满足16的整数倍。
  - selectedBlockCount：支持[1~128]。 总计选择的大小`selectedBlockCount * selectedBlockSize`
    < 128*64(8K)。
  - Layout为TND时，每个Batch的S2都要大于总计选择的大小`selectedBlockCount * selectedBlockSize`。
  - inputLayout目前仅支持TND。
  - 支持输入query的N和key/value的N不相等，但必须成比例关系，即N_q / N_kv必须是非0整数，称为G（group），且需满足G <= 32。
  - 当attenMaskOptional输入为nullptr时，sparseMode参数不生效，固定为全计算。
  - B（Batchsize）：取值范围为1\~1024。
  - N（Head-Num）：取值范围为1\~128。
  - G（Group）：取值范围为1\~32。
  - S（Seq-Length）：取值范围为1\~128K。同时需要满足S_kv >= selectedBlockSize * selectedBlockCount，且S_kv长度为selectedBlockSize的整数倍。
  - D（Head-Dim）：D_qk=192，D_v=128。
  error_conditions:
  - 传入参数是必选输入，输出或者必选属性，且是空指针。
  - query、key、value、attenMaskOptional、softmaxMaxOut、softmaxSumOut、attentionOut的数据类型和数据格式不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入参数是必选输入，输出或者必选属性，且是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query、key、value、attenMaskOptional、softmaxMaxOut、softmaxSumOut、attentionOut的数据类型和数据格式不在支持的范围内。
  evidence:
  - aclnnNsaSelectedAttentionGetWorkspaceSize
  - aclnnNsaSelectedAttention
  extraction_status: complete
  inputs:
  - name: query
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
  - name: key
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
  - name: value
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
  - name: topkIndices
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'topkIndices: shape需为[T_q, N_kv, selected_block_count], 表示所选数据的索引。'
  - name: attenMaskOptional
    role: input
    dtype: BOOL、UINT8
    noncontiguous: 'yes'
    tensor_rank: '2'
    value_constraints:
    - 'attenMaskOptional: 取值true/1表示不参与计算。'
    - 'attenMaskOptional: 取值false/0表示参与计算。'
  - name: actualSeqQLenOptional
    role: input
    dtype: INT64
    tensor_rank: '1'
    value_constraints:
    - 'actualSeqQLenOptional: TND排布时需要输入，其余场景输入nullptr。'
  - name: actualSeqKvLenOptional
    role: input
    dtype: INT64
    tensor_rank: '1'
    value_constraints:
    - 'actualSeqKvLenOptional: TND排布时需要输入，其余场景输入nullptr。'
  - name: scaleValue
    role: input
    dtype: DOUBLE
  - name: headNum
    role: input
    dtype: INT64
  - name: inputLayout
    role: input
    dtype: String
  - name: selectedBlockSize
    role: input
    dtype: INT64
  - name: selectedBlockCount
    role: input
    dtype: INT64
  - name: sparseMode
    role: input
    dtype: INT64
    value_constraints:
    - 'sparseMode: 支持取值0或2。'
  outputs:
  - name: softmaxMaxOut
    role: output
    dtype: FLOAT
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: softmaxSumOut
    role: output
    dtype: FLOAT
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: attentionOut
    role: output
    description: 计算公式的最终输出。
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
    output_relation:
    - 'attentionOut: 数据类型与query一致。'
