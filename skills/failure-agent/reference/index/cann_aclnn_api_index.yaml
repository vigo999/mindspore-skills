- api_name: aclnnBlockSparseAttention
  doc_names:
  - aclnnBlockSparseAttention.md
  source_repo: ops-transformer
  workspace_api: aclnnBlockSparseAttentionGetWorkspaceSize
  execute_api: aclnnBlockSparseAttention
  summary: 接口功能**：BlockSparseAttention稀疏注意力计算，支持灵活的块级稀疏模式，通过BlockSparseMask指定每个Q块选择的KV块，实现高效的稀疏注意力计算。
  constraints:
  - 该接口与PyTorch配合使用时，需要保证CANN相关包与PyTorch相关包的版本匹配。
  - qInputLayout当前仅支持"TND"和"BNSD"。
  - kvInputLayout当前仅支持"TND"和"BNSD"。
  - 当前query、key、value的InputLayout必须保持一致。
  - 输入query、key、value的数据类型必须一致，支持FLOAT16和BFLOAT16。
  - query、key、value的D轴当前仅支持配置为64或128。
  - blockShapeOptional如果传入，则必须包含至少两个元素[blockShapeX, blockShapeY]，且值必须大于0，blockShapeY必须为128的倍数。
  - blockSparseMaskOptional当前必须传入，且shape必须为[batch, headNum, ceilDiv(maxQS, blockShapeX),
    ceilDiv(maxKVS, blockShapeY)]。
  - attentionMaskOptional当前只支持传入nullptr。
  - actualSeqLengthsOptional在qInputLayout为“TND”时必选；actualSeqLengthsKvOptional在kvInputLayout为“TND”时必选。
  - actualSeqLengthsOptional与actualSeqLengthsKvOptional当前必须同时配置或同时不配置，仅配置其中之一的行为将被算子拦截。
  - blockTableOptional当前只支持传入nullptr，表示不开启PagedAttention特性。
  - innerPrecise必须为0或1或4，其中，950PR/950DT硬件仅支持配置为4，A2/A3系列产品仅支持配置为0或1。
  - qSeqlen和kvSeqlen不需要被blockShape整除，支持非对齐场景，实际分块数通过向上取整计算。
  - 输入query的headNum为N1，输入key和value的headNum为N2，则N1 >= N2 && N1 % N2 == 0。
  - maskType当前只支持输入0，表示不加mask。
  - blockSize当前只支持输入0，表示不支持paged cache。
  - preTokens和nextTokens当前只支持输入2147483647，表示当前token的前后所有token都参与attention运算，即不支持滑窗attention。
  error_conditions:
  - 输入query，key，value传入的是空指针。
  - query，key，value 数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入query，key，value传入的是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query，key，value 数据类型不在支持的范围之内。
  evidence:
  - aclnnBlockSparseAttentionGetWorkspaceSize
  - aclnnBlockSparseAttention
  extraction_status: partial
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    shape_constraints:
    - "query: 支持的shape为：\n TND: [totalQTokens, headNum, headDim]。"
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    shape_constraints:
    - "key: 支持的shape为：\n \n TND: [totalKTokens, numKeyValueHeads, headDim]。"
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    shape_constraints:
    - "value: 支持的shape为：\n \n TND: [totalVTokens, numKeyValueHeads, headDim]。"
  - name: blockSparseMaskOptional
    role: input
    dtype: INT8
    noncontiguous: 'no'
    tensor_rank: '4'
    shape_constraints:
    - "blockSparseMaskOptional: 可选输入（当前版本为必选）\n \n shape为[batch, headNum, ceilDiv(maxQSeqLength,\
      \ blockShapeX), ceilDiv(maxKvSeqLength, blockShapeY)]。"
    value_constraints:
