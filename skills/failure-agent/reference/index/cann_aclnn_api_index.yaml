  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：不支持任何空tensor。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：仅支持输入x1的第一维度（BS）为0的空tensor，其它空tensor均不支持。
  - Ascend 950PR/Ascend 950DT：仅支持输入x1的第一维度（BS）为0的空tensor，其它空tensor均不支持。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：不支持任何非连续tensor。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：不支持任何非连续tensor。
  - Ascend 950PR/Ascend 950DT：仅支持x2为非连续tensor，其它非连续tensor均不支持。
  - x1、x2计算输入的数据类型要和output计算输出的数据类型一致，传入的x1、x2与output均不为空指针。
