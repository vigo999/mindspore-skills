- api_name: aclnnMoeDistributeDispatchSetup
  doc_names:
  - aclnnMoeDistributeDispatchSetup.md
  source_repo: ops-transformer
  workspace_api: aclnnMoeDistributeDispatchSetupGetWorkspaceSize
  execute_api: aclnnMoeDistributeDispatchSetup
  summary: 接口说明：
  constraints:
  - 对于MoE专家，当`globalBs`为0时，要满足A >= `BS` * `epWorldSize` * min(`localExpertNum`, `K`)；当`globalBs`非0时，要满足A
    >= `globalBs` * min(`localExpertNum`, `K`)。
  - 对于共享专家，当`globalBs`为0时，要满足A = `BS` * `epWorldSize` * `sharedExpertNum` / `sharedExpertRankNum`；当`globalBs`非0时，要满足A
    = `globalBs` * `sharedExpertNum` / `sharedExpertRankNum`。
  - H：表示hidden size隐藏层大小，取值范围[1024, 8192]。当前仅支持4096、7168。
  - BS：表示batch sequence size，即本卡最终输出的token数量，取值范围为0 < BS ≤ 512。当前仅支持8、16、256。
  - K：表示选取topK个专家，取值范围为0 < `K` ≤ 16同时满足0 < `K` ≤ `moeExpertNum`。当前仅支持6、8。
  - localExpertNum：表示本卡专家数量。
  - 对于共享专家卡，localExpertNum = 1。
  - 对于MoE专家卡，localExpertNum = `moeExpertNum` / (`epWorldSize` - `sharedExpertRankNum`)。moeExpertNum当前仅支持32。
  - tokenMsgSize：表示每个token在数据通信时的维度信息。
  - 非量化场景下，tokenMsgSize = Align256(H)。
  - 量化场景下，tokenMsgSize = Align512(Align32(H) + 4 )，其中AlignN(x) = ((x + N - 1) / N)
    * N。
  - 当前版本暂不支持共享专家。sharedExpertNum和sharedExpertRankNum当前仅支持0。
  - 一个模型中的aclnnMoeDistributeDispatchSetup接口，aclnnMoeDistributeDispatchTeardown接口，aclnnMoeDistributeCombineSetup接口，aclnnMoeDistributeCombineTeardown接口仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 各rank Bs一致时，globalBs = Bs * epWorldSize 或 0。
  - 各rank Bs不一致时，globalBs = maxBs * epWorldSize（maxBs为单卡Bs最大值）。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  - 输入和输出的shape不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 输入和输出的shape不在支持的范围内。
  evidence:
  - aclnnMoeDistributeDispatchSetupGetWorkspaceSize
  - aclnnMoeDistributeDispatchSetup
