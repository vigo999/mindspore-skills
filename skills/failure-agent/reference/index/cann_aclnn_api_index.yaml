    noncontiguous: 'yes'
    shape_constraints:
    - 'weight1（aclTensor*）: 有专家[E,K1,N1]

      无专家[K1,N1]。'
    optional_semantics:
    - 'weight1（aclTensor*）: 不支持空Tensor。'
  - name: weight2
    role: input
    dtype: FLOAT16、BFLOAT16、INT8、INT4
    noncontiguous: 'yes'
    shape_constraints:
    - 'weight2（aclTensor*）: 有专家[E,K2,N2]

