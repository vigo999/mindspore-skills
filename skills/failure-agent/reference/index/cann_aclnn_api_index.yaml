  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query、key、value、topkIndices、attenMask、blockTableOptional、actualQSeqLenOptional、actualSelKvSeqLenOptional、output的数据类型不在支持的范围内。
