- api_name: aclnnQuantMatmulWeightNz
  doc_names:
  - aclnnQuantMatmulWeightNz.md
  source_repo: ops-nn
  workspace_api: aclnnQuantMatmulWeightNzGetWorkspaceSize
  execute_api: aclnnQuantMatmulWeightNz
  summary: 接口功能：完成量化的矩阵乘计算。相似接口有aclnnMm（仅支持2维Tensor作为输入的矩阵乘）和aclnnBatchMatMul（仅支持三维的矩阵乘，其中第一维是Batch维度）。支持T-C、T-T、K-C、K-T、mx
    量化模式。
  constraints:
  - 支持调用本接口前，通过aclnnTransMatmulWeight对format为ND的x2处理得到AI处理器亲和数据排布格式。
  - x1的约束：当数据类型为INT8时，且x2的数据类型为INT32时，transposeX1为false。维度为：（m，k），要求k为偶数，并小于29576。
  - yOffset的约束：shape支持1维（n）。为计算过程中离线计算的辅助结果，值要求为8 *x2* x2Scale，并在第1维累加。
  - 当x1Scale不为null时，只支持K-C量化。
  - 支持调用本接口前，通过aclnnTransMatmulWeight或aclnnNpuFormatCast对format为ND的x2处理得到NZ格式，在使用时必须使用0来填充以防引入脏数据。
  - 当原始ND的后两维中存在某一维度为1时，无法使用weightNz特性，本接口不支持此种场景。
  - '**T-C量化 && T-T量化场景约束：**。'
  - T-T量化场景下，x1Scale的shape为nullptr，x2Scale的shape为(1,)。
  - T-C量化场景下，x1Scale的shape为或nullptr，x2Scale的shape为(n,)，其中n与x2的n一致。
  - 不支持动态T-C或动态T-T量化。
  - '**K-C量化 && K-T量化场景约束：**。'
  - K-C量化场景下，x1Scale的shape为(m,)，x2Scale的shape为(n,)，其中m与x1的m一致，n与x2的n一致;。
  - K-T量化场景下，x1Scale的shape为(m,)，x2Scale的shape为(1,)，其中m与x1的m一致。
  - '**mx量化场景约束：**。'
  - mx全量化场景下，当x1与x2数据类型为FLOAT8_E4M3FN/FLOAT4_E2M1时，x1和x1Scale的转置属性需要保持一致，x2和x2Scale的转置属性需要保持一致。
  - x1和x2的内轴必须为偶数，且k必须大于2。
  - transposeX1必须为false。
  - 当transposeX2为false时，n必须大于2。
  - 当transposeX2为true时，n必须大于1。
  - '**伪量化场景下dtype和shape要求如下：**。'
  - k要求32对齐, n要求8对齐。MX量化模式下k要求大于32，n大于等于8；T-CG量化模式下k要求大于等于64，n的要求大于等于8。
  - x1是FLOAT8_E4M3FN，x2是FLOAT32时, x2表示一个FLOAT32存储8个FLOAT4_E2M1的紧密排布的数据格式。
  - MX量化模式下，bias数据类型与out数据类型需要一致；T-CG量化模式下，x2Scale的数据类型和out的数据类型需要一致。
  - 'x1 shape中的k和x2 shape中的k1需要满足ceil(k / k0) = k1，

    x2 shape中的n1与out的n需要满足ceil(n / n0) = n1。'
  error_conditions:
  - 传入的x1、x2、x2Scale或out是空指针。
  - x1、x2、bias、x2Scale、x2Offset或out的数据类型和数据格式不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2、x2Scale或out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、bias、x2Scale、x2Offset或out的数据类型和数据格式不在支持的范围之内。
  evidence:
  - aclnnQuantMatmulWeightNzGetWorkspaceSize
  - aclnnQuantMatmulWeightNz
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: INT41、3、INT8、FLOAT8_E4M3FN1、2、FLOAT4_E2M11、2
    tensor_rank: 2..6
  - name: x2
    role: input
    dtype: INT41、3、INT8、INT321、3、FLOAT4_E2M11、2、FLOAT321、2、FLOAT8_E4M3FN1、2
    tensor_rank: 4..8
  - name: x1Scale
    role: input
    description: 可选的量化参数，公式中的输入x1Scale。
    dtype: FLOAT321、FLOAT8_E8M01、2
    tensor_rank: 1|3
    shape_constraints:
    - 'x1Scale: x1Scale是FLOAT32时，shape是1维(t, )，t = m，其中m与x1的m一致。'
  - name: x2Scale
    role: input
    dtype: UINT64、INT64、FLOAT321、BFLOAT161、FLOAT8_E8M01、2、FLOAT161、2
    tensor_rank: 1|3
    shape_constraints:
    - 'x2Scale: x2Scale是其他 dtype 时，shape是1维(t, )，t = 1或n，其中n与x2的n一致。'
  - name: yScale
    role: input
    description: 输出y的反量化scale参数。
    dtype: UINT641、2、INT641、2
    tensor_rank: '2'
    shape_constraints:
    - 'yScale: shape是2维(1, n)，其中n与x2的n一致。'
  - name: x1Offset
    role: input
    value_constraints:
    - 'x1Offset: 当前版本不支持，需要传入nullptr或空tensor。'
  - name: x2Offset
    role: input
    description: 可选量化参数，公式中的输入x2Offset。
    dtype: FLOAT32
    tensor_rank: '1'
    shape_constraints:
    - 'x2Offset: shape是1维(t, )，t = 1或n，其中n与x2的n一致。'
  - name: yOffset
    role: input
    dtype: FLOAT32
    tensor_rank: '1'
  - name: bias
    role: input
    description: 可选参数，公式中的输入bias。
    dtype: INT32、BFLOAT161、FLOAT161、FLOAT321
    tensor_rank: 1|3
    shape_constraints:
    - 'bias: shape支持1维(n, )或3维(batch, 1, n)，n与x2的n一致。'
    - 'bias: 当out的shape为2、4、5、6维时，bias的shape只支持1维(n, )。'
  - name: transposeX1
    role: input
    dtype: BOOL
  - name: transposeX2
    role: input
    dtype: BOOL
  - name: groupSize
    role: input
    dtype: INT64
  outputs:
  - name: out
    role: output
    description: 公式中的输出out。
    dtype: FLOAT16、INT8、BFLOAT161、INT321、FLOAT321、2
    tensor_rank: 2..6
    shape_constraints:
    - 'out: shape支持2~6维，(batch, m, n)，batch可不存在。'
    value_constraints:
    - 'out: 支持x1与x2的batch维度broadcast，输出batch与broadcast之后的batch一致，m与x1的m一致，n与x2的n1以及n0满足ceil(n
      / n0) = n1的关系。'
- api_name: aclnnQuantReduceScatter
  doc_names:
  - aclnnQuantReduceScatter.md
  source_repo: ops-transformer
  workspace_api: aclnnQuantReduceScatterGetWorkspaceSize
  execute_api: aclnnQuantReduceScatter
  summary: 接口功能**：实现quant + reduceScatter融合计算。
  constraints:
  - 当x的数据类型为FLOAT8_E4M3FN, FLOAT8_E5M2并且scales的数据类型为FLOAT8_E8M0时，输入数据的量化方式为mx量化。
  - 当x的数据类型为INT8、HIFLOAT8、FLOAT8_E4M3FN, FLOAT8_E5M2并且scales的数据类型为FLOAT时，输入数据的量化方式为pertoken-pergroup量化(groupSize=128)。
  - 只在Ascend950系列平台使能。
  - 不支持空tensor输入。
  - 通信域大小支持2、4、8。
  - 通信域使用约束：同一通信域内仅允许连续执行`aclnnQuantAllReduce`和`aclnnQuantReduceScatter`算子，且该通信域中不允许有其他通信算子。
  - '`HCCL_BUFFSIZE`：调用本算子前需检查`HCCL_BUFFSIZE`环境变量取值是否合理，该环境变量表示单个通信域占用内存大小，单位MB，不配置时默认为200MB。要求满足`HCCL_BUFFSIZE`>=
    2 * (`xDataSize` + `scalesDataSize + 1`)。其中`xDataSize`为输入`x`的数据大小，计算公式为：`xDataSize
    = BS * H * 1 (Byte)`，`scalesDataSize`为`scales`的数据大小，当量化方式为pertoken-pergroup量化时，计算公式为：`scalesDataSize
    = BS * H / 128 * 4 (Byte)`，当量化方式为mx量化时，计算公式为：`scalesDataSize = BS * H / 32 * 1
    (Byte)`。'
  - H范围仅支持[1024, 8192]，要求128对齐。
  error_conditions:
  - x、scales、output存在空指针。
  - x、scales或output的数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: x、scales、output存在空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x、scales或output的数据类型不在支持的范围之内。
  evidence:
  - aclnnQuantReduceScatterGetWorkspaceSize
  - aclnnQuantReduceScatter
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: INT8, HIFLOAT8, FLOAT8_E4M3FN, FLOAT8_E5M2
    noncontiguous: 'yes'
    tensor_rank: 2..3
    shape_constraints:
    - 'x: 支持的shape为：(BS, H)或者(B, S, H)。'
    optional_semantics:
    - 'x: 不支持空Tensor。'
  - name: scales
    role: input
    dtype: FLOAT, FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 2..4
    optional_semantics:
    - 'scales: 不支持空Tensor。'
    output_relation:
    - 'scales: 当scales的数据类型为FLOAT8_E8M0时。'
    - 'scales: 当scales的数据类型为FLOAT时。'
  - name: group
    role: input
    dtype: String
  - name: reduceOp
    role: input
    dtype: string
  outputs:
  - name: output
    role: output
    description: 公式中的输出output。
    dtype: FLOAT、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'output: 当x的shape是(BS,H)的时候，output的shape必须为(BS/rankNum,H); 当x的shape是(B,S,H)的时候，output的shape必须为(B*S/rankNum,H)。'
    optional_semantics:
    - 'output: 不支持空Tensor。'
