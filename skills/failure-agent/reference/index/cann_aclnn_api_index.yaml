- api_name: aclnnQuantMatmulAlltoAll
  doc_names:
  - aclnnQuantMatmulAlltoAll.md
  source_repo: ops-transformer
  workspace_api: aclnnQuantMatmulAlltoAllGetWorkspaceSize
  execute_api: aclnnQuantMatmulAlltoAll
  summary: 接口功能：完成量化的Matmul计算、Permute（保证通信后地址连续）和AlltoAll通信的融合，**先计算后通信**，支持K-C量化、mx量化模式。
  constraints:
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持2、4、8卡。
  - Ascend 950PR/Ascend 950DT：支持2、4、8、16卡。
  - 参数说明中shape使用的变量H2必须整除NPU卡数。
  - BS*rankSize和H2的值不得超过2147483647(INT32_MAX)，BS的值不得小于1，H2的值不得小于2。
  - 不支持空tensor。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：不支持任何非连续tensor。
  - Ascend 950PR/Ascend 950DT：仅支持x2为非连续tensor，其它非连续tensor均不支持。
  - 传入的x1、x2、x1Scale、x2Scale与output均不为空指针，且。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：biasOptional不支持传入空指针。
  - 仅当x1Scale和x2Scale输入都是2维及以上数据时，groupSize取值有效，其他场景需传入0。
  - 传入的groupSize内部会按如下公式分解得到groupSizeM、groupSizeN、groupSizeK，当其中有1个或多个为0，会根据x1/x2/x1Scale/x2Scale输入shape重新设置groupSizeM、groupSizeN、groupSizeK用于计算。原理：假设groupSizeM=0，表示m方向量化分组值由接口推断，推断公式为groupSizeM
    = m / scaleM（需保证m能被scaleM整除），其中m与x1 shape中的m一致，scaleM与x1Scale shape中的m一致，k和n方向同理。
  - 目前支持：K-C量化，左矩阵perToken量化，x1QuantMode=3，右矩阵perChannel量化，x2QuantMode=2。
  - bias偏置在量化后增加。
  - H1范围仅支持[1, 65535]。
  - 目前支持：K-C量化，左矩阵perToken量化，x1QuantMode=3，右矩阵perChannel量化，x2QuantMode=2；mx量化，左矩阵mx量化，x1QuantMode=6，右矩阵mx量化，x2QuantMode=6。
  - biasOptional可以为空。
  - mx量化场景下，x2必须转置，shape为(H2, H1)，transposeX2为True。
  - mx量化场景下，且x1和x2输入为FLOAT4_E2M1时，H1必须是偶数，且ceil(H1/32)必须是偶数。
  - 通算融合算子不支持并发调用，不同的通算融合算子也不支持并发调用。
  - 不支持跨超节点通信，只支持超节点内。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  evidence:
  - aclnnQuantMatmulAlltoAllGetWorkspaceSize
  - aclnnQuantMatmulAlltoAll
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: FLOAT8_E4M3FN、FLOAT8_E5M2、FLOAT4_E2M1、INT8
    tensor_rank: '2'
    shape_constraints:
    - 'x1: 2维，shape为(BS, H1)。'
  - name: x2
    role: input
    dtype: FLOAT8_E4M3FN、FLOAT8_E5M2、FLOAT4_E2M1、INT8
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'x2: 2维，shape为(H1, H2)。'
  - name: biasOptional
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    tensor_rank: '1'
    shape_constraints:
    - 'biasOptional: 1维，shape为(H2)。'
  - name: x1Scale
    role: input
    dtype: FLOAT32、FLOAT8_E8M0
    tensor_rank: '1'
    shape_constraints:
    - 'x1Scale: 1维/3维。K-C量化场景时shape为(BS)。mx量化场景时shape为(BS, ceil(H1/64), 2)。'
  - name: x2Scale
    role: input
    dtype: FLOAT32、FLOAT8_E8M0
    tensor_rank: '1'
    shape_constraints:
    - 'x2Scale: 1维/3维。K-C量化场景时shape为(H2)。mx量化场景时shape为(H2, ceil(H1/64), 2)。'
  - name: commScaleOptional
    role: input
    optional_semantics:
    - 'commScaleOptional: 预留参数，暂不支持低比特通信。'
  - name: x1OffsetOptional
    role: input
    optional_semantics:
    - 'x1OffsetOptional: 预留参数，暂不支持。'
  - name: x2OffsetOptional
    role: input
    optional_semantics:
    - 'x2OffsetOptional: 预留参数，暂不支持。'
  - name: alltoAllAxesOptional
    role: input
    dtype: aclIntArray*(元素类型INT64)
    tensor_rank: '1'
    shape_constraints:
    - 'alltoAllAxesOptional: 1维，shape为(2)。'
  - name: group
    role: input
    dtype: STRING
  - name: x1QuantMode
    role: input
    dtype: INT
    value_constraints:
    - 'x1QuantMode: 根据设备型号对取值有不同限制，详细参见约束说明。'
  - name: x2QuantMode
    role: input
    dtype: INT
    value_constraints:
    - 'x2QuantMode: 根据设备型号对取值有不同限制，详细参见约束说明。'
  - name: commQuantMode
    role: input
    dtype: INT
    optional_semantics:
    - 'commQuantMode: 预留参数，当前仅支持配置为0，表示不量化。'
  - name: commQuantDtype
    role: input
    dtype: INT
    optional_semantics:
    - 'commQuantDtype: 预留参数，当前仅支持配置为-1，表示ACL_DT_UNDEFINED。'
  - name: groupSize
    role: input
    dtype: INT
    value_constraints:
    - 'groupSize: mx量化场景下仅支持[groupSizeM, groupSizeN, groupSizeK] = [1, 1, 32]，对应的groupSize具体取值详细参见约束说明。'
    - 'groupSize: 其余量化场景默认配置为0，取值不生效。'
  - name: transposeX1
    role: input
    dtype: bool
  - name: transposeX2
    role: input
    dtype: bool
    value_constraints:
    - 'transposeX2: mx量化模式下必须配置为True。'
