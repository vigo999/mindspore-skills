  summary: 接口功能：当存在TP域通信时，先进行ReduceScatterV通信，再进行AlltoAllV通信，最后将接收的数据整合（乘权重再相加）；当不存在TP域通信时，进行AlltoAllV通信，最后将接收的数据整合（乘权重再相加），之后完成Add
    + RmsNorm融合。
  constraints:
  - 对于共享专家，需满足 (A = Bs * epWorldSize * sharedExpertNum / sharedExpertRankNum)。
  - 对于MoE专家，当`globalBS`为0时，需满足 (A >= Bs * epWorldSize * min(localExpertNum, K))；当`globalBS`非0时，需满足
    (A >= globalBS * min(localExpertNum, K))。
  - '**H**：表示hidden size（隐藏层大小），取值范围为[1024, 8192]。'
  - '**Bs**：表示batch sequence size（本卡最终输出的token数量），取值范围为 (0 < Bs ≤ 512)。'
  - '**K**：表示选取topK个专家，取值范围为 (0 < K ≤ 16) 且满足 (0 < K ≤ moeExpertNum)。'
  - 对于共享专家卡，(localExpertNum = 1)。
  - 对于MoE专家卡，(localExpertNum = moeExpertNum / (epWorldSize - sharedExpertRankNum))；当(localExpertNum
    > 1)时，不支持TP域通信。
  - ep通信域内：设置大小要求 (≥ 2) 且满足 (1024^2 * (HCCL_BUFFSIZE - 2) / 2 ≥ Bs * 2 * (H + 128)
    * (epWorldSize * localExpertNum + K + 1))，其中`localExpertNum`需使用MoE专家卡的本卡专家数。
  - tp通信域内：设置大小要求 \>= (A \* Align512(Align32(h \* 2) + 44) + A \* Align512(h \* 2))
    \* 2。
  - 一个模型中的`aclnnMoeDistributeCombineAddRmsNorm`和`aclnnMoeDistributeDispatchV2`仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 一个模型中的`aclnnMoeDistributeCombineAddRmsNorm`和`aclnnMoeDistributeDispatchV2`仅支持相同TP通信域或都不支持TP通信域；有TP通信域时，该通信域中不允许有其他算子。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：一个通信域内的节点需在一个超节点内，不支持跨超节点。
  - 各rank Bs一致时，globalBS = Bs * epWorldSize 或 0。
  - 各rank Bs不一致时，globalBS = maxBs * epWorldSize（maxBs为单卡Bs最大值）。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  - 1. 输入和输出的shape不在支持的范围内；。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 1. 输入和输出的shape不在支持的范围内；
  evidence:
  - aclnnMoeDistributeCombineAddRmsNormGetWorkspaceSize
  - aclnnMoeDistributeCombineAddRmsNorm
  extraction_status: complete
