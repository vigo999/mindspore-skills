- api_name: aclnnQuantMatmulAllReduceV4
  doc_names:
  - aclnnQuantMatmulAllReduceV4.md
  source_repo: ops-transformer
  workspace_api: aclnnQuantMatmulAllReduceV4GetWorkspaceSize
  execute_api: aclnnQuantMatmulAllReduceV4
  summary: 接口功能**：兼容`aclnnQuantMatmulAllReduce`、`aclnnQuantMatmulAllReduceV2`、`aclnnQuantMatmulAllReduceV3`支持的功能。
  constraints:
  - 增量场景不使能MC2，全量场景使能MC2。
  - 输入x1可为2维或者3维，其shape为(b, s, k)或者(m, k)。x2必须是2维。其shape为(k, n)，k轴满足mm算子入参要求，k轴相等。
  - m大小不超过2147483647，x1与x2的最后一维大小不超过65535，x1的最后一维指k，x2的最后一维指转置时的k或非转置时的n。
  - 传入的x1、x2、x2Scale或者output不为空指针。
  - x1和x2、dequantScale、output、bias（非空场景）、x3（非空场景）的数据类型和数据格式需要在支持的范围之内。
  - 传入的commQuantScale1与commQuantScale2需要同时为空指针或同时不为空指针，若传入的commQuantScale1与commQuantScale2同时不为空指针，两个量化参数shape需保持一致，类型需与算子输出类型保持一致，且每张卡输入保持一致。
  - 仅支持hccs链路all mesh组网。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持1、2、4、8卡。
  - Ascend 950PR/Ascend 950DT：支持1、2、4、8、16、32、64卡。
  - 一个模型中的通算融合MC2算子，仅支持相同通信域。
  - INT8和FP8低bit通信仅在通信bound的情况下存在性能收益，计算bound的情况不建议使能INT8或FP8低bit通信，即不建议输入commQuantScale1和commQuantScale2，且commQuantMode输入0。（注：INT8低bit通信指输入为int8且使能commQuantScale1Optional、commQuantScale2Optional；FP8低bit通信指输入为FLOAT8_E4M3FN/FLOAT8_E5M2且使能commQuantMode=1。）。
  - 不支持空tensor。
  - 仅当x1Scale和x2Scale输入都是2维及以上数据时，groupSize取值有效，其他场景需传入0。
  - 传入的groupSize内部会按如下公式分解得到groupSizeM、groupSizeN、groupSizeK，当其中有1个或多个为0，会根据x1/x2/x1Scale/x2Scale输入shape重新设置groupSizeM、groupSizeN、groupSizeK用于计算。原理：假设groupSizeM=0，表示m方向量化分组值由接口推断，推断公式为groupSizeM
    = m / scaleM（需保证m能被scaleM整除），其中m与x1 shape中的m一致，scaleM与x1Scale shape中的m一致。
  error_conditions:
  - 传入的x1、x2、x2Scale、reduceOp或output是空指针。
  - x1、x2、biasOptional、x1ScaleOptional、x2Scale、x3Optional、commQuantScale1Optional、commQuantScale2Optional或output的数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2、x2Scale、reduceOp或output是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、biasOptional、x1ScaleOptional、x2Scale、x3Optional、commQuantScale1Optional、commQuantScale2Optional或output的数据类型不在支持的范围之内。
  evidence:
  - aclnnQuantMatmulAllReduceV4GetWorkspaceSize
  - aclnnQuantMatmulAllReduceV4
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: INT8、FLOAT8_E4M3FN、FLOAT8_E5M2、HIFLOAT8、FLOAT4_E2M1。
    noncontiguous: 'no'
    tensor_rank: 2..3
  - name: x2
    role: input
    dtype: INT8、FLOAT8_E4M3FN、FLOAT8_E5M2、HIFLOAT8、FLOAT4_E2M1。
    noncontiguous: 'no'
    tensor_rank: '2'
  - name: biasOptional
    role: input
    dtype: INT32、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
  - name: x3Optional
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 2..3
  - name: x1ScaleOptional
    role: input
    dtype: FLOAT32、FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 1..3
    shape_constraints:
    - 'x1ScaleOptional: pertoken场景下，x1为(b, m, k)时shape为(b*m)，x1为(m, k)时shape为(m)。'
    - 'x1ScaleOptional: perblock场景下，x1为(b, m, k)时shape为[b, ceilDiv(m, 128), ceilDiv(k,
      128)]，x1为(m, k)时shape为[ceilDiv(m, 128), ceilDiv(k, 128)]。'
    output_relation:
    - 'x1ScaleOptional: 数据类型为FLOAT8_E8M0时。'
  - name: x2ScaleOptional
    role: input
    dtype: INT64、UINT64、FLOAT32、BFLOAT16、FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 1..3
    shape_constraints:
    - 'x2ScaleOptional: shape在pertensor场景为(1)，perchannel场景为(n)/(1, n)。'
    - 'x2ScaleOptional: x2为FLOAT4_E2M1时，必须保证ceilDiv(k, 32)为偶数.perblock场景下，x2的shape为[ceilDiv(k,
      128), ceilDiv(n, 128)]，x2转置时，x2ScaleOptional的shape为[ceilDiv(n, 128), ceilDiv(k,
      128)]。'
    optional_semantics:
    - 'x2ScaleOptional: 输出为FLOAT16且输入为INT8时，x1ScaleOptional不为空，可直接将FLOAT32类型的x2ScaleOptional传入本接口，如果x1ScaleOptional为空，则需提前调用TransQuantParamV2算子的aclnn接口来将x2ScaleOptional转成INT64/UINT64数据类型。'
    output_relation:
    - 'x2ScaleOptional: 数据类型为FLOAT8_E8M0时。'
  - name: commQuantScale1Optional
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'commQuantScale1Optional: x2为(k, n)时, shape可为(n)或者(1,n)。'
  - name: commQuantScale2Optional
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'commQuantScale2Optional: x2为(k, n)时, shape可为(n)或者(1,n)。'
  - name: group
    role: input
    dtype: String
  - name: reduceOp
    role: input
    dtype: String
  - name: commTurn
    role: input
    dtype: INT64
  - name: streamMode
    role: input
    dtype: INT64
  - name: groupSize
    role: input
    dtype: INT64
  - name: commQuantMode
    role: input
    dtype: INT64
  outputs:
  - name: output
    role: output
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 2..3
    value_constraints:
