- api_name: aclnnWeightQuantBatchMatmulNz
  doc_names:
  - aclnnWeightQuantBatchMatmulNz.md
  source_repo: ops-nn
  workspace_api: aclnnWeightQuantBatchMatmulNzGetWorkspaceSize
  execute_api: aclnnWeightQuantBatchMatmulNz
  summary: 接口功能**：完成一个输入为伪量化场景的矩阵乘计算。此接口仅支持矩阵乘的右输入矩阵为FRACTAL_NZ格式。
  constraints:
  - 支持的量化模式：perchannel量化模式、pergroup量化模式和mx量化模式。
  - x的shape均为(m, k)，y的shape均为(m, n)，biasOptional的shape为null/(1, n)/(n,)。
  - 原始ND矩阵的最后一维8对齐；。
  - 在调用本接口前，必须配合`aclnnConvertWeightToINT4Pack`接口完成从稀疏排布的INT32/FLOAT到紧密排布的INT4/FLOAT4_E2M1及ND到FRACTAL_NZ的转换，详情可参考样例；。
  - 传入本接口的FRACTAL_NZ矩阵的shape为(ceil(n/16), ceil(k/16), 16, 2)。
  - weight仅支持非转置，原始ND矩阵的shape均为(k, n)。
  - 原始ND矩阵的最后一维2对齐；。
  - 在调用本接口前，必须配合`aclnnConvertWeightToINT4Pack`接口完成从ND到FRACTAL_NZ的转换，详情可参考样例；。
  - 传入本接口的FRACTAL_NZ矩阵的shape为(ceil(n/16), ceil(k/16), 16, 16)。
  - 传入本接口的FRACTAL_NZ矩阵的shape为(ceil(n/32), ceil(k/16), 16, 32)。
  - k大小在[1, 65535]范围内，n大小在[2, 65535]范围内；。
  - weight支持转置和非转置，原始ND矩阵的shape为(n, k)或(k, n)。
  - m大小在[1, 2^31-1]范围内。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - 输入tensor的shape、数据格式、连续性等不符合要求。
  - 产品型号不支持。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入tensor的shape、数据格式、连续性等不符合要求。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: 产品型号不支持。
  evidence:
  - aclnnWeightQuantBatchMatmulNzGetWorkspaceSize
  - aclnnWeightQuantBatchMatmulNz
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '2'
  - name: weight
    role: input
    dtype: INT4、FLOAT4_E2M1、INT32、FLOAT、INT8
    noncontiguous: 'yes'
    tensor_rank: '4'
  - name: antiquantScale
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 1|2
    value_constraints:
    - 'antiquantScale: 连续性要求与weight一致。'
  - name: antiquantOffsetOptional
    role: optional_input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1|2
    value_constraints:
    - 'antiquantOffsetOptional: 连续性要求与weight一致。'
  - name: quantScaleOptional
    role: optional_input
    description: 预留参数，暂未使用，固定传入空指针。
  - name: quantOffsetOptional
    role: optional_input
    description: 预留参数，暂未使用，固定传入空指针。
  - name: biasOptional
    role: optional_input
    dtype: FLOAT16、BFLOAT16、、FLOAT
    noncontiguous: 'no'
    tensor_rank: 1|2
    value_constraints:
    - 'biasOptional: 当不需要时传入空指针。'
  - name: antiquantGroupSize
    role: input
    dtype: UINT64
    value_constraints:
    - 'antiquantGroupSize: pergroup量化模式下，取值范围为[32, k-1]且要求是32的倍数。'
  outputs:
  - name: y
    role: output
    description: 计算输出，公式中的y，device侧的aclTensor。
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '2'
- api_name: aclnnWeightQuantBatchMatmulV2
  doc_names:
  - aclnnWeightQuantBatchMatmulV2.md
  source_repo: ops-nn
  workspace_api: aclnnWeightQuantBatchMatmulV2GetWorkspaceSize
  execute_api: aclnnWeightQuantBatchMatmulV2
  summary: 接口功能**：完成一个输入为伪量化场景的矩阵乘计算，并可以实现对于输出的量化计算。
  constraints:
  - '`x`（aclTensor *, 计算输入）：矩阵为非转置时，m大小在[1, 2^31-1]范围内；转置时，m大小在[1, 65535]范围内。'
  - '`weight`（aclTensor *, 计算输入）：维度支持2维，Reduce维度k需要与`x`的Reduce维度k大小相等。数据类型支持INT8、INT4、INT32，当`weight`数据格式为FRACTAL_NZ且数据类型为INT4或INT32时，或者当`weight`数据格式为ND且数据类型为INT32时，仅在INT4Pack场景支持，需配合`aclnnConvertWeightToINT4Pack`接口完成从INT32到INT4Pack的转换，以及从ND到FRACTAL_NZ的转换，详情可参考样例，若数据类型为INT4，则`weight`的内轴应为偶数。非连续的Tensor仅支持转置场景。shape支持(k,
    n)，其中k表示矩阵第1维的大小，n表示矩阵第2维的大小。'
  - '`weight`的数据类型为INT8，y的数据类型为非INT8。'
  - '`weight`的数据类型为INT4/INT32，`weight`转置，y的数据类型为非INT8。'
  - pergroup量化模式：`weight`的数据类型为INT4/INT32，`weight`非转置，`x`非转置，antiquantGroupSize为64或128，k为antiquantGroupSize对齐，n为64对齐，y的数据类型为非INT8。
  - '`antiquantScale`（aclTensor *, 计算输入）：数据类型支持FLOAT16、BFLOAT16、UINT64、INT64（当FLOAT16、BFLOAT16时，数据类型要求和输入`x`保持一致；当为UINT64、INT64时，`x`仅支持FLOAT16，不转置，`weight`仅支持INT8，ND转置，模式仅支持perchannel量化模式，quantScaleOptional和quantOffsetOptional必须传入空指针，m仅支持[1,
    96]，k和n要求64对齐，需要首先配合aclnnCast接口完成FLOAT16到FLOAT32的转换，详情请参考Cast，再配合aclnnTransQuantParamV2接口完成FLOAT32到UINT64的转换，详情请参考TransQuantParamV2）。非连续的Tensor仅支持转置场景。'
  - pertensor量化模式：输入shape为(1,)或(1, 1)。
  - perchannel量化模式：输入shape为(1, n)或(n,)。
  - pergroup量化模式：输入shape为(⌈k/group_size⌉, n)，其中group_size表示k要分组的每组的大小。
  - '`antiquantOffsetOptional`（aclTensor *, 计算输入）：数据类型支持FLOAT16、BFLOAT16、INT32，数据类型为FLOAT16、BFLOAT16时，数据类型要求和输入`x`的数据类型保持一致；数据类型为INT32类型时，数据范围限制为[-128,
    127]，x仅支持FLOAT16，weight仅支持INT8，`antiquantScale`仅支持UINT64/INT64。非连续的Tensor仅支持转置场景。'
  - '`quantOffsetOptional`（aclTensor *, 计算输入）：数据类型支持FLOAT，数据格式支持ND。可选输入, 当不需要时为空指针；存在时shape要求与`quantScaleOptional`一致。不支持非连续的Tensor。'
  - '`biasOptional`（aclTensor *, 计算输入）：维度支持1维或2维，shape支持(n,)或(1, n)。数据类型支持FLOAT16、FLOAT。当`x`的数据类型为BFLOAT16时，本参数要求为FLOAT；当`x`的数据类型为FLOAT16时，本参数要求为FLOAT16。'
  - '`antiquantGroupSize`（int, 计算输入）：表示在伪量化pergroup和mx量化模式下，对输入`weight`进行反量化计算的groupSize输入，描述一组反量化参数对应的待反量化数据量在Reduce方向的大小。当伪量化算法不为pergroup和mx量化模式时传入0；当伪量化算法为pergroup量化模式时传入值的范围为[32,
    k-1]且值要求是32的倍数；在mx量化模式，仅支持32。'
  - '`y`（aclTensor *, 计算输出）：维度支持2维，shape支持(m, n)。数据类型支持FLOAT16、BFLOAT16、INT8。当`quantScaleOptional`存在时，数据类型为INT8；当`quantScaleOptional`不存在时，数据类型支持FLOAT16、BFLOAT16，且与输入`x`的数据类型一致。'
  - pertensor量化模式：当数据格式为ND时，推荐使用转置后的`weight`输入；当数据格式为FRACTAL_NZ时，推荐使用非转置的`weight`输入。
  - pergroup量化模式：推荐使用非转置的weight输入。
  - perchannel量化模式：当数据格式为ND时，推荐使用转置后的`weight`输入；当数据格式为FRACTAL_NZ时，推荐使用非转置的`weight`输入。m范围为[65,
    96]时，推荐使用数据类型为UINT64或INT64的antiquantScale。
  - '`x`（aclTensor *, 计算输入）： 数据类型支持FLOAT16。shape支持2~6维，输入shape需要为(batch, m, k)，其中batch表示矩阵的批次大小，支持0~4维，m表示单个batch矩阵第1维的大小，k表示单个batch矩阵的第2维的大小，batch维度需要与`weight`的batch维度满足broadcast关系。当伪量化算法模式为pertensor量化模式时，`m*k`不能超过512000000。'
  - 当数据格式为ND时，输入shape需要为(batch, k, n)，其中batch表示矩阵的批次大小，支持0~4维，k表示单个batch矩阵第1维的大小，n表示单个batch矩阵的第2维的大小。
  - 输入shape需要为(batch, n, k)，其中batch表示矩阵的批次大小，支持0~4维，k表示单个batch矩阵第1维的大小，n表示单个batch矩阵的第2维的大小。
  - 配合aclnnCalculateMatmulWeightSizeV2以及aclnnTransMatmulWeight完成输入Format从ND到FRACTAL_NZ的转换。
  - '`antiquantScale`（aclTensor *, 计算输入）：数据类型支持FLOAT16，数据类型要求和输入`x`保持一致。'
  - perchannel量化模式：输入shape为(n, 1)或(n,)，不支持非连续的Tensor。
  - 当`weight`的数据格式为ND时，输入shape为(⌈k/group_size⌉, n)，其中group_size表示k要分组的每组的大小。
  - 当`weight`的数据格式为FRACTAL_NZ时，输入shape为(n, ⌈k/group_size⌉)，其中group_size表示k要分组的每组的大小。
  - '`antiquantOffsetOptional`（aclTensor *, 计算输入）：数据类型支持FLOAT16，数据类型要求和输入`x`保持一致。'
  - '`biasOptional`（aclTensor *, 计算输入）：数据类型支持FLOAT16。维度支持1~6维，带batch时，输入shape需要为(batch，1，n)，batch要与x和weight的batch维度broadcast后的batch保持一致，不带batch时，输入shape需要为(n,)或(1,
    n)。'
