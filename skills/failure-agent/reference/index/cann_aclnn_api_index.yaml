    - 'valueCache(aclTensor*): 当cacheMode为"Norm"时，shape为[num_blocks, block_size, num_heads,
      head_size_k]，数据格式必须时ND。'
    - 'valueCache(aclTensor*): 当cacheMode为"PA_NZ"时，shape为num_blocks, num_heads * head_size_k
      // elenum_aligned, block_size, elenum_aligned，数据格式必须时FRACTAL_NZ。'
  - name: blockTables
    role: input
    dtype: INT32、INT64
    tensor_rank: '2'
    shape_constraints:
    - 'blockTables(aclTensor*): shape为[batch, block_indices]，元素取值范围为[0, num_blocks)。'
  - name: seqLens
