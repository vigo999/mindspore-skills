  - 产品型号不支持。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的srcTensor、dstTensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: srcTensor的数据类型非INT8、UINT8、INT32、UINT32、FLOAT、FLOAT16、BFLOAT16、FLOAT8_E4M3FN、FLOAT4_E2M1，数据格式非ND、NZ、NCDHW、NDC1HWC0、FRACTAL_Z_3D、NCL。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: 产品型号不支持。
  evidence:
