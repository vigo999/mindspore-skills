      \ input_layout为BSND时，shape为（1，prefix_S，KV_N，KV_D）\n input_layout为BNSD、BNSD_BSND时，shape为（1，KV_N，prefix_S，KV_D）。"
    optional_semantics:
    - 'keySharedPrefixOptional: 不支持空Tensor。'
  - name: valueSharedPrefixOptional
    role: input
    dtype: FLOAT16、BFLOAT16、INT8、INT4/INT32
    noncontiguous: 'no'
    shape_constraints:
    - "valueSharedPrefixOptional: input_layout为BSH时，shape为（1，prefix_S，H=KV_N*KV_D）\n\
      \ input_layout为BSND时，shape为（1，prefix_S，KV_N，KV_D）\n input_layout为BNSD、BNSD_BSND时，shape为（1，KV_N，prefix_S，KV_D）。"
    optional_semantics:
    - 'valueSharedPrefixOptional: 不支持空Tensor。'
  - name: actualSharedPrefixLenOptional
    role: input
    dtype: INT64
    value_constraints:
    - 'actualSharedPrefixLenOptional: 该入参中的有效Sequence Length应该不大于keySharedPrefix/valueSharedPrefix中的Sequence
      Length。'
  - name: queryRopeOptional
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: queryRope的shape中d为64，其余维度与query一致
    optional_semantics:
    - 'queryRopeOptional: 不支持空Tensor。'
  - name: keyRopeOptional
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: keyRope的shape中d为64，其余维度与key一致
    optional_semantics:
    - 'keyRopeOptional: 不支持空Tensor。'
  - name: keyRopeAntiquantScaleOptional
    role: input
    dtype: FLOAT16、BFLOAT16
    optional_semantics:
