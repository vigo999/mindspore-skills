  source_repo: ops-transformer
  workspace_api: aclnnQuantGroupedMatmulInplaceAddGetWorkspaceSize
  execute_api: aclnnQuantGroupedMatmulInplaceAdd
  summary: 接口功能：在micro-batch训练场景，需要做micro-batch的梯度累计，会存在大量GroupedMatMul后接InplaceAdd的融合场景。QuantGroupedMatmulInplaceAdd算子将上述算子融合起来，提高网络性能。实现分组矩阵乘计算和加法计算，基本功能为矩阵乘和加法的组合，如T-C量化场景下$y_i[m,n]=(x1_i[m,k_i]
    \times x2_i[k_i,n]) * scale2_i[n] * scale1_i + y_i[m,n], i=1...g$，其中g为分组个数，$m/k_i/n$为对应的维度。
  constraints:
  - x1和x2的每一维大小在32字节对齐后都应小于int32的最大值2147483647，且内轴大小需小于2097152。
  - groupList第1维最大支持1024，即最多支持1024个group。
  error_conditions:
  - 如果传入参数是必选输入、输出或者必选属性，且是空指针。
  - x1、x2、scale2、groupList、yRef、scale1Optional、groupListType、groupSize的数据类型和数据格式不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入、输出或者必选属性，且是空指针。
