    role: output
    dtype: INT32
    noncontiguous: 'no'
    tensor_rank: '2'
    shape_constraints:
    - 'findicesOut（aclTensor*）: shape为(height, width)，其中height是屏幕高度，width是屏幕宽度。'
    optional_semantics:
    - 'findicesOut（aclTensor*）: 不支持空Tensor。'
  - name: barycentricOut
