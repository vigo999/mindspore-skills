  source_repo: ops-nn
  workspace_api: aclnnTransQuantParamV2GetWorkspaceSize
  execute_api: aclnnTransQuantParamV2
  summary: 接口功能：完成量化计算参数scale数据类型的转换，将FLOAT32的数据类型转换为硬件需要的UINT64，INT64类型。
  constraints:
  - Atlas 推理系列产品、Atlas A2 训练系列产品/Atlas A2 推理系列产品、Atlas A3 训练系列产品/Atlas A3 推理系列产品、Ascend
    950PR/Ascend 950DT：该接口支持与matmul类算子（如aclnnQuantMatmulV4）配套使用。
  - Atlas 推理系列产品、Atlas A2 训练系列产品/Atlas A2 推理系列产品、Atlas A3 训练系列产品/Atlas A3 推理系列产品：该接口不支持与grouped
    matmul类算子（如aclnnGroupedMatmulV4）配套使用。
  - 当无offset时，out shape与scale shape一致。
  - 若out作为matmul类算子输入（如aclnnQuantMatmulV4），shape支持1维(1,)、(n,)或2维(1, n)，其中n与matmul计算中右矩阵（对应参数x2）的shape
    n一致。
  - 若out作为grouped matmul类算子输入（如aclnnGroupedMatmulV4），仅在分组模式为m轴分组时使用（对应参数groupType为0），shape支持1维(g,)或2维(g,
    1)、(g, n)，其中n与grouped matmul计算中右矩阵（对应参数x2）的shape n一致，g与grouped matmul计算中分组数（对应参数groupListOptional的shape大小）一致。
  - offset，scale，out的shape支持1维(1,)、(n,)或2维(1, n)，其中n与matmul计算中右矩阵（对应参数x2）的shape n一致。
  - 当输入scale的shape为1维，out的shape也为1维，且shape大小为scale与offset单维shape大小的最大值。
  - 当输入scale的shape为2维，out的shape与输入scale的shape维度和大小完全一致。
  error_conditions:
  - 传入的scale或out是空指针。
  - scale、offset或out的数据类型和数据格式不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的scale或out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: scale、offset或out的数据类型和数据格式不在支持的范围之内。
  evidence:
  - aclnnTransQuantParamV2GetWorkspaceSize
  - aclnnTransQuantParamV2
  extraction_status: complete
  inputs:
  - name: scale
    role: input
    dtype: FLOAT32
    noncontiguous: 'no'
    tensor_rank: 1..2
    shape_constraints:
    - 'scale（aclTensor*）: shape的约束请参见约束说明。'
    value_constraints:
    - 'scale（aclTensor*）: 用户需要保证scale数据中不存在NaN和Inf。'
    optional_semantics:
    - 'scale（aclTensor*）: 不支持空Tensor。'
  - name: offset
    role: input
    description: 可选参数，量化中的offset值。对应公式中的`offset`。
    dtype: FLOAT32
    noncontiguous: 'no'
    tensor_rank: 1..2
    shape_constraints:
    - 'offset（aclTensor*）: shape的约束请参见约束说明。'
    value_constraints:
    - 'offset（aclTensor*）: 用户需要保证offset数据中不存在NaN和Inf。'
    optional_semantics:
    - 'offset（aclTensor*）: 不支持空Tensor。'
  outputs:
  - name: out
    role: output
    description: 量化的计算输出。对应公式中的`out`。
    dtype: UINT64、INT64
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'out（aclTensor*）: shape的约束请参见约束说明。'
    optional_semantics:
    - 'out（aclTensor*）: 不支持空Tensor。'
