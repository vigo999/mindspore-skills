    head 维度大小记为 N2。必须满足 N1 >= N2 且 N1 % N2 == 0。(例如：在 BNSD 布局下，N1 对应 query 的第 2 维，N2
    对应 key/value 的第 2 维)。
  - headdim=128。
  - 当前只支持 BNSD 和 MHA(N1==N2)。
