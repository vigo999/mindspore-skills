- api_name: aclnnPromptFlashAttention
  doc_names:
  - aclnnPromptFlashAttention.md
  source_repo: ops-transformer
  workspace_api: aclnnPromptFlashAttentionGetWorkspaceSize
  execute_api: aclnnPromptFlashAttention
  summary: 算子功能：全量推理场景的FlashAttention算子。
  constraints:
  - 该接口与PyTorch配合使用时，需要保证CANN相关包与PyTorch相关包的版本匹配。
  - 入参为空的处理：算子内部需要判断参数query是否为空，如果是空则直接返回。参数query不为空Tensor，参数key、value为空tensor(即S2为0)，则attentionOut填充为全零。attentionOut为空Tensor时，AscendCLNN框架会处理。其余在上述参数说明中标注了“可传入nullptr”的入参为空指针时，不进行处理。
  - query、key、value数据排布格式支持从多种维度解读，其中B（Batch）表示输入样本批量大小、S（Seq-Length）表示输入样本序列长度、H（Head-Size）表示隐藏层的大小、N（Head-Num）表示多头数、D（Head-Dim）表示隐藏层最小的单元尺寸，且满足D=H/N。
  - 支持B轴小于等于65536(64k)，输入类型包含INT8时D轴非32对齐或输入类型为FLOAT16或BFLOAT16时D轴非16对齐时，B轴仅支持到128。
  - 支持N轴小于等于256。
  - 支持D轴小于等于512。inputLayout为BSH或者BSND时，要求N*D小于65535。
  - T小于等于65536;。
  - N等于8/16/32/64/128，且Q_N、K_N、V_N相等;。
  - Q_D、K_D等于192，V_D等于128/192;。
  - 数据类型仅支持BFLOAT16;。
  - sparse模式仅支持sparse=0且不传mask，或sparse=3且传入mask；。
  - 当sparse=3时，要求每个batch单独的actualSeqLengths < actualSeqLengthsKv。
  - 在inputLayout为BSH时，支持B轴小于等于300，其余情况B轴小于等于128；。
  - 支持N轴小于等于256；。
  - 支持S轴小于等于65535(64k), Q_S或KV_S非128对齐，Q_S和KV_S不等长的场景不支持配置atten_mask；。
  - 支持D轴小于等于512。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持FLOAT16、BFLOAT16。
  - Atlas 推理系列加速卡产品：数据类型仅支持FLOAT16。
  - Atlas 推理系列加速卡产品：仅支持nullptr。
  - 输入shape限制：通常建议shape输入Q_S, KV_S; B, Q_S, KV_S; 1, Q_S, KV_S; B, 1, Q_S, KV_S; 1,
    1, Q_S, KV_S，其中Q_S为query的shape中的S，KV_S为key和value的shape中的S。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持BOOL、INT8、UINT8。
  - Atlas 推理系列加速卡产品：仅支持BOOL。
  - 其他限制：对于attenMask的KV_S为非32对齐的场景，建议padding到32对齐来提高性能，多余部分填充成1。
  - 输入值域限制：该入参中每个batch中的有效Sequence Length应该不大于query中对应batch的Sequence Length。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持INT64。
  - Atlas 推理系列加速卡产品：数据类型支持INT64。
  - Atlas 推理系列加速卡产品：仅支持取值2147483647。
  - Atlas 推理系列加速卡产品：仅支持取值0和2147483647。
  - 当前支持BSH、BSND、BNSD、BNSD_BSND（输入为BNSD时，输出格式为BSND）。用户不特意指定时建议传入"BSH"。
  - 输入属性限制：需要满足numHeads整除numKeyValueHeads，且在BSND、BNSD、BNSD_BSND场景下，需要与shape中的key/value的N轴shape值相同，否则报错。
  - Atlas 推理系列加速卡产品：仅支持取值0。
  - shape限制：当inputLayout为BNSD_BSND时，输入query的shape是BNSD，输出shape为BSND；其余情况该入参的shape需要与入参query的shape保持一致。
  - Atlas 推理系列加速卡产品：仅支持FLOAT16。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - query、key、value、pseShift、attenMask、attentionOut的数据类型和数据格式不在支持的范围内。
  - API内存调用npu runtime的接口异常。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query、key、value、pseShift、attenMask、attentionOut的数据类型和数据格式不在支持的范围内。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: API内存调用npu runtime的接口异常。
  evidence:
  - aclnnPromptFlashAttentionGetWorkspaceSize
  - aclnnPromptFlashAttention
  extraction_status: complete
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: 3..4
    layout_templates:
    - BSH
    - BSND
    - TND
    - BNSD
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: 3..4
    layout_templates:
    - BSH
    - BSND
    - TND
    - BNSD
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: 3..4
    layout_templates:
    - BSH
    - BSND
    - TND
    - BNSD
  - name: pseShift
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '4'
  - name: attenMask
    role: input
    dtype: BOOL、INT8、UINT8
    noncontiguous: 'no'
    tensor_rank: 2..4
  - name: actualSeqLengths
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: numHeads
    role: input
    dtype: INT64
    tensor_rank: '1'
    shape_constraints:
    - 'numHeads: 限制：在BNSD/NSD场景下，需要与shape中的query的N轴shape值相同。'
  - name: scaleValue
    role: input
    dtype: DOUBLE
    tensor_rank: '1'
  - name: preTokens
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: nextTokens
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: inputLayout
    role: input
    dtype: CHAR
  - name: numKeyValueHeads
    role: input
    dtype: INT64
  outputs:
  - name: attentionOut
    role: output
    description: 公式中的输出。
    dtype: FLOAT16、BFLOAT16
    tensor_rank: 3..4
- api_name: aclnnPromptFlashAttentionV2
  doc_names:
  - aclnnPromptFlashAttentionV2.md
  source_repo: ops-transformer
  workspace_api: aclnnPromptFlashAttentionV2GetWorkspaceSize
  execute_api: aclnnPromptFlashAttentionV2
  summary: 接口功能：全量推理场景的FlashAttention算子，相较于aclnnPromptFlashAttention接口，此接口新增了支持sparse优化、支持actualSeqLengthsKv优化、支持int8量化功能。
  constraints:
  - 该接口与PyTorch配合使用时，需要保证CANN相关包与PyTorch相关包的版本匹配。
  - 入参为空的处理：算子内部需要判断参数query是否为空，如果是空则直接返回。参数query不为空Tensor，参数key、value为空tensor（即S2为0），则attentionOut填充为全零。attentionOut为空Tensor时，AscendCLNN框架会处理。其余在上述参数说明中标注了“可传入nullptr”的入参为空指针时，不进行处理。
  - 支持B轴小于等于65536（64k），输入类型包含INT8时D轴非32对齐或输入类型为FLOAT16或BFLOAT16时D轴非16对齐时，B轴仅支持到128；。
  - 支持N轴小于等于256；。
  - 支持D轴小于等于512。inputLayout为BSH或者BSND时，要求N*D小于65535。
  - 在inputLayout为BSH时，支持B轴小于等于300，其余情况B轴小于等于128；。
  - 支持S轴小于等于65535(64k), Q_S或KV_S非128对齐，Q_S和KV_S不等长的场景不支持配置atten_mask；。
  - 支持D轴小于等于512。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持FLOAT16、BFLOAT16、INT8。
  - Atlas 推理系列加速卡产品：数据类型仅支持FLOAT16。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持FLOAT16、BFLOAT16。
  - Atlas 推理系列加速卡产品：仅支持nullptr。
  - 输入shape限制：如果不使用该功能可传入nullptr。通常建议shape输入Q_S,KV_S;B,Q_S,KV_S;1,Q_S,KV_S;B,1,Q_S,KV_S;1,1,Q_S,KV_S，其中Q_S为query的shape中的S，KV_S为key和value的shape中的S，对于attenMask的KV_S为非32对齐的场景，建议padding到32对齐来提高性能，多余部分填充成1。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持BOOL、INT8和UINT8。
  - Atlas 推理系列加速卡产品：仅支持BOOL。
  - 当attenMask数据类型取INT8、UINT8时，其tensor中的值需要为0或1。
  - 对于actualSeqLengths，如果不指定序列长度，可以传入nullptr，这表示有效序列长度与query的shape中的S长度相同。需要注意的是，该参数中每个batch的有效序列长度不应超过query中对应batch的序列长度。
  - 对于actualSeqLengthsKv，如果不指定序列长度，可以传入nullptr，这表示有效序列长度与key/value的shape中的S长度相同。需要注意的是，该参数中每个batch的有效序列长度不应超过key/value中对应batch的序列长度。
  - 输入属性限制：关于seqlen的传入长度有以下规则：当传入长度为1时，所有Batch将使用相同的seqlen；当传入长度大于或等于Batch数量时，将取seqlen的前Batch个数值；其他长度的传入将不被支持。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持INT64。
  - Atlas 推理系列加速卡产品：数据类型支持INT64。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持UINT64、FLOAT32。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持FLOAT32。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Ascend 950PR/Ascend 950DT：数据类型支持FLOAT32和BFLOAT16。
  - Atlas 推理系列加速卡产品：仅支持取值2147483647。
  - Atlas 推理系列加速卡产品：仅支持取值0和2147483647。
  - 当前支持BSH、BSND、BNSD、BNSD_BSND（输入为BNSD时，输出格式为BSND）。用户不特意指定时建议传入"BSH"。
  - 说明：query、key、value数据排布格式支持从多种维度解读，其中B（Batch）表示输入样本批量大小、S（Seq-Length）表示输入样本序列长度、H（Head-Size）表示隐藏层的大小、N（Head-Num）表示多头数、D（Head-Dim）表示隐藏层最小的单元尺寸，且满足D=H/N、T表示所有Batch输入样本序列长度的累加和。
  - Host侧的int，代表key、value中head个数，用于支持GQA（Grouped-Query Attention，分组查询注意力）场景。用户不特意指定时建议传入0，表示key/value和query的head个数相等。限制：需要满足numHeads整除numKeyValueHeads，且在BSND、BNSD、BNSD_BSND场景下，需要与shape中的key/value的N轴shape值相同，否则报错。
  - Atlas 推理系列加速卡产品：仅支持取值0。
  - sparseMode为0时，代表defaultMask模式，如果attenmask未传入则不做mask操作，忽略preTokens和nextTokens（内部赋值为INT_MAX）；如果传入，则需要传入完整的attenmask矩阵（S1
    * S2），表示preTokens和nextTokens之间的部分需要计算。
  - sparseMode为1时，代表allMask，必须传入完整的attenmask矩阵（S1 * S2）。
  - sparseMode为2时，代表leftUpCausal模式的mask，需要传入优化后的attenmask矩阵（2048*2048）。
  - sparseMode为3时，代表rightDownCausal模式的mask，对应以右顶点为划分的下三角场景，需要传入优化后的attenmask矩阵（2048*2048）。
  - sparseMode为4时，代表band模式的mask，需要传入优化后的attenmask矩阵（2048*2048）。
  - sparseMode为5、6、7、8时，分别代表prefix、global、dilated、block_local，**均暂不支持**。用户不特意指定时建议传入0。
  - shape限制：当inputLayout为BNSD_BSND时，输入query的shape是BNSD，输出shape为BSND；其余情况该入参的shape需要与入参query的shape保持一致。
  - Atlas 推理系列加速卡产品：仅支持FLOAT16。
  - 输入为INT8，输出为INT8的场景：入参deqScale1、quantScale1、deqScale2、quantScale2需要同时存在，quantOffset2可选，不传时默认为0。
  - 输入为INT8，输出为FLOAT16的场景：入参deqScale1、quantScale1、deqScale2需要同时存在，若存在入参quantOffset2
    或 quantScale2（即不为nullptr），则报错并返回。
  - 输入为FLOAT16或BFLOAT16，输出为INT8的场景：入参quantScale2需存在，quantOffset2可选，不传时默认为0，若存在入参deqScale1
    或 quantScale1 或 deqScale2（即不为nullptr），则报错并返回。
  - 入参 quantScale2 和 quantOffset2 支持 per-tensor/per-channel 两种格式和 FLOAT32/BFLOAT16
    两种数据类型。若传入 quantOffset2 ，需保证其类型和shape信息与 quantScale2 一致。当输入为BFLOAT16时，同时支持 FLOAT32和BFLOAT16
    ，否则仅支持 FLOAT32 。per-channel 格式，当输出layout为BSH时，要求 quantScale2 所有维度的乘积等于H；其他layout要求乘积等于N*D。（建议输出layout为BSH时，quantScale2
    shape传入[1,1,H]或[H]；输出为BNSD时，建议传入[1,N,1,D]或[N,D]；输出为BSND时，建议传入[1,1,N,D]或[N,D]）。
  - 输出为int8，quantScale2 和 quantOffset2 为 per-channel时，暂不支持左padding、Ring Attention或者D非32Byte对齐的场景。
  - 输出为int8时，暂不支持sparse为band且preTokens/nextTokens为负数。
  - parseMode = 0，attenMask如果非空指针，每个batch actualSeqLengths - actualSeqLengthsKV -
    preTokens > 0 或 nextTokens < 0 时，满足拦截条件。
  - sparseMode = 1 或 2，不会出现满足拦截条件的情况。
  - sparseMode = 3，每个batch actualSeqLengthsKV - actualSeqLengths < 0，满足拦截条件。
  - sparseMode = 4，preTokens < 0 或 每个batch nextTokens + actualSeqLengthsKV - actualSeqLengths
    < 0 时，满足拦截条件。
