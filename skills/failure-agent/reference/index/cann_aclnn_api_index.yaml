  - name: scaleValue
    role: input
    dtype: DOUBLE
  - name: preTokens
    role: input
    dtype: INT64
  - name: nextTokens
    role: input
    dtype: INT64
  - name: inputLayout
    role: input
    dtype: CHAR
    tensor_rank: 3|4
    layout_templates:
    - BSND
    - BNSD
    - TND
    - BSH
  - name: numKeyValueHeads
    role: input
    dtype: INT64
    shape_constraints:
    - 'numKeyValueHeads: 在BNSD、BSND、BNSD_BSND、BSND_BNSD、BNSD_NBSD、BSND_NBSD、TND、NTD、NTD_TND、TND_NTD场景下，还需要与shape中的key/value的N轴shape值相同，否则执行异常。'
    value_constraints:
    - 'numKeyValueHeads: 需要满足numHeads整除numKeyValueHeads，GQA非量化场景和Prefill MLA非量化场景下，numHeads与numKeyValueHeads的比值无限制;
      Decode MLA场景仅支持numHeads与numKeyValueHeads的比值为1、2、4、8、16、32、64、128。'
  - name: sparseMode
    role: input
    dtype: INT64
    value_constraints:
    - 'sparseMode: 如果传入，则需要传入完整的attenmask矩阵（S1 * S2），表示preTokens和nextTokens之间的部分需要计算。'
    - 'sparseMode: sparseMode为2时，代表leftUpCausal模式的mask，需要传入优化后的attenmask矩阵（2048*2048）。'
    - 'sparseMode: sparseMode为3时，代表rightDownCausal模式的mask，对应以右顶点为划分的下三角场景，需要传入优化后的attenmask矩阵（2048*2048）。'
    - 'sparseMode: sparseMode为4时，代表band模式的mask，需要传入优化后的attenmask矩阵（2048*2048）。'
    optional_semantics:
    - 'sparseMode: sparseMode为1时，代表allMask，必须传入完整的attenmask矩阵（S1 * S2）。'
