- api_name: aclnnFusedLinearCrossEntropyLossGrad
  doc_names:
  - aclnnFusedLinearCrossEntropyLossGrad.md
  source_repo: ops-nn
  workspace_api: aclnnFusedLinearCrossEntropyLossGradGetWorkspaceSize
  execute_api: aclnnFusedLinearCrossEntropyLossGrad
  summary: 接口功能：本算子是词汇表并行场景下交叉熵损失计算模块中的一部分，解决超大规模词汇表下的显存和计算效率问题，当前部分为梯度计算实现，用于计算叶子节点`input`和`weight`的梯度。
  constraints:
  - 'weight: 数据类型与输入input相同。'
  - 'targetMask: shape长度乘以8须不小于输入grad的长度。'
  - 'maskedTarget: shape长度与输入grad相同。'
  - 'labelSmoothing: 目前仅支持取值为0。'
  error_conditions:
  - 传入的非可选输入是空指针。
  - 输入的labelSmoothing取值不支持。
  - 当前平台不在支持的平台范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的非可选输入是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入的labelSmoothing取值不支持。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: 当前平台不在支持的平台范围内。
  evidence:
  - aclnnFusedLinearCrossEntropyLossGradGetWorkspaceSize
  - aclnnFusedLinearCrossEntropyLossGrad
  extraction_status: complete
  inputs:
  - name: grad
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
  - name: input
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
  - name: weight
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    output_relation:
    - 'weight: 数据类型与输入input相同。'
  - name: targetMask
    role: input
    dtype: UINT8
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'targetMask: shape长度乘以8须不小于输入grad的长度。'
  - name: maskedTarget
    role: input
    dtype: INT64、INT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'maskedTarget: shape长度与输入grad相同。'
  - name: labelSmoothing
    role: input
    dtype: FLOAT32
    value_constraints:
    - 'labelSmoothing: 目前仅支持取值为0。'
  - name: logitsMaxOptional
    role: optional_input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'logitsMaxOptional: shape长度与输入grad相同。'
    value_constraints:
    - 'logitsMaxOptional: 支持输入nullptr，输入nullptr的场景需要提供有效的softmaxOptional输入。'
  - name: sumExpLogitsOptional
    role: optional_input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'sumExpLogitsOptional: shape长度与输入grad相同。'
    value_constraints:
    - 'sumExpLogitsOptional: 支持输入nullptr，输入nullptr的场景需要提供有效的softmaxOptional输入。'
  - name: softmaxOptional
    role: optional_input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'softmaxOptional: shape第1维长度与输入grad长度相同，第二维长度与输入weight的第1维长度相同。'
  outputs:
  - name: inputGradOut
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'inputGradOut: shape第1维长度与输入grad长度相同，第2维长度与输入weight的第2维长度相同。'
    output_relation:
    - 'inputGradOut: 数据类型与输入input相同。'
  - name: weightGradOut
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'weightGradOut: shape第1维长度与输入weight的第1维长度相同，第2维长度与输入grad长度相同。'
    output_relation:
    - 'weightGradOut: 数据类型与输入input相同。'
