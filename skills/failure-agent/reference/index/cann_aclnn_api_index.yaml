- api_name: aclnnRainFusionAttention
  doc_names:
  - aclnnRainFusionAttention.md
  source_repo: ops-transformer
  workspace_api: aclnnRainFusionAttentionGetWorkspaceSize
  execute_api: aclnnRainFusionAttention
  summary: 算子功能**：RainFusionAttention稀疏注意力计算，支持灵活的块级稀疏模式，通过selectIdx指定每个Q块选择的KV块，实现高效的稀疏注意力计算。
  constraints:
  - 该接口与PyTorch配合使用时，需要保证CANN相关包与PyTorch相关包的版本匹配。
  - qInputLayout当前仅支持"TND"和"BNSD"。
  - kvInputLayout当前仅支持"TND"和"BNSD"。
  - 输入query、key、value的数据类型必须一致，支持FLOAT16和BFLOAT16。
  - blockShape必须包含至少两个元素[blockShapeX, blockShapeY]，且值必须大于0。
  - selectIdx的shape必须为[T, headNum, maxKvBlockNum]，其中T为所有batch中Q方向切块的总数。
  - selectNumIdx的shape必须为[T, headNum]。
  - innerPrecise必须为0（float32 softmax）或1（fp16 softmax），query输入为BFLOAT16时，只能配置为0。
  - qSeqlen和kvSeqlen不需要被blockShape整除，支持非对齐场景，实际分块数通过向上取整计算。
  - qSeqlen在qInputLayout为“TND”和"BNSD"时必选；kvSeqlen在kvInputLayout为“TND”和"BNSD"时必选。
  - 稀疏块索引必须在有效范围内，无效位置用-1填充。
  - 输入query的headNum为N1，输入key和value的headNum为N2，则N1 >= N2 && N1 % N2 == 0。
  - 设G = N1 / N2，G需要满足以下约束：G < 128 && 128 % G == 0。
  error_conditions:
  - 输入query，key，value，selectIdx，selectNumIdx传入的是空指针。
  - query，key，value 数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入query，key，value，selectIdx，selectNumIdx传入的是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query，key，value 数据类型不在支持的范围之内。
  evidence:
  - aclnnRainFusionAttentionGetWorkspaceSize
  - aclnnRainFusionAttention
  extraction_status: complete
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: selectIdx
    role: input
    dtype: INT64
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'selectIdx: shape为[QBlockNum, headNum, maxKvBlockNum]。'
  - name: selectNumIdx
    role: input
    dtype: INT64
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'selectNumIdx: shape为[QBlockNum, headNum]。'
  - name: blockShape
    role: input
    dtype: INT64
    tensor_rank: '1'
    value_constraints:
    - 'blockShape: 必须包含至少两个元素[blockShapeX, blockShapeY]。'
  - name: attenMaskOptional
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
    tensor_rank: '2'
  - name: actualSeqLengthsOptional
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: actualSeqLengthsKvOptional
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: blockTableOptional
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    tensor_rank: '2'
  - name: qInputLayout
    role: input
    dtype: String
  - name: kvInputLayout
    role: input
    dtype: String
  - name: numKeyValueHeads
    role: input
    dtype: INT64
  - name: maskType
    role: input
    dtype: INT64
  - name: scaleValue
    role: input
    dtype: DOUBLE
  - name: innerPrecise
    role: input
    dtype: INT64
  - name: blockSize
    role: input
    dtype: INT64
  outputs:
  - name: attentionOut
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
    output_relation:
    - 'attentionOut: 数据类型和shape与query保持一致。'
  - name: softmaxLseOptional
    role: output
    dtype: FLOAT
    noncontiguous: 'yes'
    tensor_rank: '3'
