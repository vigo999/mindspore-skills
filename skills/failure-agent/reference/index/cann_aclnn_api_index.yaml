- api_name: aclnnInplaceMatmulAllReduceAddRmsNorm
  doc_names:
  - aclnnInplaceMatmulAllReduceAddRmsNorm.md
  source_repo: ops-transformer
  workspace_api: aclnnInplaceMatmulAllReduceAddRmsNormGetWorkspaceSize
  execute_api: aclnnInplaceMatmulAllReduceAddRmsNorm
  summary: 算子功能**：完成mm + all_reduce + add + rms_norm计算。
  constraints:
  - 使用场景同融合算子aclnnMatmulAllReduce一致：增量场景不使能MC2，全量场景使能MC2。
  - 输入x1可为二维或者三维，其shape为(b, s, k)或者(m, k)。x2必须是二维，其shape为(k, n)，轴满足mm算子入参要求，k轴相等。bias若非空，bias为一维，其shape为(n)。
  - b*s、m、k、n的值均不得超过2147483647(INT32_MAX)。
  - 输入residual必须是三维，其shape为(b, s, n)，当x1为二维时，residual的(b*s)等于x1的m。输入gamma必须是一维，其shape为(n)。
  - 输出y和normOut的shape和数据类型同residual，其shape为(b, s, n)。
  - x1、x2、bias、residual、gamma、y、normOut计算输入的数据类型要一致。
  - 只支持x2矩阵转置/不转置，x1矩阵支持不转置场景。
  - 支持1、2、4、8卡，并且仅支持hccs链路all mesh组网。
  - 支持(b*s)、n为0的空tensor，不支持k为0的空tensor。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：一个模型中的通算融合MC2算子，仅支持相同通信域。
  error_conditions:
  - 传入的x1、x2、residual或gamma是空指针。
  - x1、x2、residual的shape不符合约束要求。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2、residual或gamma是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、residual的shape不符合约束要求。
  evidence:
  - aclnnInplaceMatmulAllReduceAddRmsNormGetWorkspaceSize
  - aclnnInplaceMatmulAllReduceAddRmsNorm
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: 2..3
    optional_semantics:
    - 'x1: 支持空Tensor。'
  - name: x2
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    optional_semantics:
    - 'x2: 支持空Tensor。'
  - name: bias
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '1'
  - name: residual
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
  - name: gamma
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '1'
  - name: epsilon
    role: input
    dtype: double
    value_constraints:
    - 'epsilon: epsilon取值满足取值范围(0,1)。'
  - name: group
    role: input
    dtype: string
  - name: reduceOp
    role: input
    dtype: string
  - name: commTurn
    role: input
    dtype: INT64
  - name: streamMode
    role: input
    dtype: INT64
  outputs:
  - name: normOut
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    optional_semantics:
    - 'normOut: 不支持空Tensor。'
