    noncontiguous: 'yes'
    shape_constraints:
    - 'biasOptional（aclTensor*）: shape与normalizedShape相等，为[R1,...,Rj]。'
    optional_semantics:
    - 'biasOptional（aclTensor*）: 不支持空Tensor。'
