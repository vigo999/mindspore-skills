    role: input
    dtype: FLOAT16、BFLOAT16
  - name: expertIds
    role: input
    dtype: INT32
  - name: scalesOptional
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
  - name: xActiveMaskOptional
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
    value_constraints:
    - 'xActiveMaskOptional: 各卡BS不一致时所有token需有效。'
  - name: expertScalesOptional
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
  - name: groupEp
    role: input
    dtype: STRING
  - name: epWorldSize
    role: input
    dtype: INT64
  - name: epRankId
    role: input
    dtype: INT64
    value_constraints:
    - 'epRankId: 取值范围[0, epWorldSize)同一个EP通信域中各卡的epRankId不重复。'
  - name: moeExpertNum
    role: input
