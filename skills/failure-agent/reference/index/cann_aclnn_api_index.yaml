  - name: expandX
    role: input
    dtype: BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'expandX: 要求为2D Tensor，shape为 (max(tpWorldSize, 1) * A , H)。'
