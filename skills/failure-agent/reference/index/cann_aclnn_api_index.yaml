  - perchannel量化模式：当数据格式为ND时，推荐使用转置后的`weight`输入；。
  - pergroup量化模式和mx量化模式：推荐使用非转置的`weight`输入。
  - 维度支持两维，shape支持(m, k)，其中Reduce维度k需要与`weight`的Reduce维度k大小相等。
