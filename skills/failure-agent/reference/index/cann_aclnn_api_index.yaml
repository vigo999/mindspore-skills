  source_repo: ops-transformer
  workspace_api: aclnnMoeDistributeCombineGetWorkspaceSize
  execute_api: aclnnMoeDistributeCombine
  summary: 接口功能：当存在TP域通信时，先进行ReduceScatterV通信，再进行AllToAllV通信，最后将接收的数据整合（乘权重再相加）；当不存在TP域通信时，进行AllToAllV通信，最后将接收的数据整合（乘权重再相加）。
  constraints:
  - 对于共享专家，需满足 (A = BS * epWorldSize * sharedExpertNum / sharedExpertRankNum)。
  - 对于MoE专家，当`globalBs`为0时，需满足 (A >= BS * epWorldSize * min(localExpertNum, K))；当`globalBs`非0时，需满足
    (A >= globalBs * min(localExpertNum, K))。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：取值范围(0, 7168]，且需为32的整数倍。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品、Ascend 950PR/Ascend 950DT：取值为7168。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：取值范围为 (0 < BS ≤ 256)。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品、Ascend 950PR/Ascend 950DT：取值范围为 (0 < BS ≤ 512)。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：取值范围为 (0 < K ≤ 16)。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品、Ascend 950PR/Ascend 950DT：取值范围为 (0 < K ≤ 8)。
  - '**serverNum**：表示服务器的节点数，取值仅支持2、4、8。'
  - 对于共享专家卡，(localExpertNum = 1)。
  - 对于MoE专家卡，(localExpertNum = moeExpertNum / (epWorldSize - sharedExpertRankNum))；当(localExpertNum
    > 1)时，不支持TP域通信。
  - 设置大小要求 (≥ 2 * (BS * epWorldSize * min(localExpertNum, K) * H * sizeof(uint16)
    + 2MB))。
  - ep通信域内：设置大小要求 (≥ 2) 且满足 (1024^2 * (HCCL_BUFFSIZE - 2) / 2 ≥ BS * 2 * (H + 128)
    * (epWorldSize * localExpertNum + K + 1))，其中`localExpertNum`需使用MoE专家卡的本卡专家数。
  - tp通信域内：设置大小要求\>=A * (H * 2 + 128) * 2。
  - Ascend 950PR/Ascend 950DT：设置大小要求 (≥ 2) 且满足 (1024^2 * (HCCL_BUFFSIZE - 2) / 2 ≥
    BS * 2 * (H + 128) * (epWorldSize * localExpertNum + K + 1))，其中`localExpertNum`需使用MoE专家卡的本卡专家数。
  - 一个模型中的`aclnnMoeDistributeCombine`和`aclnnMoeDistributeDispatch`仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 一个模型中的`aclnnMoeDistributeCombine`和`aclnnMoeDistributeDispatch`仅支持相同TP通信域或都不支持TP通信域；有TP通信域时，该通信域中不允许有其他算子。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：一个通信域内的节点需在一个超节点内，不支持跨超节点。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：多机场景仅支持交换机组网，不支持双机直连组网。
  - 取值范围(0, 512]，且满足moeExpertNum % (epWorldSize - sharedExpertRankNum) = 0。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  - 输入和输出的shape不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 输入和输出的shape不在支持的范围内。
  evidence:
  - aclnnMoeDistributeCombineGetWorkspaceSize
  - aclnnMoeDistributeCombine
  extraction_status: complete
  inputs:
  - name: expandX
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
  - name: expertIds
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'expertIds: (BS, K)。'
  - name: expandIdx
    role: input
    description: 对应aclnnMoeDistributeDispatch中的expandIdx输出。
    dtype: INT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'expandIdx: (BS*K, )。'
  - name: epSendCounts
    role: input
    description: 对应aclnnMoeDistributeDispatch中的epRecvCounts输出。
    dtype: INT32
    noncontiguous: 'yes'
  - name: expertScales
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'expertScales: (BS, K)。'
  - name: tpSendCounts
    role: input
    description: 对应aclnnMoeDistributeDispatch中的tpRecvCounts输出。
    dtype: INT32
  - name: xActiveMask
