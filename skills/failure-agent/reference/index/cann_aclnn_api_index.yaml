  - 当输入x2为NZ时，不支持transposeX2为false的场景。
  - 支持调用本接口前，通过aclnnTransMatmulWeight对format为ND的x2处理得到NZ格式。
  - x1的最后一维大小不能超过65535，x1的最后一维指transposeX1为true时的m或transposeX1为false时的k。当x1数据类型为INT32、INT4时，为INT4量化场景，当前仅支持transposeX1为false情况。其中当x1数据类型为INT4时，维度表示：（batch，m，k），要求k为偶数，当x1数据类型为INT32时，每个INT32数据存放8个INT4数据，对应维度表示：（batch，m，k
    // 8），要求k为8的倍数。
  - x2的最后一维大小不能超过65535，x2的最后一维指transposeX2为true时的k或transposeX2为false时的n。当输入x2为NZ时，不支持transposeX2为false的场景。
  - 数据类型为INT4时，在transposeX2为true时shape形如（n，k），要求k为偶数；在transposeX2为false时shape形如（k，n），要求n为偶数。
  - 数据类型为INT32时，每个INT32数据存放8个INT4数据，在transposeX2为true时shape形如（n，k // 8），要求k为8的倍数；在transposeX2为false时shape形如（k，n
    // 8），要求n为8的倍数。
  - 可使用aclnnConvertWeightToINT4Pack接口完成x2从INT32（1个int32在0~3bit位存储1个int4）到INT32（1个int32存储8个int4）或INT4（1个int4表示1个int4）的数据格式转换，具体参见aclnnConvertWeightToINT4Pack接口。
  - 当最后两根轴其中一根轴为1（即n=1或k=1）时，x2不支持私有格式，仅支持ND格式。
  - 支持调用本接口前，通过aclnnTransMatmulWeight或aclnnNpuFormatCast对format为ND的x2处理得到NZ格式。
  - 当原始ND的后两维中存在某一维度为1时，不建议转NZ，默认x2为非连续，且仅支持x2为非连续的tensor。
  - "ND：\n 支持最后两根轴转置情况下的非连续tensor，其他场景的非连续的Tensor不支持\n 在transposeX1为false时shape形如（batch，n，k），在transposeX1为true时shape形如（batch，k，n），batch可不存在，其中k与x1的shape中的k一致\
    \ \n NZ：\n 在transposeX2为true时shape形如（batch，k1，n1，n0，k0），batch可不存在，其中k0=32，n0=16，x1\
    \ shape中的k和x2 shape中的k1需要满足ceil（k / 32） = k1\n 在transposeX2为false时shape形如（batch，n1，k1，k0，n0），batch可不存在，其中k0=16，n0=32，x1\
    \ shape中的k和x2 shape中的k1需要满足ceil（k / 16） = k1。"
  - "ND：在transposeX2为false时shape形如（batch，k，n）\n在transposeX2为true时shape形如（batch，n，k）\n\
    batch可不存在，其中k与x1的shape中的k一致\n NZ：\n \n 在transposeX2为true时shape形如（batch，k1，n1，n0，k0），batch可不存在，其中k0\
    \ = 32，n0 = 16，x1 shape中的k和x2 shape中的k1需要满足以下关系：ceil（k / 32） = k1\n 在transposeX2为false时shape形如（batch，n1，k1，k0，n0），batch可不存在，其中k0\
    \ = 16，n0 = 32，x1 shape中的k和x2 shape中的k1需要满足以下关系：ceil（k / 16） = k1。"
