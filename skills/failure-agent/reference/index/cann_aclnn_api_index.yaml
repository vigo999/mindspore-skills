  - ropeSin和ropeCos的shape为(T, Dr)。
  - cacheIndex的shape为(T)。
  - dequantScaleXOptional的shape为(T, 1)。
  - queryOut的shape为(T, N, Hckv)。
  - queryRopeOut的shape为(T, N, Dr)。
  - int8全量化场景下，dequantScaleQNopeOutOptional的shape为(T, N, 1)，其他场景下为(1)。
