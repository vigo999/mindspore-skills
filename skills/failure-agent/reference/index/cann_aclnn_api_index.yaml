  - 当输入x1的shape为(b, s, k)时，输出output的shape为(b, s, n)，当输入x1的shape为(m, k)时，输出output的shape为(m,
    n)。
  - 传入的x1、x2、dequantScale或者output不为空指针。
  - x1和x2、dequantScale、output、bias（非空场景）、x3（非空场景）的数据类型和数据格式需要在支持的范围之内。
  - 若输出output类型为FLOAT16，dequantScale的类型为INT64、UINT64；若输出output类型为BFLOAT16，dequantScale的类型为BFLOAT16，x3的类型为BFLOAT16。
  - 仅支持hccs链路all mesh组网。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持1、2、4、8卡。
  - Ascend 950PR/Ascend 950DT：支持1、2、4、8、16、32、64卡。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：一个模型中的通算融合MC2算子，仅支持相同通信域。
  - 不支持空tensor。
  error_conditions:
  - 传入的x1、x2、dequantScale或output是空指针。
  - x1、x2、bias、dequantScale、x3或output的数据类型不在支持的范围之内。
