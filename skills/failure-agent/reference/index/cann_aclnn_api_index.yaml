  summary: 算子功能：对两个输入矩形框集合，计算交并比（IOU）或前景交叉比（IOF），用于评价预测框（bBox）和真值框（gtBox）的重叠度。
  constraints:
  - 'bBoxes: shape中的m为bounding boxes的数量。'
  - 'bBoxes: shape中的4指[x0, y0, x1, y1]，(x0, y0)和(x1, y1)分别表示矩形框的左上角和右下角，需满足x1 > x0,
    y1 > y0。'
  - 'aligned: True：bBoxes和gtBoxes的shape保持一致，都是(m, 4)，输出的shape为(m, 1)。'
  - 'aligned: False：bBoxes和gtBoxes的shape不一致，分别是(m, 4)和(n, 4)，输出的shape为(m, n)。'
  error_conditions:
  - 传入的bBoxes、gtBoxes和输出overlap是空指针。
  - bBoxes、gtBoxes、overlap不是二维。
  - API内部校验错误，通常由于输入数据或属性的规格不在支持的范围之内导致。
  - API调用npu runtime的接口异常，如SocVersion不支持。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的bBoxes、gtBoxes和输出overlap是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: bBoxes、gtBoxes、overlap不是二维。
  - name: ACLNN_ERR_INNER_NULLPTR
    code: '561103'
    description: API内部校验错误，通常由于输入数据或属性的规格不在支持的范围之内导致。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: API调用npu runtime的接口异常，如SocVersion不支持。
