- api_name: aclnnFlatQuant
  doc_names:
  - aclnnFlatQuant.md
  source_repo: ops-nn
  workspace_api: aclnnFlatQuantGetWorkspaceSize
  execute_api: aclnnFlatQuant
  summary: 接口功能**：该融合算子为输入矩阵x一次进行两次小矩阵乘法，即右乘输入矩阵kroneckerP2，左乘输入矩阵kroneckerP1，然后针对矩阵乘的结果进行量化处理。目前支持pertoken和pergroup量化方式，分别对应int4和float4_e2m1量化输出类型。
  constraints:
  - 'x: shape为[K, M, N]，其中，K不超过262144，M和N不超过256。'
  - 'kroneckerP1: shape为[M, M]，M与x中M维一致。'
  - 'kroneckerP2: shape为[N, N]，N与x中N维一致。'
  - 'out: 数据类型为INT4时，shape与入参x一致。'
  error_conditions:
  - 传入参数中的必选输入（x、kroneckerP1、kroneckerP2）、必选输出（out、quantScale）是空指针。
  - x、kroneckerP1、kroneckerP2、out、quantScale的数据类型或数据格式不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入参数中的必选输入（x、kroneckerP1、kroneckerP2）、必选输出（out、quantScale）是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x、kroneckerP1、kroneckerP2、out、quantScale的数据类型或数据格式不在支持的范围之内。
  evidence:
  - aclnnFlatQuantGetWorkspaceSize
  - aclnnFlatQuant
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'x（aclTensor*）: shape为[K, M, N]，其中，K不超过262144，M和N不超过256。'
    optional_semantics:
    - 'x（aclTensor*）: 不支持空Tensor。'
  - name: kroneckerP1
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'kroneckerP1（aclTensor*）: shape为[M, M]，M与x中M维一致。'
    optional_semantics:
    - 'kroneckerP1（aclTensor*）: 不支持空Tensor。'
  - name: kroneckerP2
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'kroneckerP2（aclTensor*）: shape为[N, N]，N与x中N维一致。'
    optional_semantics:
    - 'kroneckerP2（aclTensor*）: 不支持空Tensor。'
  - name: clipRatio
    role: input
  outputs:
  - name: out
    role: output
    description: 输出张量，对应公式中的out。
    dtype: INT4、INT32、FLOAT4_E2M1
    noncontiguous: 'yes'
    optional_semantics:
    - 'out（aclTensor*）: 不支持空Tensor。'
    output_relation:
    - 'out（aclTensor*）: 数据类型为INT4时，shape与入参x一致。'
    - 'out（aclTensor*）: 数据类型为INT32时。'
    - 'out（aclTensor*）: 数据类型为INT4时。'
    - 'out（aclTensor*）: 数据类型为FLOAT4_E2M1时。'
  - name: quantScale
    role: output
    description: 输出的量化因子，对应公式中的quantScale。
    dtype: FLOAT32、 FLOAT_E8M0
    noncontiguous: 'yes'
    shape_constraints:
    - 'quantScale（aclTensor*）: 输出类型为INT4或INT32时，shape为[K]，K与x中K维一致。'
    - 'quantScale（aclTensor*）: 输出类型为FLOAT8_E8M0时，shape为[K,ceilDiv(M*N,64),2]。'
    optional_semantics:
    - 'quantScale（aclTensor*）: 不支持空Tensor。'
