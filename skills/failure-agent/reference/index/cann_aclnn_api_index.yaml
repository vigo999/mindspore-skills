- api_name: aclnnAlltoAllAllGatherBatchMatMul
  doc_names:
  - aclnnAlltoAllAllGatherBatchMatMul.md
  source_repo: ops-transformer
  workspace_api: aclnnAlltoAllAllGatherBatchMatMulGetWorkspaceSize
  execute_api: aclnnAlltoAllAllGatherBatchMatMul
  summary: 接口功能**：完成AllToAll、AllGather集合通信与BatchMatMul计算融合、并行。
  constraints:
  - 因为集合通信及BatchMatMul计算所需，输入输出shape需满足以下数学关系：（其中ep=epWorldSize，tp=tpWorldSize）。
  - 'x: (E, C, H/tp)。'
  - weight：(E/ep, H, M/tp)。
  - biasOptional：非空指针情况下，三维时为(E/ep, 1, M/tp)，两维时为(E/ep, M/tp)。
  - y1Out：(E/ep, ep*C, M/tp)。
  - y2OutOptional：(E/ep, ep*C, H)。
  - y3OutOptional：(E/ep, ep*C, M/tp)。
  - 'x: (E, C/tp, H)。'
  - y1Out：(E/ep, ep*tp\*C/tp, M/tp)。
  - y2OutOptional：(E/ep, ep*tp\*C/tp, H)。
  - y3OutOptional：(E/ep, ep*tp\*C/tp, M/tp)。
  - 比如x.size(0)等于E，weight.size(0)等于E/ep，则表示，x.size(0) = ep*weight.size(0)，x.size(0)是ep的整数倍；其他关系类似。
  - E的取值范围为[2, 512]，且E是ep的整数倍。
  - H的取值范围为：[1, 65535]，当xShardType为0时，H是tp的整数倍。
  - M/tp的取值范围为：[1, 65535]。
  - E/ep的取值范围为：[1, 32]。
  - ep、tp均仅支持2、4、8、16、32。
  - groupEp和groupTp名称不能相同。
  - C必须大于0，上限为算子device内存上限，当xShardType为1时，C是tp的整数倍。
  - 通算融合算子不支持并发调用，不同的通算融合算子也不支持并发调用。
  - 不支持跨超节点，只支持超节点内。
  error_conditions:
  - 1. 传入的x、weight、groupEp、groupTp或y1Out是空指针。
  - 1. groupEp或groupTp字符串长度不合法。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 1. 传入的x、weight、groupEp、groupTp或y1Out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 1. groupEp或groupTp字符串长度不合法。
  evidence:
  - aclnnAlltoAllAllGatherBatchMatMulGetWorkspaceSize
  - aclnnAlltoAllAllGatherBatchMatMul
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
    value_constraints:
    - 'x(aclTensor*): 该输入进行AllToAll、AllGather集合通信，必须为3维。'
  - name: weight
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
  - name: biasOptional
    role: input
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'no'
    tensor_rank: 2|3
  - name: groupEp
    role: input
    dtype: STRING
    value_constraints:
    - 'groupEp(char*): 字符串长度需大于0，小于128。'
  - name: groupTp
    role: input
    dtype: STRING
    value_constraints:
    - 'groupTp(char*): 字符串长度需大于0，小于128。'
  - name: epWorldSize
    role: input
    dtype: INT64
  - name: tpWorldSize
    role: input
    dtype: INT64
  - name: xShardType
    role: input
    dtype: INT64
  - name: actType
    role: input
    dtype: INT64
    optional_semantics:
    - 'actType(int64_t): 支持0/1/2/3/4的输入，0表示无激活函数，对应关系为[0：None，1：GELU，2：Silu，3：Relu，4：FastGELU]。'
  outputs:
  - name: y1Out
    role: output
    description: 最终计算结果，如果有激活函数则为激活函数的输出，否则为BatchMatMul的输出。
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
    output_relation:
    - 'y1Out(aclTensor*): 支持3维，数据类型与输入x保持一致。'
  - name: y2OutOptional
    role: optional_output
    description: AllGather的输出，反向可能需要。
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
    value_constraints:
    - 'y2OutOptional(aclTensor*): 空指针表示不需要该输出。'
    output_relation:
    - 'y2OutOptional(aclTensor*): 支持3维，数据类型与输入x保持一致。'
  - name: y3OutOptional
    role: optional_output
    description: 有激活函数时，BatchMatMul的输出。
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
    value_constraints:
    - 'y3OutOptional(aclTensor*): 空指针表示不需要该输出。'
    output_relation:
    - 'y3OutOptional(aclTensor*): 支持3维，数据类型与输入x保持一致。'
- api_name: aclnnAlltoAllMatmul
  doc_names:
  - aclnnAlltoAllMatmul.md
  source_repo: ops-transformer
  workspace_api: aclnnAlltoAllMatmulGetWorkspaceSize
  execute_api: aclnnAlltoAllMatmul
  summary: 接口功能：完成AlltoAll通信、Permute（保证通信后地址连续）和Matmul计算的融合，**先通信后计算**。
  constraints:
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持2、4、8卡。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：支持2、4、8、16卡。
  - Ascend 950PR/Ascend 950DT：支持2、4、8、16卡。
  - 参数说明中shape使用的变量BS必须整除NPU卡数。
  - BS和N的值不得超过2147483647（INT32_MAX），BS的值不得小于0，N的值不得小于1。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持[1, 35000]。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品、Ascend 950PR/Ascend 950DT：支持[2, 65535]。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：不支持任何空tensor。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品、Ascend 950PR/Ascend 950DT：仅支持输入x1的第一维度（BS）为0的空tensor，其它空tensor均不支持。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品、Atlas A3 训练系列产品/Atlas A3 推理系列产品：不支持任何非连续tensor。
  - Ascend 950PR/Ascend 950DT：仅支持x2为非连续tensor，其它非连续tensor均不支持。
  - x1、x2计算输入的数据类型要和output、alltoAllOutOptional计算输出的数据类型一致，传入的x1、x2与output均不为空指针。
