- api_name: aclnnInplaceWeightQuantMatmulAllReduceAddRmsNorm
  doc_names:
  - aclnnInplaceWeightQuantMatmulAllReduceAddRmsNorm.md
  source_repo: ops-transformer
  workspace_api: aclnnInplaceWeightQuantMatmulAllReduceAddRmsNormGetWorkspaceSize
  execute_api: aclnnInplaceWeightQuantMatmulAllReduceAddRmsNorm
  summary: 算子功能**：完成mm + all_reduce + add + rms_norm计算。
  constraints:
  - 使用场景同融合算子aclnnWeightQuantMatmulAllReduce一致：增量场景不使能MC2，全量场景使能MC2。
  - 输入x1可为二维或者三维，其shape为(b, s, k)或者(s, k)。x2必须是二维，其shape为(k, n)，轴满足mm算子入参要求，k轴相等，b\*s、s的范围为[1,
    2147483647]，k、n的范围为[1, 65535]。bias若非空，bias为一维，其shape为(n)。
  - 输入residual必须是三维，其shape为(b, s, n)，当x1为二维时，residual的(b*s)等于x1的s。输入gamma必须是一维，其shape为(n)。
  - antiquantScale满足pertensor场景shape为(1)，perchannel场景shape为(1,n)/(n)，pergroup场景shape为(ceil(k,antiquantGroupSize),n)。antiquantOffset若非空，shape与antiquantScale一致。
  - 输出y和normOut的维度和数据类型同residual。bias若非空，shape大小与normOut最后一维相等。
  - x2的数据类型需为int8或者int4，x1、bias、residual、gamma、y、normOut计算输入的数据类型要一致。
  - 只支持x2矩阵转置/不转置，x1矩阵支持不转置场景。
  - antiquantGroupSize取值满足取值范围[32, min(k-1, INT_MAX)]且为32倍数。
  - 支持1、2、4、8卡，并且仅支持hccs链路all mesh组网。
  - 支持(b*s)、n为0的空tensor，不支持k为0的空tensor。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：一个模型中的通算融合MC2算子，仅支持相同通信域。
  error_conditions:
  - 传入的x1、x2、residual、antiquantScale或output是空指针。
  - x1、x2、residual或output的shape不符合约束要求。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2、residual、antiquantScale或output是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、residual或output的shape不符合约束要求。
  evidence:
  - aclnnInplaceWeightQuantMatmulAllReduceAddRmsNormGetWorkspaceSize
  - aclnnInplaceWeightQuantMatmulAllReduceAddRmsNorm
  extraction_status: complete
