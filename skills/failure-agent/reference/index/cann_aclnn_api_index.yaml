    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'x3: shape与MatMul计算后的shape一致。'
  - name: dequantScale
    role: input
    dtype: INT64、UINT64、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'dequantScale: shape在per tensor场景为(1)，per channel场景为(n)/(1, n)。'
