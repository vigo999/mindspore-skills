  - name: actucalSeqLengthsKey
    role: input
    dtype: INT64
    noncontiguous: 'yes'
    tensor_rank: '1'
    value_constraints:
    - 'actucalSeqLengthsKey: TND排布时需要输入，其余场景输入nullptr。'
  - name: headNum
