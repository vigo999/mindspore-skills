- api_name: aclnnFusedInferAttentionScoreV5
  doc_names:
  - aclnnFusedInferAttentionScoreV5.md
  source_repo: ops-transformer
  workspace_api: aclnnFusedInferAttentionScoreV5GetWorkspaceSize
  execute_api: aclnnFusedInferAttentionScoreV5
  summary: 接口功能：适配decode & prefill场景的FlashAttention算子，既可以支持prefill计算场景（PromptFlashAttention），也可支持decode计算场景（IncreFlashAttention）。
  constraints:
  - softmaxLseFlag为True时，一般情况下，shape必须为[B, N, Q_S, 1]，当inputLayout为TND/NTD_TND/TND_NTD时，shape必须为[T,
    N, 1]。
  - 当query的数据类型为FP8_E4M3FN，且inputLayout为BNSD、TND时，kv cache排布支持BnBsH（blocknum, blocksize,
    H）、BnNBsD（blocknum, KV_N, blocksize, D）和NZ（blocknum，KV_N，D/D0，blocksize，D0）三种格式。
  - 当query的数据类型为FP8_E4M3FN，且inputLayout为BSH、BSND时，kv cache排布只支持BnBsH（blocknum, blocksize,
    H）和NZ (blocknum，KV_N，D/D0，blocksize，D0) 两种格式。
  - PostQuant 场景下，当 quantScale2 维度大于1且量化方式为 per-channel 时，若 layout 为 BSH/BSND/BNSD/BNSD_BSND，则
    quantScale2 仅支持 shape 为 queryN*valueD，否则仅支持 [numHeads, vHeadDim]。
  - layout 为 BNSD 和 BSND 时，N 轴和 D 轴应与 key/value 的 N 轴和 D 轴相等。
  error_conditions: []
  return_codes: []
  evidence:
  - aclnnFusedInferAttentionScoreV5GetWorkspaceSize
  - aclnnFusedInferAttentionScoreV5
  extraction_status: partial
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16、INT8、HIFLOAT8、FLOAT8_E4M3FN
    noncontiguous: 'no'
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16、INT8、HIFLOAT8、FLOAT8_E4M3FN、INT4（INT32）、FLOAT4_E2M1
    noncontiguous: 'no'
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16、INT8、HIFLOAT8、FLOAT8_E4M3FN、INT4（INT32）、FLOAT4_E2M1
    noncontiguous: 'no'
  - name: pseShiftOptional
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    shape_constraints:
    - 'pseShiftOptional: 建议shape输入 (B,Q_N,Q_S,KV_S)、(1,Q_N,Q_S,KV_S)。'
    optional_semantics:
    - 'pseShiftOptional: 不支持空Tensor。'
  - name: attenMaskOptional
    role: input
    dtype: BOOL、INT8、UINT8
    noncontiguous: 'no'
    shape_constraints:
    - "attenMaskOptional: sparseMode = 0、1时\n \n Ascend 950PR/Ascend 950DT\n \n attenMaskOptional的shape输入支持传入:(B,\
      \ Q_S, KV_S)，(1, Q_S, KV_S)，(B, 1, Q_S, KV_S)，(1, 1, Q_S, KV_S)\n \n \n \n \n\
      \ Atlas A3 训练系列产品/Atlas A3 推理系列产品 和 Atlas A2 训练系列产品/Atlas A2 推理系列产品\n 仅在Layout为BSH、BSND、BNSD、BNSD_BSND时，且query与key的Dvalue的D，并且不传query_rope和key_rope时：\n\
      \ \n Q_S = 1时，可支持shape传入: (B, KV_S)\n Q_S > 1时，可支持shape传入: (Q_S, KV_S)\n \n\
      \ \n \n \n sparseMode = 2、3、4时，attenMaskOptional的shape输入支持传入(2048, 2048)或(1,2048,2048)或(1,1,2048,2048)\n\
      \ 上述Q_S为query的shape中的S，KV_S为key和value的shape中的S；如果输入attenMask shape中的Q_S、KV_S非32B对齐，可以向上取到对齐的Q_S、KV_S。"
    optional_semantics:
    - 'attenMaskOptional: 不支持空Tensor。'
  - name: actualSeqLengthsOptional
    role: input
    dtype: INT64
    shape_constraints:
    - 'actualSeqLengthsOptional: 不指定序列长度可传入nullptr，表示和query的shape的S长度相同。'
  - name: actualSeqLengthsKvOptional
    role: input
    dtype: INT64
    shape_constraints:
    - 'actualSeqLengthsKvOptional: 不指定序列长度可传入nullptr，表示和key/value的shape的S长度相同。'
  - name: deqScale1Optional
    role: input
    dtype: UINT64、FLOAT32
    optional_semantics:
    - 'deqScale1Optional: 不支持空Tensor。'
  - name: quantScale1Optional
    role: input
