  execute_api: aclnnQuantMatmulAllReduce
  summary: 接口功能**：对量化后的入参x1、x2进行MatMul计算后，接着进行Dequant计算，接着与x3进行Add操作，最后做AllReduce计算。支持pertensor、perchannel量化方式。
