    noncontiguous: 'no'
    optional_semantics:
    - "weightUqQr: - 不支持空Tensor \n dtype为INT8（量化场景）：\n 1. 需为per-tensor量化输入 \n2. 非量化输出时必传dequantScaleWUqQrOptional\
      \ \n3. 量化输出时必传dequantScaleWUqQrOptional、quantScaleCkvOptional、quantScaleCkrOptional\
