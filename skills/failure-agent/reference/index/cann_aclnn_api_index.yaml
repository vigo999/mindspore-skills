- api_name: aclnnAlltoAllQuantMatmul
  doc_names:
  - aclnnAlltoAllQuantMatmul.md
  source_repo: ops-transformer
  workspace_api: aclnnAlltoAllQuantMatmulGetWorkspaceSize
  execute_api: aclnnAlltoAllQuantMatmul
  summary: 接口功能：完成AlltoAll通信、Permute（保证通信后地址连续）、Quant、Matmul和Dequant计算的融合，**先通信后计算**，支持K-C量化、K-C动态量化和mx量化模式。
  constraints:
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：支持2、4、8卡。
  - Ascend 950PR/Ascend 950DT：支持2、4、8、16卡。
  - 参数说明中shape使用的变量BS必须整除rankSize。
  - BS和N的值不得超过2147483647（INT32_MAX），BS的值不得小于2，N的值不得小于1。
  - 不支持空tensor。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：不支持任何非连续tensor。
  - Ascend 950PR/Ascend 950DT：仅支持x2为非连续tensor，其它非连续tensor均不支持。
  - 传入的x1、x2、x2Scale和output不为空指针，且。
  - Ascend 950PR/Ascend 950DT：在x1QuantMode为pertoken动态量化场景下，不支持传入x1ScaleOptional。
  - 仅当x1ScaleOptional和x2Scale输入都是2维及以上数据时，groupSize取值有效，其他场景需传入0。
  - 传入的groupSize内部会按如下公式分解得到groupSizeM、groupSizeN、groupSizeK，当其中有1个或多个为0，会根据x1/x2/x1ScaleOptional/x2Scale输入shape重新设置groupSizeM、groupSizeN、groupSizeK用于计算。原理：假设groupSizeM=0，表示m方向量化分组值由接口推断，推断公式为groupSizeM
    = m / scaleM（需保证m能被scaleM整除），其中m与x1 shape中的m一致，scaleM与x1ScaleOptional shape中的m一致，k和n方向同理。
  - 目前支持左矩阵perToken量化和perToken动态量化，x1QuantMode=3或7；右矩阵perChannel量化，x2QuantMode=2。
  - x1、alltoAllOutOptional的数据类型必须一致。
  - 若x1、x2、alltoallout输入int32类型，则视作8个int4打包，会被重新解释为int4。
  - A16W8和A16W4时，smoothQuant场景，x1ScaleOptional与x1的数据类型必须一致。
  - A16W8时，rankSize * H必须整除16；rankSize * H取值范围：[1, 35000]。
  - A16W4时，rankSize * H必须整除16；N必须为偶数; rankSize * H取值范围：[1, 35000]。
  - A4W4时，H与N必须为偶数；rankSize * H取值范围：[1, 35000]。
  - 目前支持：K-C动态量化，左矩阵perToken动态量化，x1QuantMode=7，右矩阵perChannel量化，x2QuantMode=2；mx量化，左矩阵mx量化，x1QuantMode=6，右矩阵mx量化，x2QuantMode=6。
  - x1QuantDtype在K-C动态量化场景下配置生效，支持配置35（表示aclDataType.ACL_FLOAT8_E5M2）和36（表示aclDataType.ACL_FLOAT8_E4M3FN）。其它量化场景配置不生效。
  - biasOptional可以为空。
  - rankSize * H范围仅支持[1, 65535]。
  - mx量化场景下，H必须整除64。
  - mx量化场景下，x2必须转置，shape为(H*rankSize, N)，transposeX2为True。
  - 通算融合算子不支持并发调用，不同的通算融合算子也不支持并发调用。
  - 不支持跨超节点通信，只支持超节点内。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  evidence:
  - aclnnAlltoAllQuantMatmulGetWorkspaceSize
  - aclnnAlltoAllQuantMatmul
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT8_E4M3FN、FLOAT8_E5M2、FLOAT4_E2M1、INT4
    tensor_rank: '2'
    shape_constraints:
    - 'x1: 2维，shape为(BS, H)。'
  - name: x2
    role: input
    dtype: FLOAT8_E4M3FN、FLOAT8_E5M2、FLOAT4_E2M1、INT8、INT4
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'x2: 2维，shape为(H*rankSize, N)。'
  - name: biasOptional
    role: input
    description: 可选输入，矩阵乘运算后累加的偏置，对应公式中的bias。
    dtype: FLOAT16、BFLOAT16、FLOAT32
    tensor_rank: '1'
    shape_constraints:
    - 'biasOptional: 1维，shape为(N)。'
  - name: x1ScaleOptional
    role: input
    description: 可选输入，左矩阵的量化系数。
    dtype: FLOAT32、FLOAT16、BFLOAT16、FLOAT8_E8M0
    tensor_rank: '1'
    shape_constraints:
    - 'x1ScaleOptional: 1维/3维。K-C量化场景时shape为(BS)。K-C动态量化场景时，shape为(H*rankSize)。mx量化场景时shape为(BS,
      ceil(H/64), 2)。'
    value_constraints:
    - 'x1ScaleOptional: 在K-C量化、mx量化场景场景下需要配置。'
    - 'x1ScaleOptional: 在K-C动态量化场景下，x1ScaleOptional可以作为smoothScale传入，此时类型需与x1一致。'
  - name: x2Scale
    role: input
    dtype: FLOAT32、FLOAT8_E8M0
    tensor_rank: '1'
    shape_constraints:
    - 'x2Scale: 1维/3维。K-C量化和K-C动态量化时shape为(N)。mx量化场景时shape为(N, ceil(H*rankSize/64),
      2)。'
  - name: commScaleOptional
    role: input
    description: 可选输入, 低比特通信的量化系数。
    optional_semantics:
    - 'commScaleOptional: 预留参数，暂不支持低比特通信。'
  - name: x1OffsetOptional
    role: input
    description: 可选输入，左矩阵的量化偏置。
    optional_semantics:
    - 'x1OffsetOptional: 预留参数，暂不支持。'
  - name: x2OffsetOptional
    role: input
    description: 可选输入，右矩阵的量化偏置。
    optional_semantics:
    - 'x2OffsetOptional: 预留参数，暂不支持。'
  - name: alltoAllAxesOptional
    role: input
    description: 可选输入，AlltoAll和Permute数据交换的方向。
    dtype: aclIntArray*(元素类型INT64)
    tensor_rank: '1'
    shape_constraints:
    - 'alltoAllAxesOptional: 1维，shape为(2)。'
  - name: group
    role: input
    dtype: STRING
  - name: x1QuantMode
    role: input
    dtype: INT
    value_constraints:
    - 'x1QuantMode: 根据设备型号对取值有不同限制，详细参见约束说明。'
  - name: x2QuantMode
    role: input
    dtype: INT
    value_constraints:
    - 'x2QuantMode: 根据设备型号对取值有不同限制，详细参见约束说明。'
  - name: commQuantMode
    role: input
    dtype: INT
    optional_semantics:
    - 'commQuantMode: 预留参数，当前仅支持配置为0，表示不量化。'
  - name: commQuantDtype
    role: input
    dtype: INT
    optional_semantics:
    - 'commQuantDtype: 预留参数，当前仅支持配置为-1, 表示ACL_DT_UNDEFINED。'
  - name: x1QuantDtype
    role: input
    dtype: INT
    value_constraints:
    - 'x1QuantDtype: AlltoAll通信与Permute操作后结果，按照该参数配置量化后作为MatMul计算的左矩阵输入，根据设备型号对取值有不同限制，详细参见约束说明。'
  - name: groupSize
    role: input
    dtype: INT
    value_constraints:
    - 'groupSize: mx量化场景下仅支持[groupSizeM, groupSizeN, groupSizeK] = [1, 1, 32]，对应的groupSize具体取值详细参见约束说明。'
    - 'groupSize: 其余量化场景默认配置为0，取值不生效。'
  - name: transposeX1
    role: input
    dtype: bool
  - name: transposeX2
    role: input
    dtype: bool
    value_constraints:
    - 'transposeX2: mx量化模式下必须配置为True。'
  - name: output
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    tensor_rank: '2'
    shape_constraints:
    - 'output: 2维，shape为(BS/rankSize, N)。'
  outputs:
  - name: alltoAllOutOptional
    role: output
    dtype: FLOAT16、BFLOAT16、FLOAT8_E4M3FN、FLOAT8_E5M2、FLOAT4_E2M1、INT4
    tensor_rank: '2'
    shape_constraints:
    - 'alltoAllOutOptional: 2维，shape为(BS/rankSize, rankSize*H)。'
- api_name: aclnnAlltoAllvGroupedMatMul
  doc_names:
  - aclnnAlltoAllvGroupedMatMul.md
  source_repo: ops-transformer
  workspace_api: aclnnAlltoAllvGroupedMatMulGetWorkspaceSize
  execute_api: aclnnAlltoAllvGroupedMatMul
  summary: 算子功能**：完成路由专家AlltoAllv、Permute、GroupedMatMul融合并实现与共享专家MatMul并行融合，**先通信后计算**。
  constraints:
  - BSK：本卡发送的token数，是sendCounts参数累加之和，取值范围(0, 52428800)。
  - H1：表示路由专家hidden size隐藏层大小，取值范围(0, 65536)。
  - H2：表示共享专家hidden size隐藏层大小，取值范围(0, 12288]。
  - e：表示单卡上专家个数，e<=48，e * epWorldSize最大支持384。
  - N1：表示路由专家的head_num，取值范围(0, 65536)。
  - N2：表示共享专家的head_num，取值范围(0, 65536)。
  - BS：batch sequence size。
  - K：表示选取TopK个专家，K的范围[2, 8]。
  - A：本卡收到的token数，是recvCounts参数累加之和。
  - ep通信域内所有卡的 A 参数的累加和等于所有卡上的 BSK 参数的累加和。
  - 'Atlas A3 训练系列产品/Atlas A3 推理系列产品: 单卡通信量在2MB以下可能存在性能劣化。'
  error_conditions:
  - 传入参数要求是必选输入、输出或者必选属性，但实际传入了空指针。
  - gmmX、gmmWeight、sendCountsTensorOptional、recvCountsTensorOptional、mmXOptional、mmWeightOptional、group、epWorldSize、sendCounts、recvCounts的数据类型、数据格式或者维度不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入参数要求是必选输入、输出或者必选属性，但实际传入了空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: gmmX、gmmWeight、sendCountsTensorOptional、recvCountsTensorOptional、mmXOptional、mmWeightOptional、group、epWorldSize、sendCounts、recvCounts的数据类型、数据格式或者维度不在支持的范围内。
  evidence:
  - aclnnAlltoAllvGroupedMatMulGetWorkspaceSize
  - aclnnAlltoAllvGroupedMatMul
  extraction_status: complete
  inputs:
  - name: gmmX
    role: input
    dtype: FLOAT16、BFLOAT16
    tensor_rank: '2'
    shape_constraints:
    - 'gmmX: 支持2维，shape为(BSK, H1)。'
  - name: gmmWeight
    role: input
    dtype: 与gmmX保持一致
    tensor_rank: '3'
    shape_constraints:
    - 'gmmWeight: 支持3维，shape为(e, H1, N1)。'
  - name: sendCountsTensorOptional
    role: input
  - name: recvCountsTensorOptional
    role: input
  - name: mmXOptional
    role: input
    description: 可选输入，共享专家MatMul计算中的左矩阵。
    dtype: 与gmmX保持一致
    tensor_rank: '2'
    shape_constraints:
    - 'mmXOptional: 支持2维，shape为(BS, H2)，需与mmWeightOptional同时传入或同为nullptr。'
  - name: mmWeightOptional
    role: input
    description: 可选输入，共享专家MatMul计算中的右矩阵。
    dtype: 与gmmX保持一致
    tensor_rank: '2'
    shape_constraints:
    - 'mmWeightOptional: 支持2维，shape为(H2, N2)，需与mmXOptional同时传入或同为nullptr。'
  - name: group
    role: input
    dtype: STRING
  - name: epWorldSize
    role: input
    dtype: INT64
  - name: sendCounts
    role: input
    dtype: aclIntArray*（元素类型INT64）
  - name: recvCounts
    role: input
    dtype: aclIntArray*（元素类型INT64）
  - name: transGmmWeight
    role: input
    dtype: BOOL
    value_constraints:
    - 'transGmmWeight: true表示需要转置，false表示不转置。'
  - name: transMmWeight
    role: input
    dtype: BOOL
    value_constraints:
    - 'transMmWeight: true表示需要转置，false表示不转置。'
  - name: permuteOutFlag
    role: input
    description: permuteOutOptional是否需要输出。
    dtype: BOOL
    value_constraints:
    - 'permuteOutFlag: true表明需要输出，false表明不需要输出。'
  outputs:
  - name: gmmY
    role: output
    description: 路由专家计算的输出。
    dtype: 与gmmX保持一致
    tensor_rank: '2'
    shape_constraints:
    - 'gmmY: 支持2维，shape为(A, N1)。'
  - name: mmYOptional
    role: output
    description: 共享专家计算的输出。
    dtype: 与mmXOptional保持一致
    tensor_rank: '2'
    shape_constraints:
    - 'mmYOptional: 支持2维，shape为(BS, N2)，仅当传入mmXOptional与mmWeightOptional才输出。'
  - name: permuteOutOptional
    role: output
    description: permute之后的输出。
    dtype: 与gmmX保持一致
    tensor_rank: '2'
    shape_constraints:
    - 'permuteOutOptional: 支持2维，shape为(A, H1)，仅当permuteOutFlag为true时输出。'
- api_name: aclnnAlltoAllvQuantGroupedMatMul
  doc_names:
  - aclnnAlltoAllvQuantGroupedMatMul.md
  source_repo: ops-transformer
  workspace_api: aclnnAlltoAllvQuantGroupedMatMulGetWorkspaceSize
  execute_api: aclnnAlltoAllvQuantGroupedMatMul
  summary: 算子功能**：完成路由专家AlltoAllv、量化GroupedMatMul融合并实现与共享专家量化MatMul并行融合，**先通信后计算**。
  constraints:
  - BSK：本卡发送的token数，是sendCounts参数累加之和，取值范围(0, 52428800)。
  - H1：表示路由专家hidden size隐藏层大小，取值范围(0, 65536)。
  - H2：表示共享专家hidden size隐藏层大小，取值范围(0, 12288]。
  - e：表示单卡上专家个数，取值范围(0, 32]，e * epWorldSize最大支持256。
  - N1：表示路由专家的head_num，取值范围(0, 65536)。
  - N2：表示共享专家的head_num，取值范围(0, 65536)。
  - BS：batch sequence size。
  - K：表示选取TopK个专家，K的范围[2, 8]。
  - A：本卡收到的token数，是recvCounts参数累加之和。
  - ep通信域内所有卡的 A 参数的累加和等于所有卡上的 BSK 参数的累加和。
  - 仅当gmmXScale/gmmWeightScale/mmXScale/mmWeightScale输入都是2维及以上数据时，groupSize取值有效，其他场景需传入0。
  - groupSize值支持公式推导：传入的groupSize内部会按如下公式分解得到groupSizeM、groupSizeN、groupSizeK，当其中有1个或多个为0，会根据gmmX/gmmWeight/mmX/mmWeight/gmmXScale/gmmWeightScale/mmXScale/mmWeightScale输入shape重新设置groupSizeM、groupSizeN、groupSizeK用于计算。设置原理：如果groupSizeM=0，表示m方向量化分组值由接口推导，推导公式为groupSizeM
    = m / scaleM（需保证m能被scaleM整除），其中m与gmmX/mmX shape中的m一致，scaleM与gmmXScale/mmXScale
    shape中的m一致；如果groupSizeK=0，表示k方向量化分组值由接口推导，推导公式为groupSizeK = k / scaleK（需保证k能被scaleK整除），其中k与gmmX/mmX
    shape中的k一致，scaleK与gmmXScale/mmXScale shape中的k一致；如果groupSizeN=0，表示n方向量化分组值由接口推导，推导公式为groupSizeN
    = n / scaleN（需保证n能被scaleN整除），其中n与gmmWeight/mmWeight shape中的n一致，scaleN与gmmWeightScale/mmWeightScale
    shape中的n一致。
  - 如果满足重新设置条件，当gmmXScale/gmmWeightScale/mmXScale/mmWeightScale输入都是3维，且数据类型都为FLOAT8_E8M0时，[groupSizeM，groupSizeN，groupSizeK]取值组合会推导为[1,
    1, 32]，对应groupSize的值为4295032864。
  - 当前版本仅支持pertensor量化。
  error_conditions:
  - 传入参数要求是必选输入、输出或者必选属性，但实际传入了空指针。
  - gmmX、gmmWeight、sendCountsTensorOptional、recvCountsTensorOptional、mmXOptional、mmWeightOptional、group、epWorldSize、sendCounts、recvCounts的数据类型、数据格式或者维度不在支持的范围内。
