- api_name: aclnnGroupedMatmulV4
  doc_names:
  - aclnnGroupedMatmulV4.md
  source_repo: ops-transformer
  workspace_api: aclnnGroupedMatmulV4GetWorkspaceSize
  execute_api: aclnnGroupedMatmulV4
  summary: 接口功能：实现分组矩阵乘计算，每组矩阵乘的维度大小可以不同。基本功能为矩阵乘，如$y_i[m_i,n_i]=x_i[m_i,k_i] \times
    weight_i[k_i,n_i], i=1...g$，其中g为分组个数，$m_i/k_i/n_i$为对应的维度。输入输出参数类型均为aclTensorList，对应的功能为：
  constraints:
  - '**公共约束**。'
  - x和weight若需要转置，转置对应的tensor必须非连续。
  - x和weight中每一组tensor的最后一维大小都应小于65536。$x_i$的最后一维指当x不转置时$x_i$的K轴或当x转置时$x_i$的M轴。$weight_i$的最后一维指当weight不转置时$weight_i$的N轴或当weight转置时$weight_i$的K轴。
  - 当weight数据格式为FRACTAL_NZ格式时，要求weight的Shape满足FRACTAL_NZ格式要求。
  - perTokenScaleOptional：一般情况下，只支持1维且长度与x的M相同。仅支持x、weight、out均为单tensor（TensorList长度为1）场景。
  - groupListOptional：当输出中TensorList的长度为1时，groupListOptional约束了输出数据的有效部分，groupListOptional中未指定的部分将不会参与更新。
  - groupListType为0时要求groupListOptional中数值为非负单调非递减数列，表示分组轴大小的cumsum结果（累积和），groupListType为1时要求groupListOptional中数值为非负数列，表示分组轴上每组大小，groupListType为2时要求
    groupListOptional中数值为非负数列，shape为[E, 2]，E表示Group大小，数据排布为[[groupIdx0, groupSize0],
    [groupIdx1, groupSize1]...]，其中groupSize为分组轴上每组大小，详见groupListOptional配置示例。
  - groupType代表需要分组的轴，如矩阵乘为C[m,n]=A[m,k]xB[k,n]，则groupType取值-1：不分组，0：m轴分组，2：k轴分组。详细参考groupType支持场景约束。
  - actType（int64\_t，计算输入）：整数型参数，代表激活函数类型，取值范围为0-5。
  - '**数据类型要求**。'
  - '**约束说明**。'
  - 仅支持GroupType=0（M轴分组）。
  - 当前仅支持x、weight、out均为长度为1的TensorList。
  - x不支持转置。
  - x仅支持2维Tensor，Shape为（M，K）。
  - weight仅支持3维Tensor，Shape为（E，K，N）或（E，N，K）。
  - 输入形状条件（满足任意一组即可）。
  - 参数配置条件。
  - 仅支持GroupType=0（M轴分组），actType=0。
  - x不支持转置、weight不支持转置。
  - weight默认支持3维Tensor，Shape为（E，K，N）。
  - Bias为计算过程中离线计算的辅助结果，值要求为$8\times weight \times scale$，并在第1维累加，shape要求为$[E, N]$。
  - 当weight传入数据类型为INT32时，会将每个INT32视为8个INT4。
  - offset为空时。
