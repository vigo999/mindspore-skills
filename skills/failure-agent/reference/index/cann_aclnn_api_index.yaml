  source_repo: ops-transformer
  workspace_api: aclnnRotaryPositionEmbeddingGetWorkspaceSize
  execute_api: aclnnRotaryPositionEmbedding
  summary: 接口功能：执行单路旋转位置编码计算。
  constraints:
  - 输入张量x、cos、sin及输出张量y的最后一维大小必须相同，且小于等于1024。对于half、interleave和interleave-half模式，最后一维必须能被2整除，对于quarter模式，最后一维必须能被4整除。
  - 输入张量x和输出张量y的shape必须完全相同。
  - 输入张量cos和sin的shape必须完全相同，cos和sin的shape需要与x满足broadcast关系，且广播后的shape必须等于x的shape。
  - B，N < 1000;。
  - 当x为BNSD时，cos、sin支持11SD、B1SD、BNSD。
  - 当（D/2）% (32/inputDtypeSize) == 0时，需满足B * N <= S * 8。
  - 当（D/2）% (32/inputDtypeSize) != 0时，需满足B * N * 2 = 80。
  - 当x为BSND时，cos、sin支持1S1D、BS1D、BSND。
  - 当x为SBND时，cos、sin支持S11D、SB1D、SBND。
  - 当x为TND时，cos、sin支持T1D、TND。
  - B * N < 1000（N<1000当x为TND）。
  - 当x为BNSD时，cos、sin支持11SD。
  - 当x为BSND时，cos、sin支持1S1D。
  - 当x为SBND时，cos、sin支持S11D。
  - 当x为TND时，cos、sin支持T1D。
  - B，N < 1000。
  - B * N <= S * 8。
  - (N - 1) * D * BytePerData / 32 < UINT16\_MAX，其中BytePerData当输入数据类型为FLOAT16时，值为2；数据类型为FLOAT32时，值为4。
  - (B * N - 1) * D * BytePerData / 32 < UINT16\_MAX，其中BytePerData当输入数据类型为FLOAT16时，值为2；数据类型为FLOAT32时，值为4。
  error_conditions:
  - 传入的x、cos、sin或out是空指针。
  - 传入的x、cos、sin、out的数据类型和格式不在支持的范围内。
  - 传入的x、cos、sin、out的shape不匹配。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x、cos、sin或out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 传入的x、cos、sin、out的数据类型和格式不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 传入的x、cos、sin、out的shape不匹配。
