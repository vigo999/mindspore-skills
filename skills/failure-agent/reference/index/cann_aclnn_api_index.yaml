    role: input
    dtype: FLOAT32
    noncontiguous: 'no'
    tensor_rank: '2'
    shape_constraints:
    - 'v（aclTensor*）: shape为(numVertices, 4)，其中numVertices表示顶点数量，为正整数。'
    optional_semantics:
    - 'v（aclTensor*）: 不支持空Tensor。'
  - name: f
    role: input
    dtype: INT32
    noncontiguous: 'no'
    tensor_rank: '2'
    shape_constraints:
    - 'f（aclTensor*）: shape为(numFaces, 3)，其中 numFaces表示空间中面的数量，为正整数。'
    value_constraints:
    - 'f（aclTensor*）: 每个面是一个三角形，三角形每个顶点表示为顶点在v中的索引，因此f中元素取值应当是对v中元素的合法索引，即取值范围为[0,
      numVertices-1]。'
    optional_semantics:
    - 'f（aclTensor*）: 不支持空Tensor。'
  - name: dOptional
    role: input
