  source_repo: ops-transformer
  workspace_api: aclnnMoeDistributeDispatchV4GetWorkspaceSize
  execute_api: aclnnMoeDistributeDispatchV4
  summary: 接口功能：对token数据进行量化（可选），当存在TP域通信时，先进行EP（Expert Parallelism）域的AllToAllV通信，再进行TP（Tensor
    Parallelism）域的AllGatherV通信；当不存在TP域通信时，进行EP（Expert Parallelism）域的AllToAllV通信。
  constraints:
  - '`aclnnMoeDistributeDispatchV4`与CombineV4系列算子必须配套使用，前者输出的`assistInfoForCombineOut`、`epRecvCountsOut`、`tpRecvCountsOut`、`expandScalesOut`需直接传入后者对应参数，业务逻辑不可依赖这些Tensor的具体值。'
  - 所有卡的`groupEp`、`epWorldSize`、`moeExpertNum`、`groupTp`、`tpWorldSize`、`expertShardType`、`sharedExpertNum`、`sharedExpertRankNum`、`globalBs`、`commAlg`参数及`HCCL_BUFFSIZE`取值需保持一致，且与CombineV4系列算子对应参数一致。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：该场景下单卡包含双DIE（简称为“晶粒”或“裸片”），因此参数说明中的“本卡”均表示单DIE。
  - commAlg配置为""或nullptr：依照HCCL_INTRA_PCIE_ENABLE和HCCL_INTRA_ROCE_ENABLE环境变量配置，选择"fullmesh"或"hierarchy"公式。
  - 'commAlg配置为"fullmesh": 要求 >= 2 \* (Bs \* epWorldSize \* min(localExpertNum, K)
    \* H \* sizeof(uint16) + 2MB)。'
  - 'commAlg配置为"hierarchy": 要求 >= (`moeExpertNum` + `epWorldSize` / 4) * Align512(`maxBs`
    * (`H` * 2 + 16 * Align8(`K`))) * 1B + 8MB，其中Align8(x) = ((x + 8 - 1) / 8) * 8，Align512(x)
    = ((x + 512 - 1) / 512) * 512。'
  - 当commAlg为"fullmesh_v1"或空字符串或空指针时：要求取值满足 ≥ 2 * (localExpertNum * maxBs * epWorldSize
    * Align512(Align32(2 * H) + 64) + (K + sharedExpertNum) * maxBs * Align512(2 *
    H))。
  - 当commAlg为"fullmesh_v2"时：要求取值满足 ≥ 2 * (localExpertNum * maxBs * epWorldSize * 480Align512(Align32(2
    * H) + 64) + (K + sharedExpertNum) * maxBs * Align512(2 * H))。
  - 其中`480Align512(x) = ((x + 480 - 1) / 480) * 512`，`Align512(x) = ((x + 512 - 1)
    / 512) * 512`，`Align32(x) = ((x + 32 - 1) / 32) * 32`。
  - 当commAlg为"hierarchy"时：要求取值满足 (moeExpertNum * maxBs * (H * 2 + (3 * (K + 7) / 8
    * 8)) * 4 + 64) + 404 * 1024 * 1024。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：该环境变量不再推荐使用，建议commAlg配置"hierarchy"。
  - 一个模型中的CombineV4系列算子和`aclnnMoeDistributeDispatchV4`仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 一个模型中的CombineV4系列算子和`aclnnMoeDistributeDispatchV4`仅支持相同TP通信域或都不支持TP通信域，有TP通信域时该通信域中不允许有其他算子。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：仅在commAlg配置为"hierarchy"场景下通信域支持跨超节点，其余场景要求一个通信域内的节点需在一个超节点内，不支持跨超节点。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：多机场景仅支持交换机组网，不支持双机直连组网。
  - moeExpertNum + zeroExpertNum + copyExpertNum + constExpertNum < MAX_INT32。
  - 各卡Bs一致时：globalBs = Bs * epWorldSize 或 0。
  - 各卡Bs不一致时：globalBs = maxBs * epWorldSize，其中maxBs为单卡Bs最大值。
  error_conditions:
