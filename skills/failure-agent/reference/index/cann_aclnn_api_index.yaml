- api_name: aclnnMoeDistributeDispatch
  doc_names:
  - aclnnMoeDistributeDispatch.md
  source_repo: ops-transformer
  workspace_api: aclnnMoeDistributeDispatchGetWorkspaceSize
  execute_api: aclnnMoeDistributeDispatch
  summary: 接口功能：对Token数据进行量化（可选），当存在TP域通信时，先进行EP（Expert Parallelism）域的AllToAllV通信，再进行TP（Tensor
    Parallelism）域的AllGatherV通信；当不存在TP域通信时，进行EP（Expert Parallelism）域的AllToAllV通信。
  constraints:
  - '`MoeDistributeDispatch`算子与`MoeDistributeCombine`算子必须配套使用，具体参考调用示例。'
  - 在不同产品型号、不同通信算法或不同版本中，`MoeDistributeDispatch`的Tensor输出`expandIdx`、`epRecvCounts`、`tpRecvCounts`、`expandScales`中的元素值可能不同，使用时直接将上述Tensor传给`MoeDistributeCombine`对应参数即可，模型其他业务逻辑不应对其存在依赖。
  - 调用算子过程中使用的`groupEp`、`epWorldSize`、`moeExpertNum`、`groupTp`、`tpWorldSize`、`expertShardType`、`sharedExpertNum`、`sharedExpertRankNum`、`globalBs`属性取值所有卡需保持一致，网络中不同层中也需保持一致，且和`MoeDistributeCombine`对应参数也保持一致。
  - 对于共享专家，要满足`A` = `BS` * `epWorldSize` * `sharedExpertNum` / `sharedExpertRankNum。`。
  - 对于MoE专家，当`globalBs`为0时，要满足`A` >= `BS` * `epWorldSize` * min(`localExpertNum`,
    `K`)；当`globalBs`非0时，要满足`A` >= `globalBs` * min(`localExpertNum`, `K`)。
  - '`localExpertNum`：表示本卡专家数量。'
  - 对于共享专家卡，`localExpertNum` = 1。
  - 对于MoE专家卡，`localExpertNum` = `moeExpertNum` / (`epWorldSize` - `sharedExpertRankNum`)`，localExpertNum`
    > 1时，不支持TP域通信。
  - 一个模型中的`MoeDistributeCombine`和`MoeDistributeDispatch`仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 一个模型中的`MoeDistributeCombine`和`MoeDistributeDispatch`仅支持相同TP通信域或都不支持TP通信域，有TP通信域时该通信域中不允许有其他算子。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：一个通信域内的节点需在一个超节点内，不支持跨超节点。
  - '`H`：表示hidden size隐藏层大小，取值范围(0, 7168]，且保证是32的整数倍。'
  - '`BS`：表示batch sequence size，即本卡最终输出的token数量，取值范围为[1, 256]。'
  - '`K`：表示选取topK个专家，需满足0 < `K` ≤ moeExpertNum，取值范围为[1, 16]。'
  - '`HCCL_BUFFSIZE`：调用本算子前需检查`HCCL_BUFFSIZE`环境变量取值是否合理，该环境变量表示单个通信域占用内存大小，单位MB，不配置时默认为200MB，要求
    >= 2 * (`BS` * `epWorldSize` * min(`localExpertNum`, `K`) * `H` * sizeof(uint16)
    + 2MB)。'
  - '`HCCL_INTRA_PCIE_ENABLE`和`HCCL_INTRA_ROCE_ENABLE`：设置环境变量`HCCL_INTRA_PCIE_ENABLE`
    = 1和`HCCL_INTRA_ROCE_ENABLE` = 0可以减少跨机通信数据量，可能提升算子性能。 此时，要求`HCCL_BUFFSIZE` >=
    `moeExpertNum` * `BS` * (`H` * sizeof(dtypeX) + 4 * ((`K` + 7) / 8 * 8) * sizeof(uint32))
    + 4MB + 100MB。并且，对于入参`moeExpertNum`，只要求`moeExpertNum` % `epWorldSize` = 0，不要求`moeExpertNum`
    / `epWorldSize` <= 24，但不支持`scales`特性。'
  - '`epWorldSize`：取值支持16、32、64。'
  - '`quantMode`取值为2时，表示pertoken动态量化场景，`expandX`的数据类型支持`INT8`。'
  - 输入`scales`可传入空指针。
  - 若输入`scales`传入有效数据时，其shape为 (`moeExpertNum`, `H`)。
  - 组网约束：多机场景仅支持交换机组网，不支持双机直连组网。
  - 该场景下单卡包含双DIE（简称为“晶粒”或“裸片”），因此参数说明里的“本卡”均表示单DIE。
  - '`H`：表示hidden size隐藏层大小，取值为7168。'
  - '`BS`：表示batch sequence size，即本卡最终输出的token数量，取值范围为[1, 512]。'
  - '`K`：表示选取topK个专家，需满足0 < `K` ≤ moeExpertNum，取值范围为[1, 8]。'
  - '`HCCL_BUFFSIZE`：调用本算子前需检查`HCCL_BUFFSIZE`环境变量取值是否合理，该环境变量表示单个通信域占用内存大小，单位MB，不配置时默认为200MB。'
  - ep通信域内：要求 >= 2且满足1024 ^ 2 * (`HCCL_BUFFSIZE` - 2) / 2 >= `BS` * 2 * (`H` + 128)
    * (`epWorldSize` * `localExpertNum` + `K` + 1)，`localExpertNum`需使用MoE专家卡的本卡专家数。
  - tp通信域内：设置大小要求\>=A * (H * 2 + 128) * 2。
  - '`epWorldSize`：取值支持8、16、32、64、128、144、256、288。'
  - 若输入`scales`传入有效数据且存在共享专家卡时，其shape为 (`sharedExpertNum` + `moeExpertNum`, `H`)。
  - 若输入`scales`传入有效数据且不存在共享专家卡时，其shape为 (`moeExpertNum`, `H`)。
  - '`K`：表示选取topK个专家，取值范围为[1, 8]，且需要满足0 < `K` ≤ moeExpertNum。'
  - '`epWorldSize`：取值支持2、4、8、16、32、64、128、144、256、288。'
  - '`HCCL_BUFFSIZE`：调用本算子前需检查`HCCL_BUFFSIZE`环境变量取值是否合理，该环境变量表示单个通信域占用内存大小，单位MB，不配置时默认为200MB，要求
    >= 2且满足1024 ^ 2 * (`HCCL_BUFFSIZE` - 2) / 2 >= `BS` * 2 * (`H` + 128) * (`epWorldSize`
    * `localExpertNum` + `K` + 1)，`localExpertNum`需使用MoE专家卡的本卡专家数。'
  - '`quantMode`取值为0时，表示非量化场景，`expandX`的数据类型支持`FLOAT16`、`BFLOAT16`。'
  - '`expandX`的数据类型为`FLOAT16`、`BFLOAT16`时，输入`scales`必须传入空指针。'
  - 取值范围(0, 512]，且满足moeExpertNum % (epWorldSize - sharedExpertRankNum) = 0。
  - 各rank Bs一致时，globalBs = Bs * epWorldSize 或 0各rank Bs不一致时，globalBs = maxBs * epWorldSize（maxBs为单卡/单rank
    BS最大值）。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  - 输入和输出的shape不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 输入和输出的shape不在支持的范围内。
  evidence:
  - aclnnMoeDistributeDispatchGetWorkspaceSize
  - aclnnMoeDistributeDispatch
  extraction_status: complete
  inputs:
