- api_name: aclnnMoeDistributeCombineV2
  doc_names:
  - aclnnMoeDistributeCombineV2.md
  source_repo: ops-transformer
  workspace_api: aclnnMoeDistributeCombineV2GetWorkspaceSize
  execute_api: aclnnMoeDistributeCombineV2
  summary: 接口功能：当存在TP域通信时，先进行ReduceScatterV通信，再进行AllToAllV通信，最后将接收的数据整合（乘权重再相加）；当不存在TP域通信时，进行AllToAllV通信，最后将接收的数据整合（乘权重再相加）。
  constraints:
  - 对于共享专家，需满足 (A = Bs * epWorldSize * sharedExpertNum / sharedExpertRankNum)。
  - 对于MoE专家，当`globalBs`为0时，需满足 (A >= Bs * epWorldSize * min(localExpertNum, K))；当`globalBs`非0时，需满足
    (A >= globalBs * min(localExpertNum, K))。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：依commAlg取值，"fullmesh"支持(0, 7168]且为32的整数倍；"hierarchy"并且驱动版本≥25.0.RC1.1时支持(0,
    10*1024]且为32的整数倍。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：取值为[1024, 8192]。
  - Ascend 950PR/Ascend 950DT：取值范围[1024, 8192]。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：依commAlg取值，"fullmesh"支持(0, 256]；"hierarchy"并且驱动版本≥25.0.RC1.1时支持(0,
    512]。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：取值范围为 (0 < Bs ≤ 512)。
  - Ascend 950PR/Ascend 950DT：取值范围为 (0 < Bs ≤ 512)。
  - '**K**：表示选取topK个专家，取值范围为 (0 < K ≤ 16) 且满足 (0 < K ≤ moeExpertNum)。'
  - '**serverNum**：表示服务器的节点数，取值仅支持2、4、8。'
  - 对于共享专家卡，(localExpertNum = 1)。
  - 对于MoE专家卡，(localExpertNum = moeExpertNum / (epWorldSize - sharedExpertRankNum))；当(localExpertNum
    > 1)时，不支持TP域通信。
  - commAlg为""或nullptr：依HCCL环境变量选择“fullmesh”或“hierarchy”公式。
  - commAlg为"fullmesh"：设置大小要求 (≥ 2 * (Bs * epWorldSize * min(localExpertNum, K) *
    H * sizeof(uint16) + 2MB))。
  - commAlg为"hierarchy"：设置大小要求 (≥ (`moeExpertNum` + `epWorldSize` / 4) * Align512(`maxBs`
    * (`H` * 2 + 16 * Align8(`K`))) * 1B + 8MB，其中Align8(x) = ((x + 8 - 1) / 8) * 8，Align512(x)
    = ((x + 512 - 1) / 512) * 512)。
  - ep通信域内：设置大小要求 (≥ 2) 且满足 (≥ 2 * (localExpertNum * maxBs * epWorldSize * Align512(Align32(2
    * H) + 44) + (K + sharedExpertNum) * maxBs * Align512(2 * H)))（`localExpertNum`需使用MoE专家卡的本卡专家数；`Align512(x)
    = ((x + 512 - 1) / 512) * 512`；`Align32(x) = ((x + 32 - 1) / 32) * 32`）。
  - tp通信域内：设置大小要求\>=A * (H * 2 + 128) * 2。
  - Ascend 950PR/Ascend 950DT：要求 (≥ aivNum * 512 + 2 * epWorldSize * BS * H * 2 *
    localExpertNum)，其中`aivNum`表示核数，`localExpertNum`需使用MoE专家卡的本卡专家数。
  - 一个模型中的`aclnnMoeDistributeCombineV2`和`aclnnMoeDistributeDispatchV2`仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 一个模型中的`aclnnMoeDistributeCombineV2`和`aclnnMoeDistributeDispatchV2`仅支持相同TP通信域或都不支持TP通信域；有TP通信域时，该通信域中不允许有其他算子。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：一个通信域内的节点需在一个超节点内，不支持跨超节点。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：多机场景仅支持交换机组网，不支持双机直连组网。
  - 各rank Bs一致时，globalBs = Bs * epWorldSize 或 0。
  - 各rank Bs不一致时，globalBs = maxBs * epWorldSize（maxBs为单卡Bs最大值）。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  - 输入和输出的shape不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 输入和输出的shape不在支持的范围内。
  evidence:
  - aclnnMoeDistributeCombineV2GetWorkspaceSize
  - aclnnMoeDistributeCombineV2
  extraction_status: complete
  inputs:
  - name: expandX
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
  - name: expertIds
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'expertIds: (Bs, K)。'
  - name: assistInfoForCombine
    role: input
    description: 对应aclnnMoeDistributeDispatchV2中的assistInfoForCombineOut输出。
    dtype: INT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'assistInfoForCombine: (A * 128, )。'
  - name: epSendCounts
    role: input
    description: 对应aclnnMoeDistributeDispatchV2中的epRecvCounts输出。
    dtype: INT32
    noncontiguous: 'yes'
  - name: expertScales
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
    shape_constraints:
    - 'expertScales: (Bs, K)。'
  - name: tpSendCountsOptional
    role: input
    description: 对应aclnnMoeDistributeDispatchV2中的tpRecvCounts输出。
    dtype: INT32
    noncontiguous: 'yes'
  - name: xActiveMaskOptional
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
    value_constraints:
    - 'xActiveMaskOptional: 各卡BS不一致时所有token需有效。'
  - name: activationScaleOptional
    role: input
  - name: weightScaleOptional
    role: input
  - name: groupListOptional
    role: input
  - name: expandScalesOptional
    role: input
    description: 对应aclnnMoeDistributeDispatchV2中的expandScales输出。
    dtype: FLOAT32
    noncontiguous: 'yes'
  - name: sharedExpertXOptional
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
  - name: groupEp
    role: input
    dtype: STRING
  - name: epWorldSize
    role: input
    dtype: INT64
  - name: epRankId
    role: input
    dtype: INT64
    value_constraints:
    - 'epRankId: 取值范围[0, epWorldSize)，同一个EP通信域中各卡的epRankId不重复。'
  - name: moeExpertNum
    role: input
    dtype: INT64
  - name: groupTp
    role: input
    dtype: STRING
  - name: tpWorldSize
    role: input
    dtype: INT64
  - name: tpRankId
    role: input
    dtype: INT64
  - name: expertShardType
    role: input
    dtype: INT64
  - name: sharedExpertNum
    role: input
    dtype: INT64
  - name: sharedExpertRankNum
    role: input
    dtype: INT64
  - name: globalBs
    role: input
    dtype: INT64
  - name: outDtype
    role: input
    description: 用于指定输出x的数据类型，预留参数。
    dtype: INT64
  - name: commQuantMode
    role: input
    dtype: INT64
  - name: groupListType
    role: input
    dtype: INT64
  - name: commAlg
    role: input
    dtype: STRING
  outputs:
  - name: xOut
    role: output
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'xOut: (Bs, H)。'
