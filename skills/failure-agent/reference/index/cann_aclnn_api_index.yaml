  - 不支持mat2最后两根轴其中一根轴为1，即k=1或者n=1。
  - self的第一个维度b需要与mat2第一个维度b满足broadcast关系。
  - 'self shape中的k和mat2 shape中的k1需要满足以下关系：ceil（k，k0） = k1，mat2 shape中的n1与out的n满足以下关系:
    ceil(n, n0) = n1。'
  - mat2的Reduce维度需要与self的Reduce维度大小相等。
  - mat2的第一个维度b需要与self第一个维度b满足broadcast关系。
  error_conditions:
  - 传入的self、mat2或out是空指针。
  - self和mat2的数据类型和数据格式不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的self、mat2或out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: self和mat2的数据类型和数据格式不在支持的范围之内。
  evidence:
  - aclnnBatchMatMulWeightNzGetWorkspaceSize
  - aclnnBatchMatMulWeightNz
  extraction_status: complete
  inputs:
  - name: self
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: mat2
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '5'
  - name: cubeMathType
    role: input
    dtype: INT8
  outputs:
  - name: out
    role: output
    description: 表示矩阵乘的输出矩阵，公式中的out。
    dtype: BFLOAT16、FLOAT16
    tensor_rank: '3'
    value_constraints:
    - 'out: 各个维度表示：（b, m，n），m与self的m一致，n与mat2的n1以及n0满足ceil(n / n0) = n1的关系，b要与self的b和mat2的b经过broadcast推导后一致。'
