  - name: minScale
    role: input
    value_constraints:
    - 'minScale（double）: 取值不小于0。'
  - name: roundModeOptional
    role: input
    description: 可选参数，指定cast到输出的转换方式，支持取值rint、round。
  - name: dstType
    role: input
    description: 指定输出yOut的数据类型。
    value_constraints:
