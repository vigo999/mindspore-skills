  - '`x`不支持转置，因此不支持非连续Tensor，weight仅转置场景支持非连续的Tensor；antiquantScale、antiquantOffsetOptional非连续Tensor仅支持转置场景并且连续性要求和weight保持一致。'
  - pertensor量化模式：(1,)或(1,1)。
  - perchannel量化模式：输入shape为(1, n)或(n,)。
  - pergroup量化模式：输入shape为(⌈k/group_size⌉, n)，其中group_size表示k要分组的每组的大小。
