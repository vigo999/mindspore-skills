- api_name: aclnnMoeDistributeCombineAddRmsNormV2
  doc_names:
  - aclnnMoeDistributeCombineAddRmsNormV2.md
  source_repo: ops-transformer
  workspace_api: aclnnMoeDistributeCombineAddRmsNormV2GetWorkspaceSize
  execute_api: aclnnMoeDistributeCombineAddRmsNormV2
  summary: 算子功能：当存在TP域通信时，先进行ReduceScatterV通信，再进行AllToAllV通信，最后将接收的数据整合（乘权重再相加）；当不存在TP域通信时，进行AllToAllV通信，最后将接收的数据整合（乘权重再相加），之后完成Add
    + RmsNorm融合。算子支持特殊专家场景。
  constraints:
  - aclnnMoeDistributeDispatchV3接口与aclnnMoeDistributeCombineAddRmsNormV2接口必须配套使用，具体参考调用示例。
  - 调用接口过程中使用的expertIds、xActiveMaskOptional、elasticInfoOptional、groupEp、epWorldSize、moeExpertNum、groupTp、tpWorldSize、expertShardType、sharedExpertNum、sharedExpertRankNum、globalBs、commAlg、zeroExpertNum、
    copyExpertNum、constExpertNum参数、HCCL_BUFFSIZE取值所有卡需保持一致，网络中不同层中也需保持一致，且和DispatchV3对应参数也保持一致。
  - 产品特定约束。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：该场景下单卡包含双DIE（简称为“晶粒”或“裸片”），因此参数说明里的“本卡”均表示单DIE。
  - 当globalBs为0时，要满足A >= BS * epWorldSize * min(localExpertNum, K)；。
  - 当globalBs非0时，要满足A >= globalBs * min(localExpertNum, K)。
  - H：表示hidden size隐藏层大小，取值范围为[1024, 8192]。
  - Bs：表示batch sequence size，即本卡最终输出的token数量，取值范围为0 < Bs ≤ 512。
  - K：表示选取topK个专家，取值范围为0 < K ≤ 16同时满足0 < K ≤ moeExpertNum + zeroExpertNum + copyExpertNum
    + constExpertNum。
  - localExpertNum：表示本卡专家数量。
  - 对于共享专家卡，localExpertNum = 1。
  - 对于MoE专家卡，localExpertNum = moeExpertNum / (epWorldSize - sharedExpertRankNum)，localExpertNum
    > 1时，不支持TP域通信。
  - HCCL_BUFFSIZE：调用本接口前需检查HCCL_BUFFSIZE环境变量取值是否合理，该环境变量表示单个通信域占用内存大小，单位MB，不配置时默认为200MB。
  - ep通信域内：设置大小要求 >= 2且满足1024 ^ 2 * (HCCL_BUFFSIZE - 2) / 2 >= BS * 2 * (H + 128)
    * (epWorldSize * localExpertNum + K + 1)，localExpertNum表示MoE专家卡的本卡专家数。
