  - aclnnGatherPaKvCacheGetWorkspaceSize
  - aclnnGatherPaKvCache
  extraction_status: complete
  inputs:
  - name: keyCache
    role: input
    dtype: INT8、FLOAT16、BFLOAT16、FLOAT、UINT8、INT16、UINT16、INT32、UINT32、HIFLOAT8、FLOAT8_E5M2、FLOAT8_E4M3FN
    tensor_rank: '4'
    shape_constraints:
    - 'keyCache(aclTensor*): 当cacheMode为"Norm"时，shape为[num_blocks, block_size, num_heads,
      head_size_k]，数据格式必须时ND。'
    - 'keyCache(aclTensor*): 当cacheMode为"PA_NZ"时，shape为num_blocks, num_heads * head_size_k
      // elenum_aligned, block_size, elenum_aligned，数据格式必须时FRACTAL_NZ。'
