- api_name: aclnnInplaceQuantMatmulAllReduceAddRmsNorm
  doc_names:
  - aclnnInplaceQuantMatmulAllReduceAddRmsNorm.md
  source_repo: ops-transformer
  workspace_api: aclnnInplaceQuantMatmulAllReduceAddRmsNormGetWorkspaceSize
  execute_api: aclnnInplaceQuantMatmulAllReduceAddRmsNorm
  summary: 算子功能**：完成mm + all_reduce + add + rms_norm计算。
  constraints:
  - 使用场景同融合算子aclnnQuantMatmulAllReduce一致：增量场景不使能MC2，全量场景使能MC2。
  - 输入x1可为二维或者三维，其shape为(b, s, k)或者(m, k)。x2必须是二维，其shape为(k, n)，轴满足mm算子入参要求，k轴相等。bias若非空，bias为一维，其shape为(n)。
  - m大小不超过2147483647，x1与x2的最后一维大小不超过65535，x1的最后一维指k，x2的最后一维指转置时的k或非转置时的n。
  - 输入residual必须是三维，其shape为(b, s, n)，当x1为二维时，residual的(b*s)等于x1的m。输入gamma其shape为(n)。
  - 输出y和normOut的维度和数据类型同residual，其shape为(b, s, n)。
  - 若输出residual类型为FLOAT16，dequantScale的类型为UINT64、INT64；若输出residual类型为BFLOAT16，dequantScale的类型为BFLOAT16。
  - x1、x2数据类型为INT8，bias数据类型为INT32、residual、gamma、y、normOut计算输入的数据类型要一致。
  - 只支持x2矩阵转置/不转置，x1矩阵支持不转置场景。
  - 支持1、2、4、8卡，并且仅支持hccs链路all mesh组网。
  - 支持(b*s)、n为0的空tensor，不支持k为0的空tensor。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：一个模型中的通算融合MC2算子，仅支持相同通信域。
  error_conditions:
  - 传入的x1、x2、residual、gamma或dequantScale是空指针。
  - x1、x2、residual的shape不符合约束要求。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2、residual、gamma或dequantScale是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、residual的shape不符合约束要求。
  evidence:
  - aclnnInplaceQuantMatmulAllReduceAddRmsNormGetWorkspaceSize
  - aclnnInplaceQuantMatmulAllReduceAddRmsNorm
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: INT8
    noncontiguous: 'no'
    tensor_rank: 2..3
    optional_semantics:
    - 'x1: 支持空Tensor。'
  - name: x2
    role: input
    dtype: INT8
    noncontiguous: 'yes'
    tensor_rank: '2'
    optional_semantics:
    - 'x2: 支持空Tensor。'
  - name: bias
    role: input
    dtype: INT32
    noncontiguous: 'yes'
    tensor_rank: '1'
  - name: dequantScale
    role: input
    dtype: UINT64、INT64、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: 1..2
    shape_constraints:
    - 'dequantScale: shape在pertensor场景为(1)，perchannel场景为(n)或(1, n)。'
  - name: residual
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
  - name: gamma
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '1'
  - name: epsilon
    role: input
    dtype: Double
    value_constraints:
    - 'epsilon: epsilon取值满足取值范围(0,1)。'
  - name: group
    role: input
    dtype: String
  - name: reduceOp
    role: input
    dtype: String
  - name: commTurn
    role: input
    dtype: INT64
  - name: streamMode
    role: input
    dtype: INT64
  outputs:
  - name: normOut
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    optional_semantics:
    - 'normOut: 不支持空Tensor。'
- api_name: aclnnInplaceQuantScatter
  doc_names:
  - aclnnInplaceQuantScatter.md
  source_repo: ops-nn
  workspace_api: aclnnInplaceQuantScatterGetWorkspaceSize
  execute_api: aclnnInplaceQuantScatter
  summary: 先将updates在quantAxis轴上进行量化，quantScales对updates做缩放操作，quantZeroPoints做偏移。然后将量化后的updates中的值按指定的轴axis，根据索引张量indices逐个更新selfRef中对应位置的值。
  constraints:
  - indices的维数只能是1维；不支持索引越界，索引越界不校验；indices映射的selfRef数据段不能重合，若重合则会因为多核并发原因导致多次执行结果不一样。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - selfRef、indices、updates、quantScales、quantZeroPoints数据类型组合不在支持范围内，具体组合请参考约束说明。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: selfRef、indices、updates、quantScales、quantZeroPoints数据类型组合不在支持范围内，具体组合请参考约束说明。
  evidence:
  - aclnnInplaceQuantScatterGetWorkspaceSize
  - aclnnInplaceQuantScatter
  extraction_status: complete
  inputs:
  - name: indices
    role: input
    dtype: INT32、INT64
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'indices: indices的取值范围为0, selfRef.shape(axis) - updates.shape(axis))。'
  - name: updates
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    value_constraints:
    - 'updates: updates的维数需要与selfRef的维数一样，其第1维的大小等于indices的第1维的大小，且不大于selfRef的第1维的大小。'
    - 'updates: 其axis轴的大小不大于selfRef的axis轴的大小。'
  - name: quantScales
    role: input
    dtype: BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    value_constraints:
    - 'quantScales: 元素个数需要等于updates在quantAxis轴的大小。'
  - name: quantZeroPoints
    role: optional_input
    dtype: BFLOAT16、INT32
    noncontiguous: 'yes'
    tensor_rank: '3'
    value_constraints:
    - 'quantZeroPoints: 元素个数需要等于updates在quantAxis轴的大小。'
  - name: axis
    role: input
  - name: quantAxis
    role: input
    shape_constraints:
    - 'quantAxis: 取值支持-1或者len(updates.shape) - 1。'
  - name: reduction
    role: input
    value_constraints:
    - 'reduction: 取值支持1（update）。'
  - name: selfRef
    role: inout
    dtype: INT8
    noncontiguous: 'yes'
    tensor_rank: '3'
