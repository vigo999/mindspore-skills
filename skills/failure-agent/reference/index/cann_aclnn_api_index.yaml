    - 'keyAntiquantOffsetOptional: 不支持空Tensor。'
  - name: valueAntiquantScaleOptional
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32、FLOAT8_E8M0
    optional_semantics:
    - 'valueAntiquantScaleOptional: 不支持空Tensor。'
  - name: valueAntiquantOffsetOptional
