- api_name: aclnnBatchMatMulReduceScatterAlltoAll
  doc_names:
  - aclnnBatchMatMulReduceScatterAlltoAll.md
  source_repo: ops-transformer
  workspace_api: aclnnBatchMatMulReduceScatterAlltoAllGetWorkspaceSize
  execute_api: aclnnBatchMatMulReduceScatterAlltoAll
  summary: 接口功能**：BatchMatMulReduceScatterAllToAll是通算融合算子，实现BatchMatMul计算与ReduceScatter、AllToAll集合通信并行的算子。
  constraints:
  - 因为集合通信及BatchMatMul计算所需，输入输出shape需满足以下数学关系：（其中ep=epWorldSize，tp=tpWorldSize）。
  - 'x: (E/ep, ep*C, M/tp)。'
  - weight：(E/ep, M/tp, H)。
  - biasOptional：非空指针情况下，三维时为(E/ep, 1, H/tp)，两维时为(E/ep, H/tp)。
  - y：(E, C, H/tp)。
  - 'x: (E/ep, ep*tp\*C/tp, M/tp)。'
  - biasOptional：非空指针情况下，三维时为(E/ep, 1, H)，两维时为(E/ep, H)。
  - y：(E, C/tp, H)。
  - 比如x.size(0)等于E/tp，y.size(0)等于E，则表示，y.size(0) = ep*x.size(0)，y.size(0)是ep的整数倍；其他关系类似。
  - E的取值范围为[2, 512]，且E是ep的整数倍。
  - H的取值范围为：[1, 65535]，当yShardType为0时，H是tp的整数倍。
  - M/tp的取值范围为：[1, 65535]。
  - E/ep的取值范围为：[1, 32]。
  - ep、tp均仅支持2、4、8、16、32。
  - groupEp和groupTp名称不能相同。
  - C大于0，上限为算子device内存上限，当yShardType为1时，C是tp的整数倍。
  - 通算融合算子不支持并发调用，不同的通算融合算子也不支持并发调用。
  - 不支持跨超节点，只支持超节点内。
  error_conditions:
  - 1. 传入的x、weight、groupEp、groupTp或out是空指针。
  - 1. groupEp或groupTp字符串长度不合法。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 1. 传入的x、weight、groupEp、groupTp或out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 1. groupEp或groupTp字符串长度不合法。
  evidence:
  - aclnnBatchMatMulReduceScatterAlltoAllGetWorkspaceSize
  - aclnnBatchMatMulReduceScatterAlltoAll
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
    value_constraints:
    - 'x(aclTensor*): 必须为3维。'
  - name: weight
    role: input
    dtype: FLOAT16、BFLOAT16
    tensor_rank: '3'
    value_constraints:
    - 'weight(aclTensor*): 必须为3维。'
  - name: biasOptional
    role: input
    dtype: FLOAT16、FLOAT32
    noncontiguous: 'no'
  - name: groupEp
    role: input
    dtype: STRING
    value_constraints:
    - 'groupEp(char*): 字符串长度需大于0且小于128。'
  - name: groupTp
    role: input
    dtype: STRING
    value_constraints:
    - 'groupTp(char*): 字符串长度需大于0且小于128。'
  - name: epWorldSize
    role: input
    dtype: INT64
    value_constraints:
    - 'epWorldSize(int64_t): 取值范围：2、4、8、16、32。'
  - name: tpWorldSize
    role: input
    dtype: INT64
    value_constraints:
    - 'tpWorldSize(int64_t): 取值范围：2、4、8、16、32。'
  - name: yShardType
    role: input
    dtype: INT64
  outputs:
  - name: out
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
    value_constraints:
    - 'out(aclTensor*): 必须为3维。'
    output_relation:
    - 'out(aclTensor*): 数据类型与输入x保持一致。'
