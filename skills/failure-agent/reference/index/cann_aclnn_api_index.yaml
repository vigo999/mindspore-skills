  summary: 接口功能：对输入Tensor进行正交分解。
  constraints:
  - 'self: 支持非连续的Tensor，数据格式支持ND，shape维度至少为2且不大于8, 且shape需要与Q,R满足约束条件。'
  - 'mode: 当mode为1时，使用''complete''模式，对于输入A(\*, m, n),输出完整大小的Q(\*, m, m), R(\*, m,
    n), 当mode为2时，使用''r''模式，仅计算reduced场景下的R(\*,k,n),其中k为m,n的最小值，返回Q为空tensor。'
  - 'Q: shape为Q(\*, m, m)或Q(\*, m, k)或为空, 其中k为m, n的最小值。'
  - 'R: shape为R(\*, m, n)或R(\*, k, n), 其中k为m, n的最小值。'
  error_conditions:
  - 传入的self、Q或R是空指针。
  - self、Q、R的数据类型和数据格式不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的self、Q或R是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: self、Q、R的数据类型和数据格式不在支持的范围之内。
