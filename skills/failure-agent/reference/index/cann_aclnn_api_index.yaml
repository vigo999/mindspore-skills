- api_name: aclnnApplyRotaryPosEmb
  doc_names:
  - aclnnApplyRotaryPosEmb.md
  source_repo: ops-transformer
  workspace_api: aclnnApplyRotaryPosEmbGetWorkspaceSize
  execute_api: aclnnApplyRotaryPosEmb
  summary: 接口功能：推理网络为了提升性能，将query和key两路算子融合成一路。执行旋转位置编码计算，计算结果执行原地更新。
  constraints:
  - layout为1时，queryRef、keyRef、cos、sin输入shape的前2维（B、S）必须相等；layout为4时，第1维（T）必须相等。
  - queryRef、keyRef、cos、sin输入shape的最后一维（D）必须相等。
  - 输入张量queryRef、keyRef、cos、sin的dtype必须相同。
  - layout为1时，输入queryRef的shape用（q_b, q_s, q_n, q_d）表示，keyRef的shape用（q_b, q_s, k_n,
    q_d）表示，cos和sin的shape用（q_b, q_s, 1, q_d）表示。其中，b表示batch_size，s表示seq_length，n表示head_num，d表示head_dim。layout为4时，输入queryRef的shape用（q_t,
    q_n, q_d）表示，keyRef的shape用（q_t, k_n, q_d）表示，cos和sin的shape用（q_t, 1, q_d）表示。其中，t表示b和s合轴，n表示head_num，d表示head_dim。
  - 当输入是BFLOAT16时，cast表示为1，castSize为4，DtypeSize为2。
  - 当输入是FLOAT16或FLOAT32时，cast表示为0，castSize = DtypeSize（FLOAT16时为2，FLOAT32时为4）。
  - 对于任意layout，queryRef与keyRef除N维度外其他维度必须相同；queryRef、keyRef输入shape的最后一维（D）必须相等，cos、sin输入shape的最后一维（D）必须相等，且小于等于queryRef、keyRef输入shape的最后一维（D）。
  - rotaryMode为"half"和"interleave"时，输入shape最后一维必须被2整除；rotaryMode为"quarter"时，输入shape最后一维必须被4整除。
  error_conditions:
  - 传入的queryRef、keyRef、cos或sin是空指针。
  - 传入的queryRef、keyRef、cos、sin的数据类型、数据格式不在支持的范围内或shape不匹配。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的queryRef、keyRef、cos或sin是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 传入的queryRef、keyRef、cos、sin的数据类型、数据格式不在支持的范围内或shape不匹配。
  evidence:
  - aclnnApplyRotaryPosEmbGetWorkspaceSize
  - aclnnApplyRotaryPosEmb
  extraction_status: complete
  inputs:
  - name: cos
    role: input
    dtype: BFLOAT16、FLOAT16、FLOAT
    noncontiguous: 'yes'
    shape_constraints:
    - 'cos: shape第3维（N）必须等于1。'
    - 'cos: shape最后一维（D）必须等于128或者64。'
    - 'cos: cos与sin shape必须相同。'
    optional_semantics:
    - 'cos: 不支持空Tensor。'
  - name: sin
    role: input
    dtype: BFLOAT16、FLOAT16、FLOAT
    noncontiguous: 'yes'
    shape_constraints:
    - 'sin: shape第3维（N）必须等于1。'
    - 'sin: shape最后一维（D）必须等于128或者64。'
    - 'sin: cos与sin shape必须相同。'
    optional_semantics:
    - 'sin: 不支持空Tensor。'
  - name: layout
    role: input
    dtype: int64
    tensor_rank: 3|4
    layout_templates:
    - BSND
    - BNSD
    - TND
    value_constraints:
    - 'layout: 取值范围：1-BSND、2-SBND、3-BNSD、4-TND。'
    - 'layout: 目前仅支持BSND布局格式（取值为1）和TND布局格式（取值为4）。'
  outputs:
  - name: queryRef
    role: inout
    dtype: BFLOAT16、FLOAT16、FLOAT
    noncontiguous: 'yes'
    shape_constraints:
    - 'queryRef: shape最后一维（D）必须等于128或者64。'
    optional_semantics:
    - 'queryRef: 不支持空Tensor。'
  - name: keyRef
    role: inout
    dtype: BFLOAT16、FLOAT16、FLOAT
    noncontiguous: 'yes'
    shape_constraints:
    - 'keyRef: shape最后一维（D）必须等于128或者64。'
    optional_semantics:
    - 'keyRef: 不支持空Tensor。'
