- api_name: aclnnKvRmsNormRopeCache
  doc_names:
  - aclnnKvRmsNormRopeCache.md
  source_repo: ops-transformer
  workspace_api: aclnnKvRmsNormRopeCacheGetWorkspaceSize
  execute_api: aclnnKvRmsNormRopeCache
  summary: 接口功能：对输入张量（kv）的尾轴，拆分出左半边用于rms_norm计算，右半边用于RoPE计算，再将计算结果分别scatter到两块cache中。
  constraints:
  - Bkv为输入kv的batch size，Skv为输入kv的sequence length，大小由用户输入场景决定，无明确限制。
  - N为输入kv的head number。此算子与DeepSeekV3网络结构强相关，仅支持N=1的场景，不存在N非1的场景。
  - D为输入kv的head dim。rms_norm计算所需数据Dv和RoPE计算所需数据Dk由输入kv的D切分而来。故Dk、Dv大小需满足Dk+Dv=D。同时，Dk需满足rope规则。根据rope规则，Dk为偶数。若cacheModeOptional为NZ场景（cacheModeOptional为PA_NZ、PA_BLK_NZ），Dk、Dv需32B对齐。
  - 若cacheModeOptional为PA场景（cacheModeOptional为PA、PA_BNSD、PA_NZ、PA_BLK_BNSD、PA_BLK_NZ），BlockSize需32B对齐。
  - 关于上述32B对齐的情形，对齐值由cache的数据类型决定。以BlockSize为例，若cache的数据类型为INT8、HIFLOAT8、FLOAT8E5M2、FLOAT8E4M3FN，则需BlockSize%32=0；若cache的数据类型为float16或bfloat16，则需BlockSize%16=0；若kCacheRef与ckvCacheRef参数的dtype不一致，BlockSize需同时满足BlockSize%32=0和BlockSize%16=0。
  - Bcache为输入cache的batch size，Scache为输入cache的sequence length，大小由用户输入场景决定，无明确限制。
  - BlockNum为写入cache的内存块数，大小由用户输入场景决定，无明确限制。
  - 当cacheModeOptional为Norm时，shape为2维[Bkv,Skv]，要求index的value值范围为[-1,Scache)。不同的Bkv下，value数值可以重复。
  - 当cacheModeOptional为PA_BNSD、PA_NZ时，shape为1维[Bkv * Skv]，要求index的value值范围为[-1,BlockNum
    * BlockSize)。value数值不能重复。
  - 当cacheModeOptional为PA_BLK_BNSD、PA_BLK_NZ时，shape为1维[Bkv * ceil_div(Skv,BlockSize)]，要求index的value的数值范围为-1,BlockNum
    * BlockSize)。value/BlockSize的值不能重复。
  - 量化场景支持的情况1：kCacheRef的数据类型为FLOAT16或BFLOAT16，ckvCacheRef的数据类型为INT8、HIFLOAT8、FLOAT8E5M2、FLOAT8E4M3FN。
  - 量化场景支持的情况2：ckvCacheRef的数据类型为FLOAT16或BFLOAT16，kCacheRef的数据类型为INT8、HIFLOAT8、FLOAT8E5M2、FLOAT8E4M3FN。
  - 量化场景支持的情况3：kCacheRef与ckvCacheRef的数据类型一致，为INT8、HIFLOAT8、FLOAT8E5M2、FLOAT8E4M3FN。
  - 与 kv 数据类型一致。
  - 非量化场景下，数据类型与输入 kv 一致。
  error_conditions:
  - 输入和输出Tensor是空指针。
  - 输入和输出数据类型不在支持的范围内。
  - 参数kv、gamma、cos、sin、index、kCacheRef、ckvCacheRef、kRopeScaleOptional、ckvScaleOptional、kRopeOffsetOptional、cKvOffsetOptional的shape校验非法。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 参数kv、gamma、cos、sin、index、kCacheRef、ckvCacheRef、kRopeScaleOptional、ckvScaleOptional、kRopeOffsetOptional、cKvOffsetOptional的shape校验非法。
  evidence:
  - aclnnKvRmsNormRopeCacheGetWorkspaceSize
  - aclnnKvRmsNormRopeCache
  extraction_status: complete
  inputs:
  - name: kv
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '4'
    shape_constraints:
    - 'kv: shape仅支持4维[Bkv,N,Skv,D]。'
    optional_semantics:
    - 'kv: 不支持空Tensor。'
  - name: gamma
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '1'
    optional_semantics:
    - 'gamma: 不支持空Tensor。'
  - name: cos
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '4'
    optional_semantics:
    - 'cos: 不支持空Tensor。'
  - name: sin
    role: optional_input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '4'
    optional_semantics:
    - 'sin: 不支持空Tensor。'
  - name: index
    role: input
    dtype: INT64
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'index: 当cacheModeOptional为Norm时，shape为2维[Bkv,Skv]。'
    - 'index: 当cacheModeOptional为PA_BNSD、PA_NZ时，shape为1维[Bkv * Skv]。'
    - 'index: 当cacheModeOptional为PA_BLK_BNSD、PA_BLK_NZ时，shape为1维[Bkv\*ceil_div(Skv,BlockSize)]。'
    optional_semantics:
    - 'index: 不支持空Tensor。'
  - name: kRopeScaleOptional
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'kRopeScaleOptional: shape为2维[N,Dk]。'
    - 'kRopeScaleOptional: 或者shape为1维[Dk,]。'
    - 'kRopeScaleOptional: 或者shape为1维[1,]。'
    optional_semantics:
    - 'kRopeScaleOptional: 不支持空Tensor。'
  - name: ckvScaleOptional
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'ckvScaleOptional: shape为2维[N,Dv]。'
    - 'ckvScaleOptional: 或者shape为1维[Dv,]。'
    - 'ckvScaleOptional: 或者shape为1维[1,]。'
    optional_semantics:
    - 'ckvScaleOptional: 不支持空Tensor。'
  - name: kRopeOffsetOptional
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'kRopeOffsetOptional: shape为2维[N,Dk]。'
    - 'kRopeOffsetOptional: 或者shape为1维[Dk,]。'
    - 'kRopeOffsetOptional: 或者shape为1维[1,]。'
    optional_semantics:
    - 'kRopeOffsetOptional: 不支持空Tensor。'
  - name: cKvOffsetOptional
    role: input
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 1..2
    shape_constraints:
    - 'cKvOffsetOptional: shape为2维[N,Dv]。'
    - 'cKvOffsetOptional: 或者shape为1维[Dv,]。'
    - 'cKvOffsetOptional: 或者shape为1维[1,]。'
    optional_semantics:
    - 'cKvOffsetOptional: 不支持空Tensor。'
  - name: epsilon
    role: input
    dtype: double
  - name: cacheModeOptional
    role: input
    dtype: char*
  - name: isOutputKv
    role: input
    description: kRopeOut和cKvOut输出控制标记。
    dtype: bool
  outputs:
  - name: kCacheRef
    role: output
    description: 提前申请的cache，输入输出同地址复用。
    dtype: FLOAT16、BFLOAT16、INT8、HIFLOAT8、FLOAT8E5M2、FLOAT8E4M3FN
    noncontiguous: 'yes'
    tensor_rank: '4'
    shape_constraints:
    - 'kCacheRef: 当cacheModeOptional为PA场景（cacheModeOptional为PA、PA_BNSD、PA_NZ、PA_BLK_BNSD、PA_BLK_NZ）时，shape为4维[BlockNum,BlockSize,N,Dk]。'
    - 'kCacheRef: 当cacheModeOptional为Norm场景时，shape为4维[Bcache,N,Scache,Dk]。'
    optional_semantics:
    - 'kCacheRef: 不支持空Tensor。'
  - name: ckvCacheRef
    role: output
    description: 提前申请的cache，输入输出同地址复用。
    dtype: FLOAT16、BFLOAT16、INT8、HIFLOAT8、FLOAT8E5M2、FLOAT8E4M3FN
    noncontiguous: 'yes'
    tensor_rank: '4'
    shape_constraints:
    - 'ckvCacheRef: 当cacheModeOptional为PA场景（cacheModeOptional为PA、PA_BNSD、PA_NZ、PA_BLK_BNSD、PA_BLK_NZ）时，shape为4维[BlockNum,BlockSize,N,Dv]。'
    - 'ckvCacheRef: 当cacheModeOptional为Norm场景时，shape为4维[Bcache,N,Scache,Dv]。'
    optional_semantics:
    - 'ckvCacheRef: 不支持空Tensor。'
  - name: kRopeOut
    role: output
    description: 由isOutputKv控制，当isOutputKv为true时，需输出。数据类型与输入kv一致。
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
