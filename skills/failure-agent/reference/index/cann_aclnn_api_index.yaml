    shape_constraints:
    - 'seqLens(aclTensor*): shape为[batch]或[batch + 1]。'
    - 'seqLens(aclTensor*): 当isSeqLensCumsum为false时，shape为[batch]。'
    - 'seqLens(aclTensor*): 当isSeqLensCumsum为true时，shape为[batch + 1]。'
    value_constraints:
    - 'seqLens(aclTensor*): 元素取值范围为[0, num_blocks)。'
  - name: seqOffsetOptional
    role: input
    dtype: 与blockTables保持一致
    tensor_rank: '1'
    shape_constraints:
    - 'seqOffsetOptional(aclTensor*): shape为[batch]。'
