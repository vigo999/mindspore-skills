- api_name: aclnnQuantAllReduce
  doc_names:
  - aclnnQuantAllReduce.md
  source_repo: ops-transformer
  workspace_api: aclnnQuantAllReduceGetWorkspaceSize
  execute_api: aclnnQuantAllReduce
  summary: 接口功能**：实现低比特数据的AllReduce通信，在通信的过程中对数据进行反量化，并输出通信结果。
  constraints:
  - 当x的数据类型为FLOAT8_E4M3FN、FLOAT8_E5M2并且scales的数据类型为FLOAT8_E8M0时，输入数据的量化方式为mx量化。
  - 当x的数据类型为INT8、HIFLOAT8、FLOAT8_E4M3FN、FLOAT8_E5M2并且scales的数据类型为FLOAT时，输入数据的量化方式为pertoken-pergroup量化（groupSize=128）。
  - 只在Ascend950系列平台使能。
  - 不支持空Tensor输入。
  - 通信域大小支持2, 4, 8。
  - 通信域使用约束：同一通信域内仅允许连续执行`aclnnQuantAllReduce`和`aclnnQuantReduceScatter`算子，且该通信域中不允许有其他通信算子。
  - '`HCCL_BUFFSIZE`：调用本算子前需检查`HCCL_BUFFSIZE`环境变量取值是否合理，该环境变量表示单个通信域占用内存大小，单位MB，不配置时默认为200MB。要求满足`HCCL_BUFFSIZE`>=
    2 * (`xDataSize` + `scalesDataSize + 1`)。其中`xDataSize`为输入`x`的数据大小，计算公式为：`xDataSize
    = b * s * H * 1 (Byte)`，`scalesDataSize`为`scales`的数据大小，当量化方式为pertoken-pergroup量化时，计算公式为：`scalesDataSize
    = b * s * H / 128 * 4 (Byte)`，当量化方式为mx量化时，计算公式为：`scalesDataSize = b * s * H /
    32 * 1 (Byte)`。'
  - H范围仅支持[1024, 8192]，要求128对齐。
  error_conditions:
  - x、scales、output存在空指针。
  - x、scales或output的数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: x、scales、output存在空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x、scales或output的数据类型不在支持的范围之内。
  evidence:
  - aclnnQuantAllReduceGetWorkspaceSize
  - aclnnQuantAllReduce
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: INT8、HIFLOAT8、FLOAT8_E4M3FN、FLOAT8_E5M2
    noncontiguous: 'yes'
    tensor_rank: 2..3
    shape_constraints:
    - 'x: 支持的shape为：(bs, H)或者(b, s, H)。'
    optional_semantics:
    - 'x: 不支持空Tensor。'
  - name: scales
    role: input
    dtype: FLOAT、FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 2..4
    optional_semantics:
    - 'scales: 不支持空Tensor。'
    output_relation:
    - 'scales: 当scales的数据类型为FLOAT8_E8M0时。'
    - 'scales: 当scales的数据类型为FLOAT时。'
  - name: group
    role: input
    dtype: Char*、String
  - name: reduceOp
    role: input
    dtype: Char*、String
  outputs:
  - name: output
    role: output
    description: 公式中的输出output。
    dtype: FLOAT、FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 2..3
    shape_constraints:
    - 'output: 支持的shape为(bs, H)或者(b, s, H)，output的shape与x保持一致。'
    optional_semantics:
    - 'output: 不支持空Tensor。'
- api_name: aclnnQuantBatchMatmulInplaceAdd
  doc_names:
  - aclnnQuantBatchMatmulInplaceAdd.md
  source_repo: ops-nn
  workspace_api: aclnnQuantBatchMatmulInplaceAddGetWorkspaceSize
  execute_api: aclnnQuantBatchMatmulInplaceAdd
  summary: 接口功能：在 micro-batch 训练场景，需要做 micro-batch 的梯度累计，会存在大量 QuantBatchMatmul 后接
    InplaceAdd 的融合场景。QuantBatchMatmulInplaceAdd 算子将上述算子融合起来，提高网络性能。实现量化矩阵乘计算和加法计算，基本功能为矩阵乘和加法的组合。
  constraints:
  - 当前仅支持 transposeX1 为 true，transposeX2 为 false。
  - 传入的groupSize内部会按如下公式分解得到groupSizeM、groupSizeN、groupSizeK，当其中有1个或多个为0，会根据x1/x2/x1Scale/x2Scale输入shape重新设置groupSizeM、groupSizeN、groupSizeK用于计算。原理：假设groupSizeM=0，表示m方向量化分组值由接口推断，推断公式为groupSizeM
    = m / scaleM（需保证m能被scaleM整除），其中m与x1 shape中的m一致，scaleM与x1Scale shape中的m一致。
  error_conditions:
  - 如果传入参数是必选输入、输出或者必选属性，且是空指针。
  - x1、x2、x1Scale、x2Scale、yRef、groupSize的数据类型和数据格式不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入、输出或者必选属性，且是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x1、x2、x1Scale、x2Scale、yRef、groupSize的数据类型和数据格式不在支持的范围内。
  evidence:
  - aclnnQuantBatchMatmulInplaceAddGetWorkspaceSize
  - aclnnQuantBatchMatmulInplaceAdd
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: FLOAT8_E4M3FN、FLOAT8_E5M2
    noncontiguous: 'yes'
    tensor_rank: '2'
  - name: x2
    role: input
    dtype: FLOAT8_E4M3FN、FLOAT8_E5M2
    noncontiguous: 'yes'
    tensor_rank: '2'
  - name: x1Scale
    role: optional_input
    dtype: FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: x2Scale
    role: input
    dtype: FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: '3'
  - name: transposeX1
    role: input
    dtype: bool
  - name: transposeX2
    role: input
    dtype: bool
  - name: groupSize
    role: input
    dtype: INT64
  outputs:
  - name: yRef
    role: inout
    description: Device侧的aclTensor，对应公式中的输入输出y。
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '2'
    optional_semantics:
    - 'yRef: 当输入x1为m=0的空tensor或x2为n=0的空tensor时，输出为空tensor。'
