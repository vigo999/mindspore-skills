    role: input
    dtype: BFLOAT16、FLOAT16、FLOAT32
    noncontiguous: 'yes'
  - name: sin
    role: input
    dtype: BFLOAT16、FLOAT16、FLOAT32
    noncontiguous: 'yes'
  - name: mode
    role: input
    dtype: INT64
  outputs:
  - name: out
    role: output
    dtype: BFLOAT16、FLOAT16、FLOAT32
    tensor_rank: '4'
