  - name: x1
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'no'
    tensor_rank: 2..3
    optional_semantics:
    - 'x1: 支持空Tensor。'
  - name: x2
    role: input
    dtype: INT8、INT4
    noncontiguous: 'yes'
    tensor_rank: '2'
    optional_semantics:
    - 'x2: 支持空Tensor。'
  - name: bias
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '1'
  - name: antiquantScale
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'no'
    tensor_rank: 1..2
    shape_constraints:
    - 'antiquantScale: pertensor场景shape为(1)。'
    - 'antiquantScale: PerChannel场景shape为(n)/(1,n)，n为x2最后一维的大小。'
    - 'antiquantScale: pergroup场景shape为(ceil(k,antiquantGroupSize),n)。'
  - name: antiquantOffset
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'no'
    tensor_rank: 1..2
    shape_constraints:
    - 'antiquantOffset: 可选，可为空，非空时shape与antiquantScale一致。'
    optional_semantics:
    - 'antiquantOffset: 可选，可为空，非空时shape与antiquantScale一致。'
  - name: residual
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '3'
  - name: gamma
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
