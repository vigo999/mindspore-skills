  summary: 接口功能：对输入张量，通过给定的rowBlockSize和colBlockSize将输入划分成多个数据块，以数据块为基本粒度进行量化。在每个块中，先计算出当前块对应的量化参数scaleOut，并根据scaleOut对输入进行量化。输出最终的量化结果，以及每个块的量化参数scaleOut。
  constraints:
  - shape与`x`保持一致。
  error_conditions:
  - 传入的x、yOut或scaleOut为空指针。
