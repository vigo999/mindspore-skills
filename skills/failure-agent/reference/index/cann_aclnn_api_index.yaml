- api_name: aclnnMoeDistributeDispatchV2
  doc_names:
  - aclnnMoeDistributeDispatchV2.md
  source_repo: ops-transformer
  workspace_api: aclnnMoeDistributeDispatchV2GetWorkspaceSize
  execute_api: aclnnMoeDistributeDispatchV2
  summary: 接口功能：对token数据进行量化（可选），当存在TP域通信时，先进行EP（Expert Parallelism）域的AllToAllV通信，再进行TP（Tensor
    Parallelism）域的AllGatherV通信；当不存在TP域通信时，进行EP（Expert Parallelism）域的AllToAllV通信。
  constraints:
  - 对于共享专家，需满足 (A = Bs * epWorldSize * sharedExpertNum / sharedExpertRankNum)。
  - 对于MoE专家，当`globalBs`为0时，需满足 (A >= Bs * epWorldSize * min(localExpertNum, K))；当`globalBs`非0时，需满足
    (A >= globalBs * min(localExpertNum, K))。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：依commAlg取值，"fullmesh"支持(0, 7168]且为32的整数倍；"hierarchy"并且驱动版本≥25.0.RC1.1时支持(0,
    10*1024]且为32的整数倍。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：取值范围[1024, 8192]。
  - Ascend 950PR/Ascend 950DT：取值范围[1024, 8192]。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：依commAlg取值，"fullmesh"取值范围为 (0 < Bs ≤ 256)；"hierarchy"并且驱动版本≥25.0.RC1.1时取值范围为
    (0 < Bs ≤ 512)。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：取值范围为 (0 < Bs ≤ 512)。
  - Ascend 950PR/Ascend 950DT：取值范围为 (0 < Bs ≤ 512)。
  - '**K**：表示选取topK个专家，取值范围为 (0 < K ≤ 16) 且满足 (0 < K ≤ moeExpertNum)。'
  - '**serverNum**：表示服务器的节点数，取值仅支持2、4、8。'
  - 对于共享专家卡，(localExpertNum = 1)。
  - 对于MoE专家卡，(localExpertNum = moeExpertNum / (epWorldSize - sharedExpertRankNum))；当(localExpertNum
    > 1)时，不支持TP域通信。
  - '`quantMode`取值为0时，表示非量化场景，输入`scales`传空指针。'
  - '`quantMode`取值为2时，表示pertoken动态量化场景，`expandX`的数据类型支持`INT8`。'
  - 输入`scales`可传入空指针。
  - 若输入`scales`传入有效数据时，其shape为 (`moeExpertNum`, `H`)。
  - 若输入`scales`传入有效数据且存在共享专家卡时，其shape为 (`sharedExpertNum` + `moeExpertNum`, `H`)。
  - 若输入`scales`传入有效数据且不存在共享专家卡时，其shape为 (`moeExpertNum`, `H`)。
  - '`quantMode`取值为0时，表示非量化场景，`expandX`的数据类型支持`FLOAT16`、`BFLOAT16`，输入`scales`必须传入空指针。'
  - '`quantMode`取值为1时，表示静态量化场景，`expandX`的数据类型支持`INT8`、`HIFLOAT8`。'
  - 输入的`scales`代表量化系数，shape为 (1, )；。
  - 输入的`scales`表示每个专家共享的平滑权重时，shape为 (`H`，)；。
  - 输入的`scales`代表融了每个专家的平滑权重的量化系数时，若有共享专家卡，其shape为 (`sharedExpertNum` + `moeExpertNum`,
    `H`)，若无共享专家卡，其shape为 (`moeExpertNum`, `H`)。
  - '`expandX`的数据类型为`HIFLOAT8`时，`scales`的shape必须为 (1, )。'
  - '`quantMode`取值为2时，表示pertoken动态量化场景，`expandX`的数据类型支持`INT8`、`FLOAT8_E4M3FN`、`FLOAT8_E5M2`。'
  - '`quantMode`取值为3时，表示pergroup动态量化场景，expandX的数据类型支持`FLOAT8_E4M3FN`、`FLOAT8_E5M2`。'
  - '`quantMode`取值为4时，表示mxfp8量化场景，`expandX`的数据类型支持`FLOAT8_E4M3FN`、`FLOAT8_E5M2`，输入`scales`必须传入空指针。'
  - commAlg为""或nullptr：依HCCL环境变量选择“fullmesh”或“hierarchy”公式。
  - commAlg为"fullmesh"：设置大小要求 (≥ 2 * (Bs * epWorldSize * min(localExpertNum, K) *
    H * sizeof(uint16) + 2MB))。
  - commAlg为"hierarchy"：设置大小要求 (≥ (`moeExpertNum` + `epWorldSize` / 4) * Align512(`maxBs`
    * (`H` * 2 + 16 * Align8(`K`))) * 1B + 8MB，其中Align8(x) = ((x + 8 - 1) / 8) * 8，Align512(x)
    = ((x + 512 - 1) / 512) * 512)。
  - ep通信域内：设置大小要求 (≥ 2) 且满足 (≥ 2 * (localExpertNum * maxBs * epWorldSize * Align512(Align32(2
    * H) + 64) + (K + sharedExpertNum) * maxBs * Align512(2 * H)))（`localExpertNum`需使用MoE专家卡的本卡专家数；`Align512(x)
    = ((x + 512 - 1) / 512) * 512`；`Align32(x) = ((x + 32 - 1) / 32) * 32`）。
  - tp通信域内：设置大小要求\>=A * (H * 2 + 128) * 2。
  - pergroup动态量化场景下，`alignedH = Align128(H) = ((H + 128 - 1) / 128) * 128`。
  - mx量化场景下，`alignedH = Align256(H) = ((H + 256 - 1) / 256) * 256`）。
  - 其余量化模式下`alignedH = Align32(H) = ((H + 32 - 1) / 32) * 32`。
  - 一个模型中的CombineV2系列算子和`aclnnMoeDistributeDispatchV2`仅支持相同EP通信域，且该通信域中不允许有其他算子。
  - 一个模型中的CombineV2系列算子和`aclnnMoeDistributeDispatchV2`仅支持相同TP通信域或都不支持TP通信域；有TP通信域时，该通信域中不允许有其他算子。
  - Atlas A3 训练系列产品/Atlas A3 推理系列产品：一个通信域内的节点需在一个超节点内，不支持跨超节点。
  - Atlas A2 训练系列产品/Atlas A2 推理系列产品：多机场景仅支持交换机组网，不支持双机直连组网。
  - 需要满足moeExpertNum % (epWorldSize - sharedExpertRankNum) = 0。
  - 各rank Bs一致时，globalBs = Bs * epWorldSize 或 0。
  - 各rank Bs不一致时，globalBs = maxBs * epWorldSize（maxBs为单卡Bs最大值）。
  error_conditions:
  - 输入和输出的必选参数Tensor是空指针。
  - 输入和输出的数据类型不在支持的范围内。
  - 输入和输出的shape不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入和输出的必选参数Tensor是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入和输出的数据类型不在支持的范围内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: 输入和输出的shape不在支持的范围内。
  evidence:
  - aclnnMoeDistributeDispatchV2GetWorkspaceSize
  - aclnnMoeDistributeDispatchV2
  extraction_status: complete
