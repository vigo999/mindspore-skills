    optional_semantics:
    - 'quantScale1Optional: 不支持空Tensor。'
  - name: deqScale2Optional
    role: input
    dtype: UINT64、FLOAT32
    optional_semantics:
    - 'deqScale2Optional: 不支持空Tensor。'
  - name: quantScale2Optional
    role: input
    description: 输出的量化因子。
    dtype: FLOAT32、BFLOAT16
    optional_semantics:
    - 'quantScale2Optional: 不支持空Tensor。'
  - name: quantOffset2Optional
    role: input
    description: 输出的量化偏移。
    dtype: FLOAT32、BFLOAT16
    optional_semantics:
    - 'quantOffset2Optional: 不支持空Tensor。'
  - name: antiquantScaleOptional
    role: input
  - name: antiquantOffsetOptional
    role: input
  - name: blockTableOptional
    role: input
    dtype: INT32
    tensor_rank: 第一维长度需等于B，第二维长度不能小于maxBlockNumPerSeq（maxBlockNumPerSeq为不同batch中最大actualSeqLengthsKv对应的block数量）
    optional_semantics:
