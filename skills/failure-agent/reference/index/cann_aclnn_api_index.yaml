  summary: 接口功能：实现光栅化计算。根据给定的三维空间中的点和面，获取屏幕中每个像素点的最小深度及其对应的面片索引，并计算该面片的重心坐标透视矫正插值。
  constraints:
  - 仅支持useDepthPrior为0输入场景，参数dOptional、occlusionTruncation、useDepthPrior在实际计算中不生效。
  error_conditions:
  - 传入的v、f、findicesOut或barycentricOut是空指针。
  - v、f、findicesOut或barycentricOut的数据类型不在支持范围之内。
  - v、f、findicesOut或barycentricOut的shape不在支持范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的v、f、findicesOut或barycentricOut是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: v、f、findicesOut或barycentricOut的数据类型不在支持范围之内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: v、f、findicesOut或barycentricOut的shape不在支持范围之内。
  evidence:
  - aclnnRasterizerGetWorkspaceSize
  - aclnnRasterizer
  extraction_status: complete
