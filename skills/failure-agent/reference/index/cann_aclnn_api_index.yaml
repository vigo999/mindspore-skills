- api_name: aclnnSparseFlashAttention
  doc_names:
  - aclnnSparseFlashAttention.md
  source_repo: ops-transformer
  workspace_api: aclnnSparseFlashAttentionGetWorkspaceSize
  execute_api: aclnnSparseFlashAttention
  summary: 接口功能：sparse_flash_attention（SFA）是针对大序列长度推理场景的高效注意力计算模块，该模块通过“只计算关键部分”大幅减少计算量，然而会引入大量的离散访存，造成数据搬运时间增加，进而影响整体性能。
  constraints:
  - 参数query、key、value的数据类型必须保持一致。
  - 参数query中的D和key、value的D值相等为512，参数query_rope中的Dr和key_rope的Dr值相等为64。
  - block_size为一个block的token数，block_size取值为16的倍数，且最大支持1024。
  - 支持sparse_block_size整除block_size。
  error_conditions: []
  return_codes: []
  evidence:
  - aclnnSparseFlashAttentionGetWorkspaceSize
  - aclnnSparseFlashAttention
  extraction_status: complete
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'query: layout_query为BSND时，shape为(B,S1,N1,D)。'
    - 'query: layout_query为TND时，shape为(T1,N1,D)。'
    layout_templates:
    - BSND
    - TND
    tensor_rank: 3|4
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'key: layout_kv为PA_BSND时，shape为(block_num, block_size, KV_N, D)。'
    - 'key: layout_kv为BSND时，shape为(B, S2, KV_N, D)。'
    - 'key: layout_kv为TND时，shape为(T2, KV_N, D)。'
    layout_templates:
    - BSND
    - TND
    - PA_BSND
    tensor_rank: 3|4
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'value: shape与key的shape一致。'
    layout_templates:
    - BSND
    - TND
    - PA_BSND
    tensor_rank: 3|4
  - name: sparseIndices
    role: input
    dtype: INT32
    shape_constraints:
    - 'sparseIndices: layout_query为BSND时，shape为(B, Q_S, KV_N, sparse_size)。'
    - 'sparseIndices: layout_query为TND时，shape为(Q_T, KV_N, sparse_size)。'
    value_constraints:
    - 'sparseIndices: sparse_size为一次离散选取的block数，需要保证每行有效值均在前半部分，无效值均在后半部分，且需要满足sparse_size大于0。'
    layout_templates:
    - BSND
    - TND
    tensor_rank: 3|4
  - name: blockTable
    role: input
    dtype: INT32
    shape_constraints:
    - 'blockTable: shape支持(B,S2/block_size)。'
    value_constraints:
    - 'blockTable: 第二维长度不小于所有batch中最大的S2对应的block数量，即S2_max / block_size向上取整。'
  - name: actualSeqLengthsQuery
    role: input
    dtype: INT32
    shape_constraints:
    - 'actualSeqLengthsQuery: (B,)。'
    value_constraints:
    - 'actualSeqLengthsQuery: 该入参中每个Batch的有效token数不超过query中的维度S大小且不小于0。'
    optional_semantics:
    - 'actualSeqLengthsQuery: 如果不指定seqlen可传入None，表示和query的shape的S长度相同。'
    - 'actualSeqLengthsQuery: layout_query为TND时，该入参必须传入，且以该入参元素的数量作为B值，该参数中每个元素的值表示当前batch与之前所有batch的token数总和。'
  - name: actualSeqLengthsKv
    role: input
    dtype: INT32
    shape_constraints:
    - 'actualSeqLengthsKv: (B,)。'
    value_constraints:
    - 'actualSeqLengthsKv: 该参数中每个Batch的有效token数不超过key/value中的维度S大小且不小于0。'
    - 'actualSeqLengthsKv: layout_kv为TND，该参数中每个元素的值表示当前batch与之前所有batch的token数总和，即前缀和，因此后一个元素的值必须大于等于前一个元素的值。'
    optional_semantics:
    - 'actualSeqLengthsKv: 如果不指定seqlen可传入None，表示和key的shape的S长度相同。'
    - 'actualSeqLengthsKv: 当layout_kv为TND或PA_BSND时，该入参必须传入。'
  - name: queryRope
    role: input
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'queryRope: layout_query为TND时，shape为(B,S1,N1,Dr)。'
    - 'queryRope: layout_query为BSND时，shape为(T1,N1,Dr)。'
    layout_templates:
    - BSND
    - TND
    tensor_rank: 3|4
  - name: keyRope
    role: input
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'keyRope: layout_kv为TND时，shape为(B,S1,N1,Dr)。'
    - 'keyRope: layout_kv为BSND时，shape为(T1,N1,Dr)。'
    - 'keyRope: layout_kv为PA_BSND时，shape为(block_num,block_size,N2,Dr)。'
    layout_templates:
    - PA_BSND
    - BSND
    - TND
    tensor_rank: 3|4
  - name: scaleValue
    role: input
    dtype: FLOAT16
  - name: sparseBlockSize
    role: input
    dtype: INT64
    value_constraints:
    - 'sparseBlockSize: sparse_block_size为大于1小于等于128时，为Block-wise稀疏化场景，将token序列划分为固定大小的连续块，以块为单位进行重要性评估，块内token共享相同的稀疏化决策。'
  - name: layoutQuery
    role: input
    dtype: STRING
    value_constraints:
    - 'layoutQuery: 用户不特意指定时可传入默认值"BSND"。'
  - name: layoutKv
    role: input
    dtype: STRING
    value_constraints:
    - 'layoutKv: 用户不特意指定时可传入默认值"BSND"。'
  - name: sparseMode
    role: input
    dtype: INT64
  - name: preTokens
    role: input
    dtype: INT64
    value_constraints:
    - 'preTokens: 仅支持默认值2^63-1。'
  - name: nextTokens
    role: input
    dtype: INT64
    value_constraints:
    - 'nextTokens: 仅支持默认值2^63-1。'
  - name: attentionMode
    role: input
    dtype: INT64
  - name: returnSoftmaxLse
    role: input
    dtype: BOOL
    value_constraints:
    - 'returnSoftmaxLse: 默认值为False。'
  outputs:
  - name: attentionOut
    role: output
    description: 公式中的输出。
    dtype: FLOAT16、BFLOAT16
    shape_constraints:
    - 'attentionOut: layout_query为BSND时，shape为(B,S1,N1,D)。'
    - 'attentionOut: layout_query为TND时shape为(T1,N1,D)。'
    layout_templates:
    - BSND
    - TND
    tensor_rank: 3|4
  - name: softmaxMaxOut
    role: output
    dtype: FLOAT
    shape_constraints:
    - 'softmaxMaxOut: layout_query为BSND时，shape为(B,N2,S1,N1/N2)。'
    - 'softmaxMaxOut: layout_query为TND时shape为(N2,T1,N1/N2)。'
  - name: softmaxSumOut
    role: output
    dtype: FLOAT
    shape_constraints:
    - 'softmaxSumOut: layout_query为BSND时，shape为(B,N2,S1,N1/N2)。'
    - 'softmaxSumOut: layout_query为TND时shape为(N2,T1,N1/N2)。'
