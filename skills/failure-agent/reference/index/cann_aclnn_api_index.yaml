    - 'valueRef(aclTensor*): 当cacheMode为"Norm"时，shape为[num_tokens, num_heads, head_size_v]。'
    - 'valueRef(aclTensor*): 当cacheMode为"PA_NZ"时，shape为[num_tokens, num_heads * head_size_v]。'
