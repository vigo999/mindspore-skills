  execute_api: aclnnGroupedMatmul
  summary: 接口功能：实现分组矩阵乘计算，每组矩阵乘的维度大小可以不同。基本功能为矩阵乘，如$y_i[m_i,n_i]=x_i[m_i,k_i] \times
    weight_i[k_i,n_i], i=1...g$，其中g为分组个数，$m_i/k_i/n_i$为对应shape。根据x、weight、y的Tensor数量支持如下4种场景：
  constraints:
  - x为FLOAT16、weight为FLOAT16、biasOptional为FLOAT16、scaleOptional为空、offsetOptional为空、antiquantScaleOptional为空、
    antiquantOffsetOptional为空、y为FLOAT16；。
  - x为BFLOAT16、weight为BFLOAT16、biasOptional为FLOAT32、scaleOptional为空、offsetOptional为空、antiquantScaleOptional为空、
    antiquantOffsetOptional为空、y为BFLOAT16；。
  - x为INT8、weight为INT8、biasOptional为INT32、scaleOptional为UINT64、 offsetOptional为空、antiquantScaleOptional为空、
    antiquantOffsetOptional为空、y为INT8；。
  - x为FLOAT16、weight为INT8、biasOptional为FLOAT16、scaleOptional为空， offsetOptional为空，antiquantScaleOptional为FLOAT16、
    antiquantOffsetOptional为FLOAT16、y为FLOAT16；。
