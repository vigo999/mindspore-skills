  summary: 接口功能：Native Sparse Attention推理过程中，Compress Attention的计算。
  constraints:
  - 参数query仅支持TND、BSND输入。T是B和S合轴紧密排列的数据（每个batch的actualQSeqLenOptional）、B（batch）表示输入样本批量大小、S（qSeqlen）表示输入样本序列长度、N（numHeads）表示多头数、D（headDimsQK）表示隐藏层最小的单元尺寸。
  - 压缩前的kvSeqlen的上限可以表示为：actualSelKvSeqLenCeil=(actualCmpKvSeqLenOptional-1)*compressBlockStride+compressBlockSize，需要满足actualSelKvSeqLenCeil/selectBlockSize<=4096，且需要满足selectBlockCount<=actualSelKvSeqLenCeil/selectBlockSize。如果actualSelKvSeqLenOptional不满足actualCmpKvSeqLenOptional=(actualSelKvSeqLenOptional-compressBlockSize)/compressBlockStride+1，或者actualCmpKvSeqLenOptional的长度和blockTableOptional的batch维度不同，则会默认进入单token推理场景。
  - 多token推理场景下，actualQSeqLenOptional参数必须传入，actualQSeqLenOptional的长度必须和blockTableOptional的batch维度相等，仅支持query的S轴最大等于4，并且此时要求每个batch单独的actualQSeqLenOptional<=actualSelKvSeqLenOptional。如果actualQSeqLenOptional的长度和blockTableOptional的batch维度不同，或者actualQSeqLenOptional的值小于1或者大于4，则会默认进入单token推理场景。
  - query中的D和key的D(H/numKeyValueHeads)值相等，小于等于192且大于等于value的D轴。
  error_conditions:
  - 传入参数是必选输入，输出或者必选属性，且是空指针。
  - query、key、value、blockTableOptional、attentionOut、topKOutput的数据类型不在支持的范围内。
  - API内存调用npu runtime的接口异常。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入参数是必选输入，输出或者必选属性，且是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query、key、value、blockTableOptional、attentionOut、topKOutput的数据类型不在支持的范围内。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: API内存调用npu runtime的接口异常。
  evidence:
  - aclnnNsaCompressAttentionInferGetWorkspaceSize
  - aclnnNsaCompressAttentionInfer
  extraction_status: complete
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    tensor_rank: 3|4
    layout_templates:
    - BSND
    - TND
    value_constraints:
    - 'query: query的S轴小于等于4。'
    - 'query: query中的N和numHeads值相等，且N轴必须是key/value的N轴（H/D）的整数倍，此外，query的N轴与key/value的N轴（H/D）的比值（即GQA中的group大小）小于等于128，且128是group的整数倍。'
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    value_constraints:
    - 'key: key中的blockSize和pageBlockSize值相等，且blockSize小于等于128，且是16的整数倍。'
    - 'key: key的S轴小于等于8192。'
    - 'key: key的D轴小于等于192且大于等于value的D轴。'
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16
    value_constraints:
    - 'value: value的D轴小于等于128。'
    - 'value: value的S轴小于等于8192。'
  - name: attentionMaskOptional
    role: optional_input
    value_constraints:
    - 'attentionMaskOptional: 仅在Q_S大于1的情况下生效。'
  - name: blockTableOptional
    role: input
    dtype: INT32
    optional_semantics:
    - 'blockTableOptional: 当前只支持paged attention，因此该参数必须传入。'
  - name: actualQSeqLenOptional
    role: optional_input
    dtype: INT64
  - name: actualCmpKvSeqLenOptional
    role: optional_input
    dtype: INT64
    optional_semantics:
    - 'actualCmpKvSeqLenOptional: 当前只支持paged attention，因此该参数必须传入。'
  - name: actualSelKvSeqLenOptional
    role: optional_input
    dtype: INT64
  - name: topKMaskOptional
    role: optional_input
  - name: numHeads
    role: input
    dtype: INT64
  - name: numKeyValueHeads
    role: input
    dtype: INT64
  - name: selectBlockSize
    role: input
    dtype: INT64
    value_constraints:
    - 'selectBlockSize: 仅支持selectBlockSize取值16、32、48、64、80、96、112、128，且selectBlockSize大于等于compressBlockSize，并且是compressBlockStride的整数倍。'
  - name: selectBlockCount
