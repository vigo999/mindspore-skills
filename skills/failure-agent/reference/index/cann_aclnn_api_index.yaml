- api_name: aclnnDynamicBlockMxQuant
  doc_names:
  - aclnnDynamicBlockMxQuant.md
  source_repo: ops-nn
  workspace_api: aclnnDynamicBlockMxQuantGetWorkspaceSize
  execute_api: aclnnDynamicBlockMxQuant
  summary: 接口功能：对输入变量，以数据块（32\*32）为基本块进行MX量化转换为目的数据类型。在每个基本块中，根据scaleAlg的取值采取不同的scale算法计算出当前块对应的量化参数scale（1\*1），将其广播为scale1（32\*1）和scale2（1\*32）输出。同时对基本块中的每一个数除以scale，根据round_mode转换到对应的dst_type，得到量化结果y。
  constraints:
  - x的维度应该为2~3。
  - rank(scale1) = rank(x) + 1。
  - rank(scale2) = rank(x) + 1。
  - scale1.shape[-2] = (ceil(x.shape[-1] / 32) + 2 - 1) / 2。
  - scale2.shape[-3] = (ceil(x.shape[-2] / 32) + 2 - 1) / 2。
  - scale1.shape[-1] = 2。
  - scale2.shape[-1] = 2。
  - 其他维度与输入x一致。
  - 举例：输入x的shape为[B, M, N]，目的数据类型为FP8类时，对应的y的shape为[B, M, N]，scale1的shape为[B, M, (ceil(N/32)
    + 2 - 1) / 2, 2]，scale2的shape为[B, (ceil(M / 32) + 2 - 1) / 2, N, 2]。
  error_conditions:
  - x存在空指针。
  - x、roundModeOptional、dstType、scaleAlg、dstTypeMax、yOut、scale1Out、scale2Out的数据类型和数据格式不在支持的范围之内。
  - 当前平台不在支持的平台范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: x存在空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x、roundModeOptional、dstType、scaleAlg、dstTypeMax、yOut、scale1Out、scale2Out的数据类型和数据格式不在支持的范围之内。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: 当前平台不在支持的平台范围内。
  evidence:
  - aclnnDynamicBlockMxQuantGetWorkspaceSize
  - aclnnDynamicBlockMxQuant
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 2..3
    value_constraints:
    - 'x (aclTensor\*): 当dstType为FLOAT4_E2M1、FLOAT4_E1M2时，x的最后一维必须是偶数。'
    optional_semantics:
    - 'x (aclTensor\*): 不支持空Tensor。'
  - name: roundModeOptional
    role: input
    dtype: STRING
  - name: dstType
    role: input
    dtype: INT64
  - name: scaleAlg
    role: input
    dtype: INT64
    value_constraints:
    - 'scaleAlg (int64_t): 当前支持取值0和2，分别代表OCP Microscaling Formats (Mx) Specification实现和Dynamic
      Dtype Range实现。'
  - name: dstTypeMax
    role: input
    dtype: FLOAT
    value_constraints:
    - 'dstTypeMax (float): 在scaleAlg=2，dstType为FLOAT4_E2M1时生效，需要按照传入的数值计算scale。'
    - 'dstTypeMax (float): 当前仅支持dstTypeMax取值为0.0/6.0/7.0。'
  outputs:
  - name: yOut
    role: output
    dtype: FLOAT4_E2M1、FLOAT4_E1M2、FLOAT8_E4M3FN、FLOAT8_E5M2
    noncontiguous: 'yes'
    tensor_rank: 2..3
    shape_constraints:
    - 'yOut (aclTensor\*): shape和输入x一致。'
  - name: scale1Out
    role: output
    dtype: FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 3..4
    shape_constraints:
    - 'scale1Out (aclTensor*): shape为x的-1轴的值除以32向上取整，并对其进行偶数pad，pad填充值为0。'
  - name: scale2Out
    role: output
    dtype: FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 3..4
    shape_constraints:
    - 'scale2Out (aclTensor*): shape为x的-2轴的值除以32向上取整，并对其进行偶数pad，pad填充值为0。'
    value_constraints:
    - 'scale2Out (aclTensor*): scale2Out输出需要对每两行数据进行交织处理。'
- api_name: aclnnDynamicBlockQuant
  doc_names:
