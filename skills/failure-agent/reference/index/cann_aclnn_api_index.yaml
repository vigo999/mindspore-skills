  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '4'
    value_constraints:
    - 'key: 支持key的N轴小于等于256。'
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
    tensor_rank: '4'
    value_constraints:
    - 'value: 支持value的N轴小于等于256。'
  - name: topkIndices
