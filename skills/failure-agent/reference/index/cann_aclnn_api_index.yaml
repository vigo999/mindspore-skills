    role: input
    dtype: INT64
  - name: blockSize
    role: input
    dtype: INT64
  - name: antiquantMode
    role: input
  - name: softmaxLseFlag
    role: input
    description: 是否输出softmax_lse。
    dtype: BOOL
  - name: keyAntiquantMode
    role: input
    dtype: INT64
    value_constraints:
    - 'keyAntiquantMode: 除了keyAntiquantMode为0并且valueAntiquantMode为1的场景外，需要与valueAntiquantMode一致。'
