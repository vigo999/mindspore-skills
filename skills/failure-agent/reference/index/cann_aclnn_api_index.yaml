    shape_constraints:
    - 'self: 支持非连续的Tensor，数据格式支持ND，shape维度至少为2且不大于8, 且shape需要与Q,R满足约束条件。'
  - name: mode
    role: input
    description: 计算属性，当mode为0时，使用'reduced'模式，对于输入A(\*, m, n), 输出简化大小的Q(\*, m, k),
      R(\*, k, n),其中k为m,n的最小值。当mode为1时，使用'complete'模式，对于输入A(\*, m, n),输出完整大小的Q(\*,
      m, m), R(\*, m, n), 当mode为2时，使用'r'模式，仅计算reduced场景下的R(\*,k,n),其中k为m,n的最小值，返回Q为空tensor。
    optional_semantics:
    - 'mode: 当mode为1时，使用''complete''模式，对于输入A(\*, m, n),输出完整大小的Q(\*, m, m), R(\*, m,
      n), 当mode为2时，使用''r''模式，仅计算reduced场景下的R(\*,k,n),其中k为m,n的最小值，返回Q为空tensor。'
  outputs:
