- api_name: aclnnIncreFlashAttentionV4
  doc_names:
  - aclnnIncreFlashAttentionV4.md
  source_repo: ops-transformer
  workspace_api: aclnnIncreFlashAttentionV4GetWorkspaceSize
  execute_api: aclnnIncreFlashAttentionV4
  summary: 接口功能：兼容（aclnnIncreFlashAttentionV3）接口功能，在其基础上新增**kv左Padding特性。**
  constraints:
  - 支持B轴小于等于65536，N轴小于等于256，D轴小于等于512。
  - query数据类型支持FLOAT16、BFLOAT16，attentionOut、key和value数据类型支持FLOAT16、INT8、BFLOAT16。
  - dequantScale1、dequantScale2数据类型支持UINT64、FLOAT32。
  - quantScale1、quantScale2和quantOffset2数据类型支持FLOAT32。
  - numKeyValueHeads数据类型支持INT64。
  - 支持B轴小于等于256，N轴小于等于256，D轴小于等于512。
  - 支持key、value的S轴小于等于65536。
  - query、key、value和attentionOut数据类型仅支持FLOAT16。
  - dequantScale1、quantScale1、dequantScale2、quantScale2和quantOffset2仅支持nullptr。
  - numKeyValueHeads仅支持取值0。
  - 非连续场景下，参数key、value的tensorlist中tensor的个数等于query的B(由于tensorlist限制，非连续场景下B需要小于等于256)。shape除S外需要完全一致，且batch只能为1。
  - query、key、value数据排布格式支持从多种维度解读，其中B（Batch）表示输入样本批量大小、S（Seq-Length）表示输入样本序列长度、H（Head-Size）表示隐藏层的大小、N（Head-Num）表示多头数、D（Head-Dim）表示隐藏层最小的单元尺寸，且满足D=H/N。
  - 参数query中的N和numHeads值相等，key、value的N和numKeyValueHeads值相等，并且numHeads是numKeyValueHeads的倍数关系。
  - query、key、value输入均为INT8的场景暂不支持。
  - query、key、value输入为FLOAT16，输出为INT8的场景：入参quantScale2必填，quantOffset2可选，不能传入dequantScale1、quantScale1、dequantScale2（即为nullptr）参数。
  - per-channel模式：两个参数的shape可支持(2, N, 1, D)，(2, N, D)，(2, H)，N为numKeyValueHeads。参数数据类型和query数据类型相同。
  - per-tensor模式：两个参数的shape均为(2)，数据类型和query数据类型相同。
  - 入参 quantScale2 和 quantOffset2 支持 per-tensor/per-channel 两种格式和 FLOAT32/BFLOAT16
    两种数据类型。若传入 quantOffset2 ，需保证其类型和shape信息与 quantScale2 一致。当输入为BFLOAT16时，同时支持FLOAT32和BFLOAT16，否则仅支持FLOAT32
    。per-channel 格式，当输出layout为BSH时，要求 quantScale2 所有维度的乘积等于H；其他layout要求乘积等于N*D。（建议输出layout为BSH时，quantScale2
    shape传入[1,1,H]或[H]；输出为BNSD时，建议传入[1,N,1,D]或[N,D]；输出为BSND时，建议传入[1,1,N,D]或[N,D]）。
  - page attention的使能必要条件是blockTable存在且有效，同时key、value是按照blockTable中的索引在一片连续内存中排布，支持key、value
    dtype为FLOAT16/BFLOAT16/INT8，在该场景下key、value的inputLayout参数无效。
  - blockSize是用户自定义的参数，该参数的取值会影响page attention的性能，在使能page attention场景下，blockSize需要传入非0值,
    且blockSize最大不超过512。key、value输入类型为FLOAT16/BFLOAT16时需要16对齐，key、value 输入类型为INT8时需要32对齐，推荐使用128。通常情况下，page
    attention可以提高吞吐量，但会带来性能上的下降。
  - page attention场景下，当query的inputLayout为BNSD时，kv cache排布支持（blocknum, blocksize, H）和（blocknum,
    KV_N, blocksize, D）两种格式，当query的inputLayout为BSH、BSND时，kv cache排布只支持（blocknum, blocksize,
    H）一种格式。blocknum不能小于根据actualSeqLengthsKv和blockSize计算的每个batch的block数量之和。且key和value的shape需保证一致。
  - page attention场景下，kv cache排布为（blocknum, KV_N, blocksize, D）时性能通常优于kv cache排布为（blocknum,
    blocksize, H）时的性能，建议优先选择（blocknum, KV_N, blocksize, D）格式。
  - page attention使能场景下，当输入kv cache排布格式为（blocknum, blocksize, H），且 numKvHeads * headDim
    超过64k时，受硬件指令约束，会被拦截报错。可通过使能GQA（减小 numKvHeads）或调整kv cache排布格式为（blocknum, numKvHeads,
    blocksize, D）解决。
  - page attention场景下，必须传入输入actualSeqLengths。
  - page attention场景下，blockTable必须为二维，第一维长度需等于B，第二维长度不能小于maxBlockNumPerSeq（maxBlockNumPerSeq为每个batch中最大actualSeqLengthsKv对应的block数量）。
  - page attention使能场景下，以下场景输入S需要大于等于maxBlockNumPerSeq * blockSize。
  - 使能 Attention mask，例如 mask shape为 (B, 1, 1, S)。
  - 使能 pseShift，例如 pseShift shape为(B, N, 1, S)。
  - 使能 kvPaddingSize，例如 kvPaddingSize shape为(1), 并且要求 S 大于等于 kvPaddingSize 加 每个Batch中最大actualSeqLengthsKv的和。
  - key、value 中对应tensor的shape需要完全一致。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - query、key、value、actualSeqLengths、pseShift、attenMask、attentionOut的数据类型和数据格式不在支持的范围内。
  - API内存调用npu runtime的接口异常。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query、key、value、actualSeqLengths、pseShift、attenMask、attentionOut的数据类型和数据格式不在支持的范围内。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: API内存调用npu runtime的接口异常。
  evidence:
  - aclnnIncreFlashAttentionV4GetWorkspaceSize
  - aclnnIncreFlashAttentionV4
  extraction_status: complete
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'no'
