- api_name: aclnnAddRmsNormDynamicMxQuant
  doc_names:
  - aclnnAddRmsNormDynamicMxQuant.md
  source_repo: ops-nn
  workspace_api: aclnnAddRmsNormDynamicMxQuantGetWorkspaceSize
  execute_api: aclnnAddRmsNormDynamicMxQuant
  summary: 接口功能：RmsNorm算子是大模型常用的归一化操作，相比LayerNorm算子，其去掉了减去均值的部分。DynamicMxQuant算子则是在尾轴上按blocksize分组进行动态MX量化的算子。AddRmsNormDynamicMxQuant算子将RmsNorm前的Add算子和RmsNorm归一化输出给到的DynamicMxQuant算子融合起来，减少搬入搬出操作。
    在输入尾轴axis上，根据每blocksize=32个数，计算出这组数对应的量化尺度mxscale，然后对这组数每一个除以mxscale，根据round_mode转换到对应的dst_type，得到量化结果y。在dst_type为FLOAT8_E4M3FN、FLOAT8_E5M2时，根据scale_alg的取值来指定计算mxscale的不同算法。
  constraints:
  - '**边界值场景说明**。'
  - 当输入是Inf时：1、输出yOut为0；2、输出xOut为Inf；3、输出mxscaleOut为255，偶数pad填充值为0；4、输出rstdOut为0。
  - 当输入是NaN时：1、输出yOut为0；2、输出xOut为Nan；3、输出mxscaleOut为255，偶数pad填充值为0；4、输出rstdOut为NaN。
  - '**数据格式说明**。'
  - '**各产品型号支持数据类型说明**。'
  - rank(mxscaleOut) = rank(x1) + 1。
  - mxscaleOut.shape[-2] = (ceil(x1.shape[-1] / 32) + 2 - 1) / 2。
  - mxscaleOut.shape[-1] = 2。
  - 其他维度与输入x1一致。
  - 当输出yOut的数据类型为FLOAT4_E2M1或FLOAT4_E1M2，x1尾轴的值必须为偶数。
  error_conditions:
  - 传入的x1、x2、gamma、yOut、xOut、mxscaleOut和rstdOut是空指针。
  - 输入或输出的数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x1、x2、gamma、yOut、xOut、mxscaleOut和rstdOut是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入或输出的数据类型不在支持的范围之内。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: ''
  evidence:
  - aclnnAddRmsNormDynamicMxQuantGetWorkspaceSize
  - aclnnAddRmsNormDynamicMxQuant
  extraction_status: complete
  inputs:
  - name: x1
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..7
    optional_semantics:
    - 'x1（aclTensor*）: 不支持空Tensor。'
  - name: x2
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..7
    optional_semantics:
    - 'x2（aclTensor*）: 不支持空Tensor。'
    output_relation:
    - 'x2（aclTensor*）: shape和数据类型需要与x1保持一致。'
  - name: gamma
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'gamma（aclTensor*）: shape只能为一维，需要与x1最后一维维度匹配。'
    optional_semantics:
    - 'gamma（aclTensor*）: 不支持空Tensor。'
  - name: beta
    role: input
    dtype: FLOAT16、BFLOAT16、FLOAT32
    noncontiguous: 'yes'
    tensor_rank: '1'
    shape_constraints:
    - 'beta（aclTensor*）: 如果提供。'
    optional_semantics:
    - 'beta（aclTensor*）: 不支持空Tensor。'
    - 'beta（aclTensor*）: 可选参数，支持传入空指针。'
  - name: epsilon
    role: input
  - name: scaleAlg
    role: input
    value_constraints:
    - 'scaleAlg（int64_t）: 支持取值0和1，取值为0表示Open Compute Project(OCP)实现，取值为1表示cuBLAS实现。'
    - 'scaleAlg（int64_t）: 当dstType为FLOAT4_E2M1/FLOAT4_E1M2时仅支持取值为0。'
  - name: roundMode
    role: input
  - name: dstType
    role: input
  - name: outputRstd
    role: input
    description: 表示指定是否输出有效的rstdOut。
    optional_semantics:
    - 'outputRstd（bool）: 当outputRstd为False时，rstdOut最终输出为空Tensor，此时rstdOut为无效占位输出。'
  outputs:
  - name: yOut
    role: output
    dtype: FLOAT4_E2M1、FLOAT4_E1M2、FLOAT8_E4M3FN、FLOAT8_E5M2
    noncontiguous: 'yes'
    tensor_rank: 1..7
    shape_constraints:
    - 'yOut（aclTensor*）: shape需要与输入x1一致。'
    optional_semantics:
    - 'yOut（aclTensor*）: 不支持空Tensor。'
  - name: xOut
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 1..7
    optional_semantics:
    - 'xOut（aclTensor*）: 不支持空Tensor。'
    output_relation:
    - 'xOut（aclTensor*）: shape和数据类型需要与输入x1一致。'
  - name: mxscaleOut
    role: output
    dtype: FLOAT8_E8M0
    noncontiguous: 'yes'
    tensor_rank: 2..8
    shape_constraints:
    - 'mxscaleOut（aclTensor*）: shape在尾轴上为x对应值除以blocksize=32向上取整，并对其进行偶数pad，pad填充值为0，具体计算过程见约束说明。'
    - 'mxscaleOut（aclTensor*）: 其余维度与入参x1的shape前几维保持一致，前几维指x1的维度减去gamma的维度，表示不需要norm的维度。'
    optional_semantics:
    - 'mxscaleOut（aclTensor*）: 不支持空Tensor。'
  - name: rstdOut
    role: output
    dtype: FLOAT32
    noncontiguous: 'yes'
    tensor_rank: 1..7
    shape_constraints:
    - 'rstdOut（aclTensor*）: 当outputRstd为True时，shape与入参x1的shape前几维保持一致，前几维指x1的维度减去gamma的维度，表示不需要norm的维度。'
    optional_semantics:
    - 'rstdOut（aclTensor*）: 支持空Tensor。'
    - 'rstdOut（aclTensor*）: 当outputRstd为False时，rstdOut输出空Tensor。'
