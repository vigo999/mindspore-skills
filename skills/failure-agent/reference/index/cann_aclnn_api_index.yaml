    shape_constraints:
    - 'expertIds: (Bs, K)。'
  - name: scales
    role: input
    dtype: FLOAT32
  - name: xActiveMask
    role: input
  - name: expertScales
    role: input
    dtype: FLOAT32
  - name: groupEp
    role: input
    dtype: STRING
  - name: epWorldSize
    role: input
    dtype: INT64
  - name: epRankId
    role: input
    dtype: INT64
    value_constraints:
    - 'epRankId: 取值范围[0, epWorldSize)同一个EP通信域中各卡的epRankId不重复。'
  - name: moeExpertNum
    role: input
    dtype: INT64
  - name: groupTp
