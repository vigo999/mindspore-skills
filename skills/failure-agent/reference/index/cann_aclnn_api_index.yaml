- api_name: aclnnMlaProlog
  doc_names:
  - aclnnMlaProlog.md
  source_repo: ops-transformer
  workspace_api: aclnnMlaPrologGetWorkspaceSize
  execute_api: aclnnMlaProlog
  summary: 接口功能**：推理场景，Multi-Head Latent Attention前处理的计算。主要计算过程分为四路，首先对输入$x$乘以$W^{DQ}$进行下采样和RmsNorm后分为两路，第一路乘以$W^{UQ}$和$W^{UK}$经过两次上采样后得到$q^N$；第二路乘以$W^{QR}$后经过旋转位置编码（ROPE）得到$q^R$；第三路是输入$x$乘以$W^{DKV}$进行下采样和RmsNorm后传入Cache中得到$k^C$；第四路是输入$x$乘以$W^{KR}$后经过旋转位置编码后传入另一个Cache中得到$k^R$。
  constraints:
  - shape 格式字段含义说明。
  - weight_dq，weight_uq_qr，weight_dkv_kr在不转置的情况下各个维度的表示：（k，n）。
  - aclnnMlaProlog接口支持场景：A2、A3支持以下所有场景。
  error_conditions:
  - 必须传入的参数（如接口核心依赖的输入/输出参数）中存在空指针。
  - 输入参数的 shape（维度/尺寸）、dtype（数据类型）不在接口支持的范围内。
  - API 内存调用 NPU Runtime 接口时发生异常（如 Runtime 服务未启动、内存申请失败等）。
  - tiling发生异常，入参的dtype类型或者shape错误。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 必须传入的参数（如接口核心依赖的输入/输出参数）中存在空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入参数的 shape（维度/尺寸）、dtype（数据类型）不在接口支持的范围内。
  - name: ACLNN_ERR_RUNTIME_ERROR
    code: '361001'
    description: API 内存调用 NPU Runtime 接口时发生异常（如 Runtime 服务未启动、内存申请失败等）。
  - name: ACLNN_ERR_INNER_TILING_ERROR
    code: '561002'
    description: tiling发生异常，入参的dtype类型或者shape错误。
  evidence:
  - aclnnMlaPrologGetWorkspaceSize
  - aclnnMlaProlog
  extraction_status: complete
  inputs:
  - name: tokenX
    role: input
    dtype: BFLOAT16
