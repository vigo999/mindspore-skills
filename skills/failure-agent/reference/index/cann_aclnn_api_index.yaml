    optional_semantics:
    - "cacheIndex: - 支持B=0,S=0,T=0的空Tensor \n 取值范围需在0,BlockNum*BlockSize)内。"
  - name: kvCacheRef
    role: input
    dtype: BFLOAT16、INT8
    noncontiguous: 'no'
    shape_constraints:
    - 'kvCacheRef: (BlockNum,BlockSize,Nkv,Hckv)。'
    optional_semantics:
    - 'kvCacheRef: - 支持B=0,Skv=0的空Tensor。'
  - name: krCacheRef
    role: input
    dtype: BFLOAT16、INT8
    noncontiguous: 'no'
    shape_constraints:
    - 'krCacheRef: (BlockNum,BlockSize,Nkv,Dr)。'
    optional_semantics:
    - 'krCacheRef: - 支持B=0,Skv=0的空Tensor。'
  - name: dequantScaleXOptional
    role: input
    dtype: FLOAT
    noncontiguous: 'no'
  - name: dequantScaleWDqOptional
    role: input
    dtype: FLOAT
    noncontiguous: 'no'
    shape_constraints:
    - 'dequantScaleWDqOptional: (1,Hcq)。'
  - name: dequantScaleWUqQrOptional
