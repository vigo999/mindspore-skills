  - aclnnMatmulWeightNz.md
  source_repo: ops-nn
  workspace_api: aclnnMatmulWeightNzGetWorkspaceSize
  execute_api: aclnnMatmulWeightNz
  summary: 接口功能：完成张量self与张量mat2的矩阵乘计算，mat2仅支持NZ格式，只支持self为2维, mat2为4维。
  constraints:
  - 不支持两个输入分别为BFLOAT16和FLOAT16的数据类型推导。
  - self只支持2维, mat2只支持昇腾私有格式，调用此接口之前，必须完成mat2从ND到昇腾私有格式的转换。
  - 不支持mat2最后两根轴其中一根轴为1，即k=1或者n=1。
  - 建议使用场景：建议在mte2 bound场景下使用，例如M轴较小，A矩阵存在重复搬运，B矩阵无重复搬运的情况。
  - 'self shape中的k和mat2 shape中的k1需要满足以下关系：ceil（k，k0） = k1, mat2 shape中的n1与out的n满足以下关系:
    ceil(n, n0) = n1。'
  - mat2的Reduce维度需要与self的Reduce维度大小相等。
  error_conditions:
  - 传入的self、mat2或out是空指针。
  - self和mat2的数据类型和数据格式不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的self、mat2或out是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: self和mat2的数据类型和数据格式不在支持的范围之内。
  evidence:
  - aclnnMatmulWeightNzGetWorkspaceSize
  - aclnnMatmulWeightNz
  extraction_status: complete
  inputs:
  - name: self
    role: input
    dtype: BFLOAT16、FLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
  - name: mat2
    role: input
    dtype: BFLOAT16、FLOAT16、FLOAT32
    tensor_rank: '4'
  - name: cubeMathType
    role: input
    dtype: INT8
  outputs:
  - name: out
    role: output
    description: 表示矩阵乘的输出矩阵，公式中的out。
    dtype: BFLOAT16、FLOAT16、FLOAT32
    tensor_rank: '2'
    value_constraints:
    - 'out: 各个维度表示：（m，n），m与self的m一致，n与mat2的n1以及n0满足ceil(n / n0) = n1的关系。'
