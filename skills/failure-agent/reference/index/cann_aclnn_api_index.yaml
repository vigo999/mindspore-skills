- api_name: aclnnNsaCompress
  doc_names:
  - aclnnNsaCompress.md
  source_repo: ops-transformer
  workspace_api: aclnnNsaCompressGetWorkspaceSize
  execute_api: aclnnNsaCompress
  summary: 算子功能：训练场景下，使用NSA Compress算法减轻long-context的注意力计算，实现在KV序列维度进行压缩。
  constraints:
  - 该接口与PyTorch配合使用时，需要保证CANN相关包与PyTorch相关包的版本匹配。
  - input和weight需要满足broadcast关系，input.shape[1]=weight.shape[1]，不支持input、weight为空输入。
  - actSeqLenType目前仅支持取值0，即actSeqLenOptional需要是前缀和模式。
  - actSeqLenOptional目前不支持为空。
  - layoutOptional目前仅支持TND，此时input.shape[0]必须等于actSeqLenOptional[-1]。
  - input.shape[1]=weight.shape[1]，需要小于等于128。
  - input.shape[2]必须是16的倍数，上限256。
  - weight.shape[0]=compressBlockSize，必须是16的倍数，上限128。
  - compressStride必须是16的整数倍，并且compressBlockSize>=compressStride。
  - weight与input的shape满足broadcast关系。
  error_conditions:
  - 传入input、weight、actSeqLenOptional或output是空指针。
  - input和weight的数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入input、weight、actSeqLenOptional或output是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: input和weight的数据类型不在支持的范围之内。
  evidence:
  - aclnnNsaCompressGetWorkspaceSize
  - aclnnNsaCompress
  extraction_status: complete
  inputs:
  - name: input
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'input: shape支持[T, N, D]。'
    optional_semantics:
    - 'input: 不支持空Tensor。'
  - name: weight
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '2'
    optional_semantics:
    - 'weight: 不支持空Tensor。'
  - name: actSeqLenOptional
    role: input
    dtype: INT64
    noncontiguous: 'no'
    tensor_rank: '1'
    optional_semantics:
    - 'actSeqLenOptional: 当前不能为空。'
  - name: layoutOptional
    role: input
    dtype: String
    tensor_rank: 3|4
    layout_templates:
    - SBH
    - BSND
    - BNSD
    - TND
  - name: compressBlockSize
    role: input
    dtype: INT64
  - name: compressStride
    role: input
    dtype: INT64
  - name: actSeqLenType
    role: input
    dtype: INT64
    value_constraints:
    - 'actSeqLenType: 可取值0或1。'
  outputs:
  - name: output
    role: output
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: '3'
    shape_constraints:
    - 'output: shape支持[T, N, D]。'
    optional_semantics:
    - 'output: 不支持空Tensor。'
    output_relation:
    - 'output: 数据类型与input保持一致。'
- api_name: aclnnNsaCompressAttention
  doc_names:
  - aclnnNsaCompressAttention.md
  source_repo: ops-transformer
  workspace_api: aclnnNsaCompressAttentionGetWorkspaceSize
  execute_api: aclnnNsaCompressAttention
  summary: 算子功能**：NSA中compress attention以及select topk索引计算。论文：https://arxiv.org/pdf/2502.11089
  constraints:
  - 该接口与PyTorch配合使用时，需要保证CANN相关包与PyTorch相关包的版本匹配。
  - compressBlockSize、compressStride、selectBlockSize必须是16的整数倍，并且满足：compressBlockSize>=compressStride
    && selectBlockSize>=compressBlockSize && selectBlockSize%compressStride==0。
  - compressBlockSize：16对齐，支持到128。
  - compressStride：16对齐，支持到64。
  - selectBlockSize：16对齐，支持到128。
  - selectBlockCount：支持[1~32] && selectBlockCount <= min(SelSkv)。
  - actualSeqQLenOptional, actualCmpSeqKvLenOptional, actualSelSeqKvLenOptional需要是前缀和模式；且TND格式下必须传入。
  - 由于UB限制，CmpSkv需要满足以下约束：CmpSkv <= 14000。
  - SelSkv = CeilDiv(CmpSkv, selectBlockSize // compressStride)。
  - layoutOptional目前仅支持TND。
  - 输入query、key、value的数据类型必须一致。
  - 输入query、key、value的batchSize必须相等。
  - 输入query、key、value的headDim必须满足：qD == kD && kD >= vD。
  - 输入query、key、value的inputLayout必须一致。
  - 输入query的headNum为N1，输入key和value的headNum为N2，则N1 >= N2 && N1 % N2 == 0。
  - 设G = N1 / N2，G需要满足以下约束：G < 128 && 128 % G == 0。
  - attenMask和topkMask的使用需符合论文描述。
  error_conditions:
  - 输入query，key，value 传入的是空指针。
  - query，key，value 数据类型不在支持的范围之内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 输入query，key，value 传入的是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: query，key，value 数据类型不在支持的范围之内。
  evidence:
  - aclnnNsaCompressAttentionGetWorkspaceSize
  - aclnnNsaCompressAttention
  extraction_status: complete
  inputs:
  - name: query
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
  - name: key
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
  - name: value
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 3..4
  - name: attenMaskOptional
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
    tensor_rank: '2'
    shape_constraints:
    - 'attenMaskOptional: 输入shape需为[S,S]。'
  - name: actualSeqQLenOptional
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: actualCmpSeqKvLenOptional
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: actualSelSeqKvLenOptional
    role: input
    dtype: INT64
    tensor_rank: '1'
  - name: topkMaskOptional
    role: input
    dtype: BOOL
    noncontiguous: 'yes'
