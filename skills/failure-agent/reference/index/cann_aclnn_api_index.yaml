    noncontiguous: 'no'
    shape_constraints:
    - 'dequantScaleWDkvKrOptional: (1, Hckv+Dr)。'
  - name: quantScaleCkvOptional
    role: input
    description: 用于对kvCache输出数据做量化操作的参数。
    dtype: FLOAT
    noncontiguous: 'no'
    shape_constraints:
