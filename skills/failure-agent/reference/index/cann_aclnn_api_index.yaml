- api_name: aclnnFFNV3
  doc_names:
  - aclnnFFNV3.md
  source_repo: ops-transformer
  workspace_api: aclnnFFNV3GetWorkspaceSize
  execute_api: aclnnFFNV3
  summary: 接口功能：该FFN算子提供MoeFFN和FFN的计算功能。在没有专家分组（expertTokens为空）时是FFN，有专家分组时是MoeFFN，统称为FFN，属于Moe结构。MoE（Mixture-of-Experts，混合专家系统）是一种用于训练万亿参数量级模型的技术。MoE将预测建模任务分解为若干子任务，在每个子任务上训练一个专家模型（Expert
    Model），开发一个门控模型（Gating Model），该模型会根据输入数据分配一个或多个专家，最终综合多个专家计算结果作为预测结果。Mixture-of-Experts结构的模型是将输入数据分配给最相关的一个或者多个专家，综合涉及的所有专家的计算结果来确定最终结果。
  constraints:
  - 所有场景下需满足K1=N2, K1<65536, K2<65536, M轴在32Byte对齐后小于INT32的最大值。
  - 含BFLOAT16数据类型的场景仅支持Atlas 800I A2推理产品。
  - 有专家时，专家数据的总数需要与x的M保持一致。
  - 激活层为geglu/swiglu/reglu时，仅支持无专家分组时的FLOAT16高性能场景（FLOAT16场景指类型为aclTensor的必选参数数据类型都为FLOAT16的场景），且N1=2\*K2。
  - 激活层为gelu/fastgelu/relu/silu时，支持有专家或无专家分组的FLOAT16高精度及高性能场景、BFLOAT16场景、量化场景及伪量化场景，且N1=K2。
  - 非量化场景不能输入量化参数和伪量化参数，量化场景不能输入伪量化参数，伪量化场景不能输入量化参数。
  - y为FLOAT16，deqScaleOptional支持数据类型：UINT64、INT64、FLOAT32；。
  - y为BFLOAT16，deqScaleOptional支持数据类型：BFLOAT16；。
  - 要求deqScale1Optional与deqScale2Optional的数据类型保持一致。
  - y为FLOAT16，deqScaleOptional支持数据类型：UINT64、INT64；。
  - y为FLOAT16、x为FLOAT16、biasOptional为FLOAT16，antiquantScaleOptional为FLOAT16、antiquantOffsetOptional为FLOAT16，weight支持数据类型INT8和INT4。
  - y为BFLOAT16、x为BFLOAT16、biasOptional为FLOAT32，antiquantScaleOptional为BFLOAT16、antiquantOffsetOptional为BFLOAT16，weight支持数据类型INT8和INT4。
  - 当weight1/weight2的数据类型为INT4时，其shape最后一维必须为偶数。
  - 伪量化场景，per-group下，antiquantScale1Optional和antiquantOffset1Optional中的组数G要能被K1整除，antiquantScale2Optional和antiquantOffset2Optional中的组数G要能被K2整除。
  - innerPrecise参数在BFLOAT16非量化场景，只能配置为0；FLOAT16非量化场景，可以配置为0或者1；量化或者伪量化场景，0和1都可配置，但是配置后不生效。
  - tokensIndexFlag为true且有专家（expertTokens不为空）时，expertTokens中的数值必须满足：如果i和j都是expertTokens中有效的数组索引，且j大于i，那么expertTokens中第j个元素的数值大于或者等于expertTokens中第i个元素的数值。
  - 只支持无专家场景。
  - 需满足N1=K2。
  error_conditions:
  - 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - x、weight1、weight2、activation、expertTokensOptional、bias1Optional、bias2Optional、y的数据类型和数据格式不在支持的范围内。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 如果传入参数是必选输入，输出或者必选属性，且是空指针，则返回161001。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: x、weight1、weight2、activation、expertTokensOptional、bias1Optional、bias2Optional、y的数据类型和数据格式不在支持的范围内。
  evidence:
  - aclnnFFNV3GetWorkspaceSize
  - aclnnFFNV3
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: "Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16、INT8\n Atlas 推理系列加速卡产品：FLOAT16"
    noncontiguous: 'yes'
  - name: weight1
    role: input
    dtype: "Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16、INT8、INT4\n Atlas 推理系列加速卡产品：FLOAT16"
    noncontiguous: 'yes'
  - name: weight2
    role: input
    dtype: "Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16、INT8、INT4\n Atlas 推理系列加速卡产品：FLOAT16"
    noncontiguous: 'yes'
  - name: expertTokensOptional
    role: optional_input
    dtype: INT64
    tensor_rank: '1'
    optional_semantics:
    - 'expertTokensOptional（aclTensor*）: Atlas A2 训练系列产品/Atlas A2 推理系列产品：若不为空时可支持的最大长度为256个。'
  - name: bias1Optional
    role: optional_input
    dtype: "Atlas A2 训练系列产品/Atlas A2 推理系列产品Atlas 800I A2推理产品：FLOAT16、FLOAT32、INT32\n\
      \ Atlas 推理系列加速卡产品：FLOAT16"
  - name: bias2Optional
    role: optional_input
    dtype: "Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、FLOAT32、INT32\n Atlas 推理系列加速卡产品：FLOAT16"
  - name: scaleOptional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT32
    noncontiguous: 'yes'
    tensor_rank: Atlas A2 训练系列产品/Atlas A2 推理系列产品：per-tensor下输入在有/无专家时均为一维向量，输入元素个数在有/无专家时分别为[E]/[1]per-channel下输入在有/无专家时为二维向量/一维向量，输入元素个数在有/无专家时分别为[E,
      N1]/[N1]
  - name: offsetOptional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT32
    tensor_rank: Atlas A2 训练系列产品/Atlas A2 推理系列产品：一维向量，输入元素个数在有/无专家时分别为[E]/[1]
  - name: deqScale1Optional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：UINT64、INT64、FLOAT32、BFLOAT16
  - name: deqScale2Optional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：UINT64、INT64、FLOAT32、BFLOAT16
  - name: antiquantScale1Optional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16
    noncontiguous: 'yes'
  - name: antiquantScale2Optional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16
    noncontiguous: 'yes'
  - name: antiquantOffset1Optional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16
    noncontiguous: 'yes'
  - name: antiquantOffset2Optional
    role: optional_input
    dtype: Atlas A2 训练系列产品/Atlas A2 推理系列产品：FLOAT16、BFLOAT16
    noncontiguous: 'yes'
  - name: activation
    role: input
