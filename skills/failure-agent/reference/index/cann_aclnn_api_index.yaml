    tensor_rank: 2..6
  - name: dstTensor
    role: input
    dtype: INT8、UINT8、INT32、UINT32、FLOAT、FLOAT16、BFLOAT162、FLOAT8_E4M3FN、FlOAT8_E4M3FN2、FLOAT4_E2M12
