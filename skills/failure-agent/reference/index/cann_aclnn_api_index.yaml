  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的x、yOut或scaleOut为空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 输入或输出数据格式或数据类型不在支持的范围之内。
  evidence:
  - aclnnDynamicBlockQuantGetWorkspaceSize
  - aclnnDynamicBlockQuant
  extraction_status: complete
  inputs:
  - name: x
    role: input
    dtype: FLOAT16、BFLOAT16
    noncontiguous: 'yes'
    tensor_rank: 2..3
    optional_semantics:
