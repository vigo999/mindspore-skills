  - k_head_size：每个注意力头中key的特征维度（单头key的长度），取值为正整数。
  - num_blocks：keyCache中预分配的块总数，用于存储所有序列的key数据，取值为正整数。
  - block_size：每个缓存块包含的token数量，取值为正整数。
  - 输入值域限制：seqLensOptional和compressLensOptional里面的每个元素值必须满足公式：reduceSum(seqLensOptional[i]
    - compressLensOptional[i] + 1) <= num_blocks * block_size（对应场景二、三）。
  error_conditions:
  - 传入的key、keyCacheRef、slotMapping是空指针。
  - 参数key的数据类型不在支持的范围之内。
  - key的维数不等于3维或4维。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的key、keyCacheRef、slotMapping是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 参数key的数据类型不在支持的范围之内。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '561002'
    description: key的维数不等于3维或4维。
  evidence:
  - aclnnScatterPaCacheGetWorkspaceSize
  - aclnnScatterPaCache
  extraction_status: complete
  inputs:
  - name: key
    role: input
    dtype: FLOAT16、FLOAT、BFLOAT16、INT8、UINT8、INT16、UINT16、INT32、UINT32、HIFLOAT8、FLOAT8_E5M2、FLOAT8_E4M3FN、FLOAT4_E2M1、FLOAT4_E1M2
    tensor_rank: 3..4
    shape_constraints:
    - 'key(aclTensor*): shape满足[batch * seq_len, num_head, k_head_size]或[batch, seq_len,
      num_head, k_head_size]，FLOAT4_E2M1、FLOAT4_E1M2情况下，k_head_size必须是偶数。'
  - name: slotMapping
    role: input
    dtype: INT32、INT64
    tensor_rank: 1..2
    shape_constraints:
    - 'slotMapping(aclTensor*): 当key是3维时，shape满足[batch * seq_len]，当key是4维时，shape满足[batch,
      num_head]。'
  - name: compressLensOptional
    role: optional_input
    dtype: 与slotMapping一致。
    tensor_rank: 1..2
    shape_constraints:
    - 'compressLensOptional(aclTensor*): 当key是4维且compressSeqOffsetOptional不为空指针时，shape满足[batch,
      num_head]，当key是4维且compressSeqOffsetOptional为空指针时，shape满足[batch * num_head]。'
    optional_semantics:
    - 'compressLensOptional(aclTensor*): 当key是4维且compressSeqOffsetOptional不为空指针时，shape满足[batch,
      num_head]，当key是4维且compressSeqOffsetOptional为空指针时，shape满足[batch * num_head]。'
  - name: compressSeqOffsetOptional
    role: optional_input
    dtype: 与slotMapping一致。
    tensor_rank: '1'
    shape_constraints:
    - 'compressSeqOffsetOptional(aclTensor*): shape满足[batch * num_head]。'
  - name: seqLensOptional
    role: optional_input
    dtype: 与slotMapping一致。
    tensor_rank: '1'
    shape_constraints:
    - 'seqLensOptional(aclTensor*): shape满足[batch]。'
  - name: cacheMode
    role: input
    optional_semantics:
    - 'cacheMode(char*): 预留参数，当前数据格式只支持ND，该参数不生效。'
  outputs:
  - name: keyCacheRef
    role: output
    dtype: 与key一致。
    tensor_rank: '4'
    shape_constraints:
    - 'keyCacheRef(aclTensor*): 当key是3维时，shape满足[num_blocks, block_size, num_head,
      k_head_size]，当key是4维时，shape满足[num_blocks, block_size, 1, k_head_size]。'
- api_name: aclnnScatterPaKvCache
  doc_names:
  - aclnnScatterPaKvCache.md
  source_repo: ops-transformer
  workspace_api: aclnnScatterPaKvCacheGetWorkspaceSize
  execute_api: aclnnScatterPaKvCache
  summary: 接口功能：更新KvCache中指定位置的key和value。
  constraints:
  - key、value、keyCacheRef、valueCacheRef的数据类型必须一致；。
  - slotMapping、compressLensOptional、compressSeqOffsetOptional、seqLensOptional的数据类型必须一致；。
  - slotMapping的取值范围[0,num_blocks*block_size-1]，且slotMapping内的元素值保证不重复，重复时不保证正确性；。
  - 当key和value都是3维，则key和value的前两维shape必须相同；。
  - 当key和value都是4维，则key和value的前三维shape必须相同，且keyCacheRef和valueCacheRef的第三维必须是1；。
  - 当key和value是4维时，compressLensOptional、seqLensOptional为必选参数；当key和value是3维时，compressLensOptional、compressSeqOffsetOptional、seqLensOptional为可选参数；。
  - 当key和value都是4维时，slotMapping是二维，且slotMapping的第一维值等于key的第一维为batch，slotMapping的第二维值等于key的第三维为num_head(对应场景三)；。
  - 当key和value都是4维时，seqLensOptional是一维，且seqLensOptional的值等于key的第一维为batch(对应场景三)；。
  - 当key和value是3维且存在seqLensOptional时，seqLensOptional中所有值的和等于key的第一维为num_blocks(对应场景四、五)；。
  - seqLensOptional和compressLensOptional里面的每个元素值必须满足公式：reduceSum(seqLensOptional[i]
    - compressLensOptional[i]) <= num_blocks * block_size (对应场景三、四、五)。
  - 当cacheMode为“PA_NZ”时，keyCacheRef和valueCacheRef的倒数第二维必须小于UINT16_MAX(对应场景一)。
  error_conditions:
  - 传入的key、keyCacheRef、slotMapping、value、valueCacheRef是空指针。
  - 参数key、value的数据类型不在支持的范围之内。
  - key的维数不等于3维或4维，value的维数不等于0维、3维或4维。
  return_codes:
  - name: ACLNN_ERR_PARAM_NULLPTR
    code: '161001'
    description: 传入的key、keyCacheRef、slotMapping、value、valueCacheRef是空指针。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '161002'
    description: 参数key、value的数据类型不在支持的范围之内。
  - name: ACLNN_ERR_PARAM_INVALID
    code: '561002'
    description: key的维数不等于3维或4维，value的维数不等于0维、3维或4维。
  evidence:
  - aclnnScatterPaKvCacheGetWorkspaceSize
  - aclnnScatterPaKvCache
  extraction_status: complete
  inputs:
  - name: key
    role: input
    dtype: FLOAT16、FLOAT、BFLOAT16、INT8、UINT8、INT16、UINT16、INT32、UINT32、HIFLOAT8、FLOAT8_E5M2、FLOAT8_E4M3FN
    tensor_rank: 3..4
  - name: slotMapping
    role: input
    dtype: INT32、INT64
    tensor_rank: '1'
  - name: value
    role: input
    dtype: 与key保持一致
    tensor_rank: 0|3|4
    shape_constraints:
    - 'value(aclTensor*): 支持0维、3维或4维，非0维下shape与key一致。'
  - name: compressLensOptional
    role: optional_input
    dtype: 与slotMapping保持一致
    tensor_rank: '1'
  - name: compressSeqOffsetOptional
    role: optional_input
    dtype: 与slotMapping保持一致
    tensor_rank: '1'
  - name: seqLensOptional
    role: optional_input
    dtype: 与slotMapping保持一致
    tensor_rank: '1'
  - name: cacheMode
    role: input
  - name: scatterMode
    role: input
    optional_semantics:
    - 'scatterMode(char*): 当传空指针或"None"时，表示更新的key和value是非压缩状态且连续。'
  - name: strides
    role: input
    value_constraints:
    - 'strides(aclIntArray *): 其值应该大于0。'
  - name: offsets
    role: input
    value_constraints:
    - 'offsets(aclIntArray *): 其值应该大于0。'
  outputs:
  - name: keyCacheRef
    role: output
    dtype: 与key保持一致
    tensor_rank: 4..5
  - name: valueCacheRef
    role: output
    dtype: 与key保持一致
    tensor_rank: 0|4|5
    shape_constraints:
    - 'valueCacheRef(aclTensor*): 支持0维、4维或5维，非0维下shape与keyCacheRef一致，当传空指针或"Norm"时，仅支持ND内存排布格式。'
