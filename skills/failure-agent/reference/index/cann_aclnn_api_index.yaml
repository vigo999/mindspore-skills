  execute_api: aclnnNpuFormatCast
  summary: 接口功能**：
  constraints:
  - C0计算方法：$C0=\frac{32B}{size\ of\ additionalDtype}$。
  - srcTensor的数据类型和additionalDtype相同，且类型为FLOAT16或BFLOAT16时，若维度表示为[k, n], 则k为1场景暂不支持。
  - 不支持调用当前接口转昇腾亲和数据格式FRACTAL_NZ后, 进行任何能修改张量的操作, 如contiguous、pad、slice等;。
  - 当srcTensor的shape后两维任意一维度shape等于1场景，也不允许转昇腾亲和数据格式FRACTAL_NZ后再进行任何修改张量的操作, 包括transpose。
  - C0计算方法：$C0=\frac{32B}{size\ of\ srcTensor的基础类型}$。
  - 不允许转昇腾亲和数据格式FRACTAL_NZ后再进行任何修改张量的操作, 包括transpose。
  error_conditions:
  - 传入的srcTensor、dstTensor是空指针。
