schema_version: "1.1.0"
name: "accuracy-agent"
display_name: "Accuracy Agent"
description: "Diagnose accuracy regressions, numerical drift, wrong-result issues, and cross-platform mismatch after successful execution by analyzing the symptom, validating consistency across data, config, model, checkpoint, and runtime, preserving a reusable snapshot, and emitting an actionable report."
version: "0.3.0"

entry:
  type: "manual"
  path: "SKILL.md"

role: "agent"

composes: []

factory:
  card_types:
    - "model"
    - "report"

inputs:
  - name: "working_dir"
    type: "path"
    required: false
    description: "Workspace root for the model or training run under diagnosis. Defaults to the current shell path."
  - name: "user_problem"
    type: "string"
    required: true
    description: "Accuracy symptom description and comparison context."
  - name: "baseline_path"
    type: "path"
    required: false
    description: "Optional baseline metrics, logs, or outputs path."
  - name: "current_result_path"
    type: "path"
    required: false
    description: "Optional current metrics, logs, or outputs path."
  - name: "env_lock"
    type: "path"
    required: false
    description: "Path to an earlier readiness snapshot such as env.lock.json."
  - name: "factory_root"
    type: "path"
    required: false
    description: "Optional local ms-factor or Factory root for supporting model or report evidence."

outputs:
  report_schema: "skills/_shared/contract/report.schema.json"
  out_dir_layout: "runs/<run_id>/out/"

permissions:
  network: "none"
  filesystem: "workspace-write"

dependencies:
  tools:
    - "bash"
    - "find"
    - "rg"
  python: []

tags:
  - "mindspore"
  - "accuracy"
  - "diagnosis"
  - "numerical"
  - "training"
