schema_version: "1.1.0"
name: "algorithm-agent"
display_name: "Algorithm Agent"
version: "0.4.0"
description: "Top-level algorithm feature agent that runs a paper-to-factory loop: intake and triage paper candidates, analyze released reference implementations, build a code map and patch plan, drive a minimum verification scaffold across torch/torch_npu/MindSpore expectations, and prepare validated results for readiness handoff and reusable template distillation."
type: "manual"
path: "SKILL.md"
network: "none"
filesystem: "workspace-write"

entry:
  type: manual

inputs:
  - name: "working_dir"
    type: string
    required: false
    description: Local workspace root containing the target codebase.
  - name: "source_text"
    type: string
    required: false
    description: Paper excerpt, user request, or feature description.
  - name: "reference_code_path"
    type: string
    required: false
    description: Optional released-code path or local reference implementation.
  - name: "target_workspace"
    type: string
    required: false
    description: Local codebase to adapt.
  - name: "target_model"
    type: string
    required: false
    description: Target model or baseline name when already known.
  - name: "route_preference"
    type: string
    required: false
    description: Optional route override when the user already knows the feature family.
    choices: ["generic-feature", "mhc", "attnres", "transmla"]

outputs:
  - name: "feature_spec"
    type: object
    description: Structured feature analysis and intake-triage result.
  - name: "integration_plan"
    type: object
    description: Planned integration points, route-specific constraints, code-map summary, and patch scope.
  - name: "patch_summary"
    type: object
    description: Summary of generated code and config changes.
  - name: "readiness_handoff"
    type: object
    description: Suggested readiness validation handoff.

report_schema:
  feature_spec:
    required_fields: ["feature_summary", "source_type", "feature_category", "integration_route", "route_evidence", "feature_bucket", "recommended_next_action"]
  integration_plan:
    required_fields: ["target_path", "edit_scope", "baseline_invariants", "route_specific_constraints", "route_specific_validations", "code_map_summary"]
  patch_summary:
    required_fields: ["touched_files", "config_deltas", "runtime_behavior_changes"]
  readiness_handoff:
    required_fields: ["route", "open_questions", "recommended_checks", "verification_scaffold"]

out_dir_layout:
  notes: "Prefer the smallest coherent artifact footprint in phase 1: keep intake+routing guidance together, keep verification+admission guidance together, default to one combined helper scaffold, and only split files when reuse clearly justifies it."
